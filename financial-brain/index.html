                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Emergency Reserve</p><p className="text-4xl font-black text-white mt-4"><AnimatedCurrency value={monthlyBurn * 6} /></p>
                                </div>
                                <div className="p-10 premium-card bg-white/5 border-white/10 rounded-[40px] text-center backdrop-blur-md">
                                    <Icon name="activity" size={32} className="mx-auto text-rose-400 mb-6"/>
                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Health Shield Status</p>
                                    {healthAnalysis.isAdequate ? <p className="text-emerald-400 font-bold bg-emerald-500/10 p-3 mt-4 rounded-xl text-sm">✅ Adequate</p> : <p className="text-rose-400 font-bold bg-rose-500/10 p-3 mt-4 rounded-xl text-sm">⚠️ Shortfall: {formatCurrency(healthAnalysis.shortfall)}</p>}
                                </div>
                                <div className="p-10 premium-card bg-white/5 border-white/10 rounded-[40px] text-center backdrop-blur-md">
                                    <Icon name="shield" size={32} className="mx-auto text-emerald-400 mb-6"/>
                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Income Replacement</p><p className="text-4xl font-black text-white mt-4"><AnimatedCurrency value={totals.income * 12 * 20} /></p>
                                </div>
                            </div>
                        </div>
                    );
                } else if (currentSlide === 3) {
                    return (
                        <div className="flex flex-col items-center justify-center h-full space-y-12 animate-in slide-in-from-right fade-in w-full max-w-6xl mx-auto px-8">
                            <div className="text-center w-full"><h2 className="text-5xl font-black heading-font text-white uppercase tracking-widest mb-4">Wealth Allocation</h2></div>
                            <div className="flex flex-col md:flex-row gap-8 w-full">
                                <div className="flex-1 p-10 premium-card bg-white/10 border-white/20 rounded-[40px] text-center backdrop-blur-md">
                                    <Icon name="layers" size={48} className="mx-auto text-amber-400 mb-6"/>
                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Goal Linked Assets</p><p className="text-5xl font-black text-white"><AnimatedCurrency value={totalAssets - unallocatedData.remaining} /></p>
                                </div>
                                <div className="flex-1 p-10 bg-slate-900/80 border border-amber-500/30 rounded-[40px] text-center shadow-[0_0_50px_rgba(245,158,11,0.15)] backdrop-blur-md">
                                    <Icon name="rocket" size={48} className="mx-auto text-amber-400 mb-6"/>
                                    <p className="text-sm font-bold text-amber-100 uppercase tracking-widest mb-2">Legacy Pot (Unallocated)</p><p className="text-5xl font-black text-amber-400"><AnimatedCurrency value={unallocatedData.remaining} /></p>
                                </div>
                            </div>
                        </div>
                    );
                } else if (currentSlide === 4) {
                    return (
                        <div className="flex flex-col items-center justify-center h-full space-y-12 animate-in slide-in-from-right fade-in w-full max-w-7xl mx-auto px-8">
                            <div className="text-center w-full"><h2 className="text-5xl font-black heading-font text-white uppercase tracking-widest mb-4">Execution Strategy</h2></div>
                            <div className="flex w-full gap-8">
                                <div className="w-1/3 flex flex-col gap-6">
                                    <div className="p-8 bg-white/10 border border-white/20 rounded-[32px] backdrop-blur-md">
                                        <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Total Monthly SIP Needed</p><p className="text-4xl font-black text-teal-400"><AnimatedCurrency value={totalSIPRequired} /></p>
                                    </div>
                                    <div className={`p-8 rounded-[32px] border backdrop-blur-md ${totalSIPRequired > safeNumber(profile.currentSip) ? 'bg-rose-500/10 border-rose-500/30' : 'bg-emerald-500/10 border-emerald-500/30'}`}>
                                        <p className="text-xs font-bold text-white/50 uppercase tracking-widest mb-2">Execution Gap</p>
                                        <p className={`text-3xl font-black flex items-center gap-2 ${totalSIPRequired > safeNumber(profile.currentSip) ? 'text-rose-400' : 'text-emerald-400'}`}>
                                            {totalSIPRequired > safeNumber(profile.currentSip) ? <React.Fragment><AnimatedCurrency value={totalSIPRequired - safeNumber(profile.currentSip)} /> Short</React.Fragment> : 'Fully Funded!'}
                                        </p>
                                    </div>
                                </div>
                                <div className="w-2/3 max-h-[500px] overflow-y-auto pr-4 custom-scrollbar">
                                    <div className="space-y-4">
                                        {plan.map(g => (
                                            <div key={g.id} className="flex justify-between items-center p-6 bg-white/5 border border-white/10 rounded-[24px]">
                                                <div><p className="text-lg font-bold text-white">{g.name}</p><p className="text-sm text-slate-400 mt-1">Target: {formatCurrency(g.target)} in {g.horizon} Yrs</p></div>
                                                <div className="text-right"><p className="text-xs font-bold uppercase text-teal-400 tracking-widest">SIP</p><p className="text-2xl font-black text-white"><AnimatedCurrency value={g.sip} /></p></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                } else if (currentSlide === 5) {
                    const finalSim = masterSimulationData[masterSimulationData.length - 1];
                    const totalSipInvested = masterSimulationData.reduce((acc, row) => acc + row.sip, 0);
                    const totalCapitalDeployed = totalAssets + totalSipInvested;
                    return (
                        <div className="flex flex-col items-center justify-center h-full space-y-12 animate-in slide-in-from-right fade-in w-full max-w-7xl mx-auto px-8">
                            <div className="text-center w-full"><h2 className="text-5xl font-black heading-font text-white uppercase tracking-widest mb-4">The Quantum Trajectory</h2></div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl">
                                <div className="p-10 premium-card bg-white/5 border-white/10 rounded-[40px] text-center backdrop-blur-md">
                                    <Icon name="piggy-bank" size={48} className="mx-auto text-purple-400 mb-6"/>
                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Lifetime Capital Deployed</p><p className="text-5xl font-black text-white"><AnimatedCurrency value={totalCapitalDeployed} /></p>
                                </div>
                                <div className="p-10 premium-card bg-purple-900/20 border-purple-500/30 rounded-[40px] text-center shadow-[0_0_50px_rgba(168,85,247,0.15)] backdrop-blur-md">
                                    <Icon name="globe" size={48} className="mx-auto text-purple-400 mb-6"/>
                                    <p className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Terminal Wealth (Closing Corpus)</p><p className="text-6xl font-black text-purple-400"><AnimatedCurrency value={finalSim?.closing || 0} /></p>
                                </div>
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div id="blueprint-root" className={`w-full mx-auto transition-all duration-500 ${blueprintLayout === 'list' ? 'max-w-[1400px] flex flex-col gap-6' : 'max-w-[1400px] grid grid-cols-12 gap-6'} text-left blueprint-container relative z-10 px-4 lg:px-8 pb-32`}>
                    
                    {/* Presentation Mode Portal Overlay */}
                    {isPresenting && ReactDOM.createPortal(
                        <div className="fixed inset-0 z-[10000] bg-slate-950 flex flex-col no-print">
                            <div className="absolute top-8 left-8 z-[10001] group no-print">
                                <button onClick={() => setIsConsoleOpen(!isConsoleOpen)} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all duration-500 backdrop-blur-md ${isConsoleOpen ? 'bg-white/20 text-white rotate-90' : 'bg-transparent text-transparent group-hover:bg-white/10 group-hover:text-white'}`}><Icon name="settings" size={24} /></button>
                                <div className={`absolute top-16 left-0 w-80 bg-slate-900/90 backdrop-blur-xl border border-white/10 rounded-3xl p-6 shadow-2xl transition-all duration-500 origin-top-left ${isConsoleOpen ? 'scale-100 opacity-100 visible' : 'scale-95 opacity-0 invisible'}`}>
                                    <h4 className="text-white text-sm font-bold uppercase tracking-widest border-b border-white/10 pb-4 mb-6 flex items-center gap-2"><Icon name="sliders" size={16} className="text-teal-400" /> Stealth Console</h4>
                                    <div className="space-y-6">
                                        <div><div className="flex justify-between items-end mb-3"><label className="text-xs font-bold text-slate-400 uppercase tracking-widest block">Retirement Age</label><span className="text-base font-bold text-white">{profile.retireAge} Yrs</span></div><input type="range" min={safeNumber(profile.age) + 1} max={safeNumber(profile.horizonAge) - 1} value={profile.retireAge} onChange={(e) => setProfile({...profile, retireAge: e.target.value})} className="w-full accent-teal-500" /></div>
                                        <div><div className="flex justify-between items-end mb-3"><label className="text-xs font-bold text-slate-400 uppercase tracking-widest block">Burn Trim (Optimize)</label><span className="text-base font-bold text-white">-{burnTrim}%</span></div><input type="range" min="0" max="30" step="5" value={burnTrim} onChange={(e) => setBurnTrim(Number(e.target.value))} className="w-full accent-amber-500" /></div>
                                    </div>
                                </div>
                            </div>
                            <div className="absolute top-8 right-8 flex gap-4 z-50">
                                <button onClick={() => { setIsPresenting(false); setBurnTrim(0); setScenario('base'); }} className="px-6 py-3.5 bg-white/10 hover:bg-white/20 text-white rounded-full font-bold text-sm uppercase tracking-widest transition-all backdrop-blur-md flex items-center gap-2"><Icon name="x" size={18}/> Exit</button>
                            </div>
                            <div className="flex-1 relative overflow-hidden">{renderPresentationSlide()}</div>
                            <div className="absolute bottom-12 left-0 right-0 flex justify-center items-center gap-8 z-50">
                                <button disabled={currentSlide === 0} onClick={() => setCurrentSlide(c => c - 1)} className="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center text-white disabled:opacity-30 hover:bg-white/20 transition-colors backdrop-blur-md"><Icon name="chevron-left" size={28}/></button>
                                <div className="flex gap-4">{[0,1,2,3,4,5].map(i => (<div key={i} className={`w-3.5 h-3.5 rounded-full transition-all ${currentSlide === i ? 'bg-teal-400 scale-125' : 'bg-white/20'}`} />))}</div>
                                <button disabled={currentSlide === 5} onClick={() => setCurrentSlide(c => c + 1)} className="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center text-white disabled:opacity-30 hover:bg-white/20 transition-colors backdrop-blur-md"><Icon name="chevron-right" size={28}/></button>
                            </div>
                        </div>,
                        document.body
                    )}

                    <div className={blueprintLayout === 'list' ? 'col-span-full' : 'col-span-12'}>
                        <div className="no-print pt-6 pb-2 cinematic-enter">
                            <header className="premium-card p-5 md:p-6 flex flex-col lg:flex-row gap-5 items-center justify-between w-full">
                                <div className="text-left w-full lg:w-auto relative z-10">
                                    <h2 className="text-3xl font-black heading-font text-slate-900 uppercase tracking-tighter">Baba Blueprint</h2>
                                    <p className="text-teal-700 font-bold uppercase tracking-[0.3em] text-[10px] mt-1">Platinum Strategy Synthesis</p>
                                </div>
                                <div className="flex flex-wrap gap-4 items-center justify-start lg:justify-end w-full lg:w-auto relative z-10">
                                    <div className="flex bg-white/40 backdrop-blur-md border border-white/60 p-1.5 rounded-lg shadow-sm">
                                        <button onClick={() => setBlueprintLayout('list')} className={`px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all ${blueprintLayout === 'list' ? 'bg-slate-900 text-white shadow-md attention-tab' : 'text-slate-600 hover:text-slate-900 hover:bg-white/50'}`}><Icon name="list" size={14}/></button>
                                        <button onClick={() => setBlueprintLayout('bento')} className={`px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all ${blueprintLayout === 'bento' ? 'bg-slate-900 text-white shadow-md attention-tab' : 'text-slate-600 hover:text-slate-900 hover:bg-white/50'}`}><Icon name="layout-grid" size={14}/></button>
                                        <button onClick={() => setBlueprintLayout('compact')} className={`px-4 py-2 rounded-md text-[10px] font-bold uppercase tracking-widest transition-all ${blueprintLayout === 'compact' ? 'bg-slate-900 text-white shadow-md attention-tab' : 'text-slate-600 hover:text-slate-900 hover:bg-white/50'}`}><Icon name="columns" size={14}/></button>
                                    </div>
                                    <div className="flex flex-col gap-1 relative z-50">
                                        <label className="text-[9px] font-bold text-slate-500 uppercase tracking-widest px-1">Advisor Name</label>
                                        <input type="text" placeholder="Enter Advisor Name" className="border border-white/60 focus:border-teal-600 outline-none text-xs font-bold text-slate-800 bg-white/60 backdrop-blur-md px-3 py-2 rounded-lg shadow-sm w-40 placeholder:font-medium transition-all" value={profile.advisorName || ''} onChange={(e) => setProfile({...profile, advisorName: e.target.value})} />
                                    </div>
                                    {profile.advisorName && (
                                        <React.Fragment>
                                            <button onClick={handlePrint} disabled={isGeneratingPDF} className={`px-5 py-3 bg-slate-900 text-white rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-md active:scale-95 transition-all flex items-center gap-2 hover:bg-slate-800 ${isGeneratingPDF ? 'opacity-70' : ''}`}><Icon name={isGeneratingPDF ? "loader" : "printer"} size={14} className={isGeneratingPDF ? "animate-spin" : ""}/> PDF</button>
                                            <button onClick={() => handleShare('whatsapp')} className="p-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 shadow-md active:scale-95"><Icon name="message-circle" size={16}/></button>
                                            <button onClick={() => handleShare('mail')} className="p-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 shadow-md active:scale-95" title="Share via Email"><Icon name="mail" size={16}/></button>
                                        </React.Fragment>
                                    )}
                                    <button onClick={() => { setCurrentSlide(0); setIsPresenting(true); }} className="px-5 py-3 bg-indigo-600 text-white rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-md active:scale-95 transition-all flex items-center gap-2 hover:bg-indigo-700 animate-pulse-slow"><Icon name="monitor-play" size={14}/> Present</button>
                                </div>
                            </header>
                            
                            <div className="w-full p-4 premium-card flex flex-col xl:flex-row items-center justify-between text-left mt-5 gap-5 break-inside-avoid">
                                <div className="flex gap-4 items-center text-left relative z-10 w-full xl:w-auto px-2">
                                    <div className={`p-3.5 rounded-full border-4 flex items-center justify-center font-black text-xl shadow-lg shrink-0 ${strategyHealthScore > 75 ? 'border-emerald-500 text-emerald-700 bg-emerald-50' : strategyHealthScore > 50 ? 'border-amber-500 text-amber-700 bg-amber-50' : 'border-rose-500 text-rose-700 bg-rose-50'}`}>{strategyHealthScore}</div>
                                    <div className="text-left flex-1">
                                        <p className="text-[10px] font-bold uppercase tracking-widest text-slate-500">Strategy Health</p>
                                        <p className="text-base font-black text-slate-900 leading-tight">{strategyHealthScore > 75 ? 'Wealth Master' : strategyHealthScore > 50 ? 'Secure Baseline' : 'High Vulnerability'}</p>
                                        <p className={`text-[9px] font-bold uppercase tracking-widest mt-1 ${verdict.color}`}>Verdict: {verdict.title}</p>
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-3 w-full xl:w-auto flex-1 xl:justify-end">
                                    <div className="bg-white/40 backdrop-blur-md border border-white/80 rounded-xl px-4 py-3 flex-1 min-w-[250px] max-w-sm shadow-sm flex items-start gap-3">
                                        <Icon name="zap" size={18} className="text-amber-500 shrink-0 mt-0.5" />
                                        <div>
                                            <p className="text-[9px] font-bold text-slate-500 uppercase tracking-widest">Tactical Nudge</p>
                                            <p className="text-[11px] font-semibold text-slate-800 italic mt-0.5">{freeCashflow > 0 ? `Invest your ₹${Math.round(freeCashflow).toLocaleString()}/mo surplus.` : `A ₹${Math.round(Math.abs(freeCashflow)).toLocaleString()}/mo gap exists. Optimize burn.`}</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="hidden print-only mb-10 pb-6 border-b-2 border-slate-200 text-left break-inside-avoid">
                        <div className="absolute top-0 left-0 w-8 h-full bg-slate-900"></div>
                        <div className="p-10 pl-16">
                            <div className="flex justify-between items-start mb-12">
                                <div>
                                    <p className="text-xs font-bold text-teal-700 tracking-[0.3em] uppercase mb-2">Confidential Strategy Document</p>
                                    <h1 className="text-4xl font-black heading-font text-slate-900 uppercase tracking-tighter">Strategic Wealth Blueprint</h1>
                                </div>
                                <div className="text-right">
                                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Generated On</p>
                                    <p className="text-sm font-bold text-slate-900">{new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-10 border-t-2 border-slate-100 pt-8">
                                <div>
                                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 flex items-center gap-2"><Icon name="user" size={12}/> Prepared Exclusively For</p>
                                    <p className="text-2xl font-black text-slate-900 uppercase tracking-tight">{profile.name || 'Valued Client'}</p>
                                </div>
                                <div>
                                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1.5 flex items-center gap-2"><Icon name="briefcase" size={12}/> Strategic Partner / Advisor</p>
                                    <p className="text-2xl font-black text-slate-900 uppercase tracking-tight">{profile.advisorName || 'BABA Advisor'}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <PhaseWrapper num={1} title="Executive Summary" layout={blueprintLayout} gridClasses={blueprintLayout === 'compact' ? 'col-span-12' : 'col-span-12 lg:col-span-8'} delayClass="stagger-1">
                        {safeNumber(profile.age) > 0 && ageFact && (
                            <div className="mb-5 p-4 bg-slate-900 rounded-xl border border-slate-700 shadow-md break-inside-avoid">
                                <p className="text-[9px] font-bold text-teal-400 uppercase tracking-widest mb-1 flex items-center gap-2"><Icon name="book-open" size={14}/> Age {profile.age} Intelligence</p>
                                <p className="text-sm font-medium text-white italic">"{ageFact.c}"</p>
                                {ageFact.f && <p className="text-[9px] text-slate-400 mt-2 font-semibold border-t border-slate-700 pt-2">💡 Historical Context: {ageFact.f}</p>}
                            </div>
                        )}
                        <div className="space-y-3 text-slate-700 text-left mb-5">
                            <p className="text-base font-bold">Hi {profile.name || "Strategist"} 👋,</p>
                            <p className="font-medium text-sm leading-relaxed">We have baselined your financial coordinates for a long-term strategic horizon. To build a robust plan, we first need absolute clarity on your starting position. Here is exactly where your cashflow and assets stand today:</p>
                            <ul className="list-disc pl-5 space-y-2 text-sm font-medium text-slate-600 text-left mt-2">
                                <li>Income: <span className="text-teal-700 font-bold">{formatCurrency(totals.income)}</span> /mo</li>
                                <li>Burn: <span className="text-rose-600 font-bold">{formatCurrency(monthlyBurn)}</span> /mo
                                    <div className="flex flex-wrap gap-2 mt-2 mb-2">
                                        {safeNumber(profile.rent) > 0 && <span className="text-[10px] font-bold bg-white/60 backdrop-blur-sm px-2.5 py-1 rounded text-slate-700 border border-white/80 shadow-sm">Rent: {formatCurrency(profile.rent)}</span>}
                                        {safeNumber(profile.emi) > 0 && <span className="text-[10px] font-bold bg-white/60 backdrop-blur-sm px-2.5 py-1 rounded text-slate-700 border border-white/80 shadow-sm">EMI: {formatCurrency(profile.emi)} (Ends {profile.emiEndYear || 'N/A'})</span>}
                                        {safeNumber(profile.household) > 0 && <span className="text-[10px] font-bold bg-white/60 backdrop-blur-sm px-2.5 py-1 rounded text-slate-700 border border-white/80 shadow-sm">Household: {formatCurrency(profile.household)}</span>}
                                        {safeNumber(profile.lifestyle) > 0 && <span className="text-[10px] font-bold bg-white/60 backdrop-blur-sm px-2.5 py-1 rounded text-slate-700 border border-white/80 shadow-sm">Lifestyle: {formatCurrency(profile.lifestyle)}</span>}
                                        {safeNumber(profile.vacation) > 0 && <span className="text-[10px] font-bold bg-white/60 backdrop-blur-sm px-2.5 py-1 rounded text-slate-700 border border-white/80 shadow-sm">Vacation: {formatCurrency(safeNumber(profile.vacation)/12)}/mo</span>}
                                    </div>
                                </li>
                                <li>Assets: <span className="text-indigo-700 font-bold">{formatCurrency(totalAssets)}</span> today</li>
                            </ul>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-auto">
                            <div className="bg-white/40 backdrop-blur-md rounded-xl border border-white/60 p-4 shadow-sm flex flex-col justify-between break-inside-avoid">
                                <div>
                                    <div className="flex justify-between items-end mb-3">
                                        <div><h4 className="text-[9px] font-bold text-slate-600 uppercase tracking-widest">💧 Liquidity Reality Check</h4></div>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="space-y-2 text-xs font-bold">
                                            <div className="flex justify-between"><span className="text-slate-500">Income</span><span className="text-slate-900">{formatCurrency(totals.income)}</span></div>
                                            <div className="flex justify-between"><span className="text-slate-500">Invest + Burn</span><span className="text-slate-600">{formatCurrency(totalSIPRequired + monthlyBurn)}</span></div>
                                            <div className="flex justify-between pt-2 border-t border-white/50"><span className="text-slate-700">Free Cashflow</span><span className={`${freeCashflow >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{formatCurrency(freeCashflow)}</span></div>
                                        </div>
                                        <div className="h-3 bg-white/60 backdrop-blur-sm rounded-full overflow-hidden flex relative border border-white/80 shadow-inner">
                                            <div className="h-full bg-slate-400" style={{width: `${Math.min(100, (monthlyBurn/totals.income)*100)}%`}} title="Lifestyle Burn"></div>
                                            <div className="h-full bg-teal-500" style={{width: `${Math.min(100, (totalSIPRequired/totals.income)*100)}%`}} title="Goal Investment"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="flex flex-col justify-center break-inside-avoid"><AssetAllocationPie profile={profile} /></div>
                        </div>
                    </PhaseWrapper>

                    <PhaseWrapper num={2} title="Retirement Reality" layout={blueprintLayout} gridClasses={blueprintLayout === 'compact' ? 'col-span-12 md:col-span-6' : 'col-span-12 lg:col-span-4'} delayClass="stagger-2">
                        <div className="mb-4 text-left border-b border-white/50 pb-4">
                            <p className="text-xs font-medium text-slate-700 leading-relaxed mb-3">Let's decode the exact mathematical cost of your future freedom. We project your current lifestyle into the future to find your ultimate target.</p>
                            
                            <div className="flex items-center justify-between bg-white/50 p-2.5 rounded-lg shadow-sm border border-white/80 gap-2">
