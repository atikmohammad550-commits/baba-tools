                                                    { totalMixPct !== 100 && (
                                                        <div className="mt-4 text-xs font-bold text-rose-600 bg-rose-50 p-3 rounded-lg text-center border border-rose-200 shadow-sm animate-pulse uppercase tracking-widest">
                                                            ⚠️ Total Allocation is {totalMixPct}%. Must be exactly 100%.
                                                        </div>
                                                    )}
                                                </div>
                                            )}
                                        </div>

                                        <div className="overflow-x-auto text-left border border-slate-200 rounded-xl shadow-sm bg-white">
                                            <table className="w-full text-left text-sm border-collapse">
                                                <thead className="border-b-2 border-slate-200 text-[10px] font-bold uppercase text-slate-500 tracking-widest text-left bg-slate-50">
                                                    <tr>
                                                        <th className="py-4 px-6">Year</th>
                                                        <th className="py-4 px-6">Age</th>
                                                        <th className="py-4 px-6 text-teal-700">Total SIP Flow</th>
                                                        <th className="py-4 px-6 text-emerald-700">Market Growth</th>
                                                        <th className="py-4 px-6 text-rose-600">Redemptions</th>
                                                        <th className="py-4 px-6 text-right text-slate-900">Closing Corpus</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="font-semibold text-slate-700 text-left text-sm">
                                                    {masterSimulationData.map((row, i) => {
                                                        let displayBal = row.closing;
                                                        let displaySip = row.sip;
                                                        let displayInterest = row.growth;
                                                        let displayWithdrawal = row.withdrawals;
                                                        let taxAndLoad = 0;

                                                        if (showPostTax && displayWithdrawal > 0) {
                                                            let totalGainPct = Math.max(0, row.closing + displayWithdrawal - row.totalPrincipal) / (row.closing + displayWithdrawal || 1);
                                                            let withdrawnGains = displayWithdrawal * totalGainPct;
                                                            
                                                            let totalEqAlloc = 0;
                                                            let totalDebtAlloc = 0;
                                                            assetMix.forEach(a => {
                                                                if (a.id === 'debt') totalDebtAlloc += safeNumber(a.pct);
                                                                else totalEqAlloc += safeNumber(a.pct);
                                                            });
                                                            let totalAlloc = totalEqAlloc + totalDebtAlloc || 1;
                                                            let eqRatio = totalEqAlloc / totalAlloc;
                                                            let debtRatio = totalDebtAlloc / totalAlloc;

                                                            let eqGains = withdrawnGains * eqRatio;
                                                            let debtGains = withdrawnGains * debtRatio;

                                                            let taxEstimate = 0;
                                                            let exitLoad = 0;

                                                            if (row.yr <= 1) { 
                                                                taxEstimate = (eqGains * 0.20) + (debtGains * 0.30);
                                                                exitLoad = displayWithdrawal * 0.01; 
                                                            } else { 
                                                                let taxableEqGains = Math.max(0, eqGains - 125000); 
                                                                taxEstimate = (taxableEqGains * 0.125) + (debtGains * 0.30);
                                                                exitLoad = 0; 
                                                            }

                                                            taxAndLoad = taxEstimate + exitLoad;
                                                            displayBal -= taxAndLoad;
                                                        }

                                                        if (showRealValue) {
                                                            const discount = Math.pow(infMultiplier, row.yr);
                                                            displayBal /= discount; displaySip /= discount;
                                                            displayInterest /= discount; displayWithdrawal /= discount;
                                                            taxAndLoad /= discount;
                                                        }

                                                        return (
                                                            <React.Fragment key={i}>
                                                                <tr onClick={() => setExpandedSimYear(expandedSimYear === i ? null : i)} className={`border-b border-slate-100 hover:bg-slate-50 text-left transition-colors cursor-pointer ${displayBal <= 0 ? 'opacity-50 grayscale' : ''}`}>
                                                                    <td className="py-4 px-6 text-slate-500 font-black">Y-{row.yr} <Icon name={expandedSimYear === i ? "chevron-up" : "chevron-right"} size={14} className="inline ml-1.5 text-slate-400"/></td>
                                                                    <td className="py-4 px-6 text-slate-900 font-bold">{row.age}Y</td>
                                                                    <td className="py-4 px-6 text-teal-700">{formatCurrency(displaySip)}</td>
                                                                    <td className="py-4 px-6 text-emerald-600">+{formatCurrency(displayInterest)}</td>
                                                                    <td className="py-4 px-6 text-rose-600">
                                                                        {displayWithdrawal > 0 ? (
                                                                            <div>
                                                                                <span className="font-bold text-rose-700">-{formatCurrency(displayWithdrawal)}</span>
                                                                                {showPostTax && taxAndLoad > 0 && (
                                                                                    <span className="block text-[9px] text-indigo-600 font-bold mt-1">
                                                                                        + {formatCurrency(taxAndLoad)} Tax/Load
                                                                                    </span>
                                                                                )}
                                                                                <span className="block text-[9px] opacity-75 leading-tight uppercase tracking-widest mt-1 max-w-[120px] truncate" title={row.withdrawalNames.join(" + ")}>{row.withdrawalNames.join(" + ")}</span>
                                                                            </div>
                                                                        ) : "—"}
                                                                    </td>
                                                                    <td className="py-4 px-6 text-right font-black text-slate-900 text-base">
                                                                        {formatCurrency(displayBal)} 
                                                                        {displayBal<=0 && <span className="text-xs text-rose-500 ml-2 font-bold uppercase">(Depleted)</span>}
                                                                    </td>
                                                                </tr>
                                                                {expandedSimYear === i && (
                                                                    <tr className="bg-slate-50 shadow-inner animate-in slide-in-from-top-2 border-y border-slate-200">
                                                                        <td colSpan="6" className="p-6">
                                                                            
                                                                            {/* PM SHOW FUNDED GOALS HERE */}
                                                                            {i === 0 && (isWealthAllocated || safeNumber(masterLumpsum) > 0) && (
                                                                                <div className="mb-6 p-4 bg-indigo-50 border border-indigo-100 rounded-xl">
                                                                                    <h5 className="text-[10px] font-black text-indigo-900 uppercase tracking-widest mb-3">Initial Starting Balances</h5>
                                                                                    <div className="flex flex-wrap gap-3">
                                                                                        {plan.filter(g => safeNumber(g.allocAmt) > 0).map(g => (
                                                                                            <span key={g.id} className="text-xs font-bold text-indigo-700 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-indigo-100">{g.name}: {formatCurrency(g.allocAmt)}</span>
                                                                                        ))}
                                                                                        {unallocatedData.remaining > 0 && <span className="text-xs font-bold text-slate-700 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-slate-200">Legacy Pot: {formatCurrency(unallocatedData.remaining)}</span>}
                                                                                        {safeNumber(masterLumpsum) > 0 && <span className="text-xs font-bold text-amber-700 bg-white px-3 py-1.5 rounded-lg shadow-sm border border-amber-200 flex items-center gap-1.5"><Icon name="zap" size={14}/> Master Lumpsum: {formatCurrency(masterLumpsum)}</span>}
                                                                                    </div>
                                                                                </div>
                                                                            )}

                                                                            <div className="grid grid-cols-5 text-[10px] font-bold uppercase text-slate-500 mb-3 border-b border-slate-200 pb-2 tracking-widest">
                                                                                <div>Month</div><div>Opening Bal</div><div>SIP Flow</div><div className="text-rose-500">Withdrawals</div><div className="text-right">Closing Bal</div>
                                                                            </div>
                                                                            {row.monthlyFlows.map((mth, mIdx) => {
                                                                                let dOp = mth.opening; let dSip = mth.sip; let dCl = mth.closing; let dW = mth.withdrawal;
                                                                                if (showRealValue) {
                                                                                    const dsc = Math.pow(infMultiplier, row.yr);
                                                                                    dOp /= dsc; dSip /= dsc; dCl /= dsc; dW /= dsc;
                                                                                }
                                                                                return (
                                                                                <div key={mIdx} className="grid grid-cols-5 text-xs font-bold py-2 border-b border-slate-100 last:border-0 hover:bg-white transition-colors">
                                                                                    <div className="text-slate-400">M-{mth.m}</div>
                                                                                    <div className="text-slate-700">{formatCurrency(dOp)}</div>
                                                                                    <div className="text-teal-600">{formatCurrency(dSip)}</div>
                                                                                    <div className="text-rose-500">{dW > 0 ? `-${formatCurrency(dW)}` : '-'}</div>
                                                                                    <div className="text-right text-slate-900">{formatCurrency(dCl)}</div>
                                                                                </div>
                                                                            )})}
                                                                            
                                                                            {row.withdrawalNames.includes("Freedom Paycheck") && (
                                                                                <div className="mt-4 p-3 bg-teal-50 border border-teal-100 rounded-lg text-teal-800 text-[11px] font-bold flex justify-between items-center shadow-inner">
                                                                                    <div className="flex items-center gap-2">
                                                                                        <Icon name="umbrella" size={14}/>
                                                                                        <span>RETIREMENT FREEDOM PAYCHECK ACTIVE</span>
                                                                                    </div>
                                                                                    <div className="flex gap-4">
                                                                                        <span>Monthly: {formatCurrency(row.monthlyFreedomPaycheck)}</span>
                                                                                        <span>Annual Paycheck Sum: {formatCurrency(row.withdrawals)}</span>
                                                                                    </div>
                                                                                </div>
                                                                            )}
                                                                        </td>
                                                                    </tr>
                                                                )}
                                                            </React.Fragment>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="space-y-6 px-8 lg:px-12 pb-12">
                                        <div className="p-6 bg-indigo-50 border border-indigo-100 rounded-2xl shadow-sm">
                                            <h4 className="text-sm font-bold uppercase tracking-widest text-indigo-900 mb-2">Existing Wealth Mapping</h4>
                                            <p className="text-xs text-indigo-700 font-medium mb-6 max-w-3xl">Here is how your total current assets of <strong className="font-extrabold text-indigo-900">{formatCurrency(totalAssets)}</strong> are mapped in this projection.</p>
                                            
                                            {isWealthAllocated ? (
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                    {Object.entries(allocMap).filter(([_, val]) => safeNumber(val) > 0).map(([id, val]) => {
                                                        const g = plan.find(x => x.id === id);
                                                        return (
                                                            <div key={id} className="p-4 bg-white border border-indigo-100 rounded-xl shadow-sm hover:shadow-md transition-shadow">
                                                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest truncate mb-1">{g ? g.name : 'Goal'}</p>
                                                                <p className="text-xl font-black text-teal-700">{formatCurrency(totalAssets * (safeNumber(val)/100))}</p>
                                                                <p className="text-[9px] font-bold text-teal-800 bg-teal-50 px-2 py-0.5 rounded flex items-center w-fit mt-2 border border-teal-100">{val}% Alloc</p>
                                                            </div>
                                                        );
                                                    })}
                                                    <div className="p-4 bg-slate-900 border border-slate-800 rounded-xl shadow-xl text-white relative overflow-hidden">
                                                        <div className="absolute -right-4 -top-4 bg-slate-700/50 w-16 h-16 rounded-full blur-xl"></div>
                                                        <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1 relative z-10">Legacy Pot (Unallocated)</p>
                                                        <p className="text-xl font-black text-white relative z-10">{formatCurrency(unallocatedData.remaining)}</p>
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="p-8 bg-white border border-indigo-100 rounded-2xl text-center shadow-sm">
                                                    <div className="w-12 h-12 bg-indigo-50 text-indigo-300 rounded-full flex items-center justify-center mx-auto mb-3"><Icon name="lock" size={24} /></div>
                                                    <p className="text-sm font-black text-indigo-900 uppercase tracking-widest">Wealth Locked in Legacy</p>
                                                    <p className="text-xs text-indigo-600 mt-2 max-w-sm mx-auto font-medium leading-relaxed">Toggle the allocation matrix in Phase 4 to map specific wealth to specific goals.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>,
                        document.body
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('cover');
            const [step, setStep] = useState(1);
            const [isTaskSwitcherOpen, setIsTaskSwitcherOpen] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [isFAQOpen, setIsFAQOpen] = useState(false); 
            const parallaxRef = useRef(null);
            const scrollContainerRef = useRef(null);
            
            const emptyProfile = { 
                name: '', age: '', retireAge: '', salary: '', businessIncome: '', married: false, addCoCFO: false, spouseName: '', spouseAge: '', spouseIncome: '', spouseRetireAge: '', hasChildren: false, childCount: 0, 
                rent: '', emi: '', emiEndYear: '', loanOutstanding: '', household: '', lifestyle: '', vacation: '', 
                insuranceActive: false, healthPremium: '', lifePremium: '', mfPool: '', stockPool: '', debtPool: '', cashPool: '', fdPool: '', realAssets: '', 
                customReservoirs: [], horizonAge: '', hasGoals: false, customGoals: [], childAges: {}, activeChildMilestones: {}, childMilestoneData: {}
            };

            const [profile, setProfile] = useState(() => {
                const saved = localStorage.getItem('financial_brain_profile');
                return saved ? JSON.parse(saved) : emptyProfile;
            });

            useEffect(() => {
                localStorage.setItem('financial_brain_profile', JSON.stringify(profile));
            }, [profile]);

            useEffect(() => {
                if (scrollContainerRef.current) {
                    scrollContainerRef.current.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }, [step, view]);

            useEffect(() => { 
                let frame;
                const handleMove = (e) => { 
                    if (!parallaxRef.current) return;
                    const x = (e.clientX / window.innerWidth) - 0.5;
                    const y = (e.clientY / window.innerHeight) - 0.5;
                    cancelAnimationFrame(frame);
                    frame = requestAnimationFrame(() => {
                        if (parallaxRef.current) {
                            parallaxRef.current.style.transform = `translate(${x * -20}px, ${y * -20}px)`;
                        }
                    });
                }; 
                window.addEventListener('mousemove', handleMove); 
                return () => { window.removeEventListener('mousemove', handleMove); cancelAnimationFrame(frame); }; 
            }, []);

            const handleNav = (id) => { if (id === 5 && (safeNumber(profile.retireAge) <= safeNumber(profile.age))) return; setStep(id); };

            const confirmResetJourney = () => { 
                localStorage.removeItem('financial_brain_profile');
                setProfile({...emptyProfile}); 
                setStep(1); 
                setView('cover'); 
                setShowResetConfirm(false);
            };

            const downloadQuestionnaire = () => {
                if (!window.XLSX) { alert("Excel Engine not loaded yet. Please try again in a moment."); return; }
                
                const wsData = [
                    ["FINANCIAL BRAIN - STRATEGIC WEALTH SANDBOX"],
                    ["Instructions: Edit the values in the 'Client Value' column (Column B)."],
                    ["When finished, save this file and upload it back into the Financial Brain UI to seamlessly update your master projection."],
                    [],
                    ["Data Point", "Client Value", "System ID"],
                    ["--- 1. PERSONAL PROFILE ---", "", ""],
                    ["Name", profile.name, "name"],
                    ["Current Age", safeNumber(profile.age), "age"],
                    ["Target Retirement Age", safeNumber(profile.retireAge), "retireAge"],
                    ["Life Expectancy (Horizon)", safeNumber(profile.horizonAge), "horizonAge"],
                    ["Monthly Salary (Net)", safeNumber(profile.salary), "salary"],
                    ["Monthly Business Income", safeNumber(profile.businessIncome), "businessIncome"],
                    [],
                    ["--- 2. CASHFLOW AUDIT ---", "", ""],
                    ["Monthly Rent", safeNumber(profile.rent), "rent"],
                    ["Monthly EMI", safeNumber(profile.emi), "emi"],
                    ["EMI End Year", safeNumber(profile.emiEndYear), "emiEndYear"],
                    ["Total Loan Outstanding", safeNumber(profile.loanOutstanding), "loanOutstanding"],
                    ["Monthly Household Expenses", safeNumber(profile.household), "household"],
                    ["Monthly Lifestyle Expenses", safeNumber(profile.lifestyle), "lifestyle"],
                    ["Annual Vacation Budget", safeNumber(profile.vacation), "vacation"],
                    [],
                    ["--- 3. RISK & PROTECTION ---", "", ""],
                    ["Existing Health Cover (Sum Assured)", safeNumber(profile.existingHealthCover), "existingHealthCover"],
                    ["Annual Health Premium", safeNumber(profile.healthPremium), "healthPremium"],
                    ["Annual Life Premium", safeNumber(profile.lifePremium), "lifePremium"],
                    [],
                    ["--- 4. ASSET RESERVOIRS ---", "", ""],
                    ["Mutual Funds Value", safeNumber(profile.mfPool), "mfPool"],
                    ["Equity Stocks Value", safeNumber(profile.stockPool), "stockPool"],
                    ["Debt Portfolio Value", safeNumber(profile.debtPool), "debtPool"],
                    ["Cash/Bank Balance", safeNumber(profile.cashPool), "cashPool"],
                    ["Fixed Deposits Value", safeNumber(profile.fdPool), "fdPool"],
                    ["Real Estate (Investment) Value", safeNumber(profile.realAssets), "realAssets"],
                    [],
                    ["--- 5. EXECUTION LEDGER ---", "", ""],
                    ["Current Monthly SIP", safeNumber(profile.currentSip), "currentSip"],
                    ["Annual SIP Step-up %", safeNumber(profile.sipStepUp), "sipStepUp"],
                    [],
                    ["--- LIVE CALCULATION SANDBOX ---", "", "", "Description"],
                    ["Metric", "Formula Output", "", ""],
                    ["Total Monthly Income", { f: "B10+B11" }, "", "= Salary + Business Income"],
                    ["Total Monthly Burn (Baseline)", { f: "B15+B16+B19+B20+(B21/12)+(B25/12)+(B26/12)" }, "", "= Rent + EMI + Household + Lifestyle + (Vacation/12) + (Insurance/12)"],
                    ["Years to Retirement", { f: "B9-B8" }, "", "= Target Retirement Age - Current Age"],
                    ["Assumed Inflation Rate", 0.06, "", "Change this to test (e.g. 0.08 for 8%)"],
                    ["Future Monthly Lifestyle Cost", { f: "B43*POWER(1+B45, B44)" }, "", "Projected cost of living at retirement"],
                    ["Assumed Safe Withdrawal Rate (SWR)", 0.04, "", "Change to 0.03 for a more conservative 3% rule"],
                    ["TARGET FREEDOM CORPUS", { f: "(B46*12)/B47" }, "", "The absolute mountain you need to build."]
                ];

                const ws = XLSX.utils.aoa_to_sheet(wsData);
                ws['!cols'] = [{wch: 45}, {wch: 25}, {hidden: true}, {wch: 55}];

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Master_Blueprint");
                XLSX.writeFile(wb, `Financial_Brain_Sandbox_${profile.name || "Client"}.xlsx`);
            };

            const handleUploadQuestionnaire = (e) => {
                if (!window.XLSX) { alert("Excel Engine not loaded yet. Please try again in a moment."); return; }
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const data = new Uint8Array(evt.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[firstSheetName];
                        const json = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                        
                        let newProfile = {...profile};
                        
                        json.forEach(row => {
                            if (row.length >= 3) {
                                const systemId = row[2];
                                const clientVal = row[1];
                                if (systemId && typeof systemId === 'string' && systemId !== 'System ID' && !systemId.includes('---')) {
                                    newProfile[systemId] = clientVal !== undefined && clientVal !== null ? String(clientVal).trim() : '';
                                }
                            }
                        });
                        
                        if(safeNumber(newProfile.existingHealthCover) > 0 || safeNumber(newProfile.healthPremium) > 0) newProfile.insuranceActive = true;
                        
                        setProfile(newProfile);
                    } catch (err) {
                        console.error("Error importing Excel", err);
                    }
                };
                reader.readAsArrayBuffer(file);
                e.target.value = null; 
            };

            const isBlueprintMode = view === 'flow' && step === 5;

            return (
                <div className="relative h-screen w-screen overflow-hidden text-left">
                    
                    {/* FIXED: FAQ Guidebook Modal */}
                    {isFAQOpen && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 sm:p-6 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-200">
                            <div className="bg-white rounded-3xl w-full max-w-3xl shadow-2xl overflow-hidden flex flex-col max-h-full animate-in zoom-in-95 duration-300">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                                    <div className="flex items-center gap-3">
                                        <div className="p-2 bg-blue-100 text-blue-700 rounded-lg"><Icon name="book-open" size={20} /></div>
                                        <div>
                                            <h2 className="text-lg font-black text-slate-900 uppercase tracking-tight">Advisor Guidebook</h2>
                                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Financial Brain Documentation</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setIsFAQOpen(false)} className="text-slate-400 hover:text-slate-800 bg-slate-200/50 hover:bg-slate-200 p-2 rounded-full transition-all"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="p-6 md:p-8 overflow-y-auto space-y-8 custom-scrollbar text-left">
                                    
                                    <div>
                                        <h3 className="text-sm font-black text-slate-900 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="brain" size={16} className="text-teal-600"/> What is Financial Brain?</h3>
                                        <p className="text-sm font-medium text-slate-600 leading-relaxed">Financial Brain is an institutional-grade wealth projection engine designed for financial partners. It allows you to visually map a client's journey from their current financial baseline to complete financial freedom, simulating decades of market growth, inflation, and redemptions.</p>
                                    </div>
                                    
                                    <div>
                                        <h3 className="text-sm font-black text-slate-900 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="download" size={16} className="text-indigo-600"/> The Excel Sandbox</h3>
                                        <p className="text-sm font-medium text-slate-600 leading-relaxed">Click <strong>Sandbox</strong> to download an offline Excel template. You can email this to a client to fill out on their own time. Once returned, click <strong>Upload</strong> to instantly map all their data into the Financial Brain UI without manual data entry.</p>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                            <h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">1. Personal Profile</h4>
                                            <p className="text-xs font-medium text-slate-600 leading-relaxed">Establishes the foundational timeline (Current Age vs Retirement Age) and baseline income streams required to calculate liquidity.</p>
                                        </div>
                                        <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                            <h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">2. Cashflow & Risk</h4>
                                            <p className="text-xs font-medium text-slate-600 leading-relaxed">Audits current lifestyle burn (rent, EMI, lifestyle) to project exactly how much it will cost to survive in retirement after factoring in inflation.</p>
                                        </div>
                                        <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                            <h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">3. Asset Reservoirs</h4>
                                            <p className="text-xs font-medium text-slate-600 leading-relaxed">Captures existing wealth. In Phase 4, you can "deploy" this wealth strategically to drastically reduce the monthly SIPs required for goals.</p>
                                        </div>
                                        <div className="bg-slate-50 p-5 rounded-xl border border-slate-100">
                                            <h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">4. Target Strategy</h4>
                                            <p className="text-xs font-medium text-slate-600 leading-relaxed">Creates execution buckets. Define goals like children's education or a luxury house, and the engine calculates exact SIPs needed.</p>
                                        </div>
                                    </div>

                                    <div>
                                        <h3 className="text-sm font-black text-slate-900 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="monitor-play" size={16} className="text-purple-600"/> Master Projection Engine</h3>
                                        <p className="text-sm font-medium text-slate-600 leading-relaxed mb-4">Located at the end of the Blueprint. This launches the quantum simulation engine, charting month-by-month cash flows, compounding interest, and automated redemptions (including the retirement freedom paycheck) over the entire planning horizon.</p>
                                        
                                        <div className="space-y-3 bg-white border border-slate-200 p-4 rounded-xl shadow-sm">
                                            <p className="text-xs font-medium text-slate-700"><strong>🐻 Bear Market:</strong> Simulates a severe -15% crash in year 3 followed by a sluggish recovery.</p>
                                            <p className="text-xs font-medium text-slate-700"><strong>⚖️ Base Trajectory:</strong> Uses standard, weighted historical averages based on the Asset Tuner.</p>
                                            <p className="text-xs font-medium text-slate-700"><strong>🐂 Bull Market:</strong> Adds a +3% baseline boost simulating an extended economic boom.</p>
                                            <div className="border-t border-slate-100 pt-3 mt-3">
                                                <p className="text-xs font-medium text-slate-700"><strong>Net Tax Mode:</strong> Dynamically deducts STCG (20%) / LTCG (12.5% over 1.25L) & Debt Slab (30%) taxes strictly during redemption events.</p>
                                                <p className="text-xs font-medium text-slate-700"><strong>Real Value Mode:</strong> Discounts future wealth back to today's purchasing power using the assumed inflation rate.</p>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                                <div className="p-5 border-t border-slate-100 bg-slate-50 shrink-0 text-center">
                                    <button onClick={() => setIsFAQOpen(false)} className="px-8 py-3 bg-slate-900 text-white font-bold text-xs uppercase tracking-widest rounded-xl hover:bg-slate-800 transition-colors shadow-md">Acknowledge & Close</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showResetConfirm && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-200">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl animate-in zoom-in-95 text-center border border-slate-100">
                                <div className="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-5 text-rose-500 border border-rose-100">
                                    <Icon name="refresh-cw" size={32} />
                                </div>
                                <h3 className="text-xl font-black text-slate-900 mb-2 uppercase tracking-tighter">Restart Journey?</h3>
                                <p className="text-xs font-semibold text-slate-500 mb-8 leading-relaxed px-2">This will wipe all current inputs and return you to the command center. This action cannot be undone.</p>
                                <div className="flex gap-3 w-full">
                                    <button onClick={() => setShowResetConfirm(false)} className="flex-1 py-3 rounded-xl text-xs font-bold uppercase tracking-widest text-slate-600 bg-slate-50 border border-slate-200 hover:bg-slate-100 transition-colors shadow-sm">Cancel</button>
                                    <button onClick={confirmResetJourney} className="flex-1 py-3 rounded-xl text-xs font-bold uppercase tracking-widest text-white bg-rose-600 hover:bg-rose-700 shadow-lg shadow-rose-200 transition-all active:scale-95">Restart</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    <div ref={parallaxRef} className={`parallax-wrapper ${isBlueprintMode ? 'bg-blur-active' : ''}`}>
                        <LiquidBackground view={view} isBlueprintMode={isBlueprintMode} />
                        <FloatingPillCloud active={view === 'cover'} />
                    </div>

                    <div className="relative h-full w-full overflow-hidden flex flex-col text-left">
                        {view !== 'cover' && (
                            <header className="px-6 py-4 premium-card border-b border-white/60 flex justify-between items-center no-print animate-in slide-in-from-top duration-700 shrink-0 text-left z-50 rounded-none shadow-[0_4px_20px_rgba(15,23,42,0.03)]">
                                <div className="flex items-center gap-3 cursor-pointer group text-left" onClick={() => setView('cover')}>
                                    <div className="p-2 bg-slate-900 text-white rounded-lg shadow-lg brain-glow leading-none flex items-center justify-center text-left"><Icon name="brain" size={16}/></div>
                                    <div className="text-left"><h1 className="text-sm font-black text-slate-900 uppercase tracking-tighter leading-none text-left">Financial Brain</h1><p className="text-[8px] font-bold text-slate-600 mt-1 uppercase tracking-widest leading-none text-left">Powered by BABA Tools</p></div>
                                </div>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => setIsFAQOpen(true)} className="px-3 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg font-bold text-[10px] uppercase tracking-widest shadow-sm flex items-center gap-2 hover:bg-white active:scale-95 transition-all" title="System Guidebook"><Icon name="book-open" size={14}/> Guide</button>
                                    <button onClick={downloadQuestionnaire} className="px-3 py-2 bg-indigo-50 text-indigo-700 border border-indigo-200 rounded-lg font-bold text-[10px] uppercase tracking-widest shadow-sm flex items-center gap-2 hover:bg-white active:scale-95 transition-all" title="Download Live Sandbox Excel Template"><Icon name="download" size={14}/> Sandbox</button>
                                    <label className="cursor-pointer px-3 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg font-bold text-[10px] uppercase tracking-widest shadow-sm flex items-center gap-2 hover:bg-white active:scale-95 transition-all" title="Upload Edited Excel File">
                                        <Icon name="upload" size={14}/> Upload
                                        <input type="file" accept=".xlsx, .xls, .csv" onChange={handleUploadQuestionnaire} className="hidden" />
                                    </label>
                                    <button onClick={() => setShowResetConfirm(true)} className="px-3 py-2 bg-rose-50 text-rose-700 border border-rose-200 rounded-lg font-bold text-[10px] uppercase tracking-widest shadow-sm flex items-center gap-2 hover:bg-white active:scale-95 transition-all"><Icon name="refresh-cw" size={14}/> Restart</button>
                                </div>
                            </header>
                        )}
                        
                        <div ref={scrollContainerRef} className="page-transition-container flex-1 custom-scrollbar text-left">
                            <div className={view !== 'cover' ? "pt-6 pb-28 text-left" : "text-left"}>
                                {view === 'cover' && (
                                    <div className="min-h-screen flex items-center justify-center p-6 relative text-left cinematic-enter">
                                        <div className="relative max-w-md w-full">
                                            <div className="hero-glow-aura"></div>
                                            <div className="hero-card p-12 text-center relative z-10">
                                                <div className="w-24 h-24 bg-gradient-to-br from-white to-slate-50 rounded-[28px] flex items-center justify-center mx-auto shadow-[0_20px_40px_-10px_rgba(15,118,110,0.2),_inset_0_2px_4px_rgba(255,255,255,1)] border border-white mb-8 text-teal-700 transition-transform hover:scale-105 hover:-rotate-3 relative group">
                                                    <div className="absolute inset-0 bg-teal-400/20 rounded-[28px] opacity-0 group-hover:opacity-100 transition-opacity blur-md"></div>
                                                    <Icon name="brain" size={48} className="relative z-10 drop-shadow-md" />
                                                </div>
                                                <h1 className="text-[40px] font-black heading-font uppercase mb-3 tracking-tighter leading-none text-center text-transparent bg-clip-text bg-gradient-to-br from-slate-900 via-slate-800 to-slate-500 drop-shadow-sm">Financial Brain</h1>
                                                <p className="text-teal-700 text-[10px] font-extrabold uppercase tracking-[0.5em] mb-10 text-center">Powered by BABA Tools</p>
                                                <button onClick={() => setView('flow')} className="w-full hero-btn py-5 rounded-2xl font-extrabold uppercase text-xs tracking-widest flex items-center justify-center gap-3 group text-center relative overflow-hidden">
                                                    <span className="relative z-10 flex items-center gap-2">Start Your Journey <Icon name="chevron-right" size={18} className="group-hover:translate-x-1.5 transition-transform duration-300"/></span>
                                                    <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {view === 'flow' && step < 5 && (
                                    <CalibrationFlow profile={profile} setProfile={setProfile} step={step} />
                                )}
                                {view === 'flow' && step === 5 && (
                                    <SynthesisView profile={profile} setProfile={setProfile} />
                                )}
                            </div>
                        </div>

                        {view !== 'cover' && (
                            <div className="fixed bottom-0 left-0 right-0 z-50 px-4 py-2 bg-white/60 backdrop-blur-xl border-t border-white/80 no-print animate-in slide-in-from-bottom-8 duration-700 shadow-[0_-10px_30px_rgba(15,23,42,0.05)] text-left">
                                <div className="max-w-[1800px] w-full mx-auto px-4 md:px-8 flex items-center justify-between gap-6 text-left">
                                    <div className="flex-1 flex items-center gap-4 text-left">
                                        <button onClick={() => setIsTaskSwitcherOpen(true)} className="w-10 h-10 bg-slate-900 text-white rounded-lg flex items-center justify-center shadow-md hover:scale-110 active:scale-95 transition-all group text-left"><Icon name="grid" size={16}/></button>
                                        <div className="flex-1 max-w-xs hidden sm:block text-left">
                                            <div className="flex justify-between items-end mb-1 text-left">
                                                <span className="text-[8px] font-bold uppercase tracking-[0.4em] text-slate-500 text-left">Sequence Progress</span>
                                                <span className="text-[9px] font-bold text-teal-800 bg-teal-50/80 px-2 py-0.5 rounded border border-teal-200/50 text-left">{Math.round((step/5)*100)}%</span>
                                            </div>
                                            <div className="h-1 bg-slate-200/50 rounded-full overflow-hidden shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)] border border-white/50 text-left"><div className="h-full bg-teal-500 transition-all duration-1000 ease-out shadow-[0_0_15px_rgba(20,184,166,0.8)] text-left" style={{width: `${(step/5)*100}%`}} /></div>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-4 text-left">
                                        {step === 5 ? (
                                            <>
                                                <button onClick={() => setIsTaskSwitcherOpen(true)} className="px-5 h-10 bg-white/80 border border-white rounded-lg font-bold uppercase text-[10px] tracking-widest shadow-sm active:scale-95 transition-all flex items-center gap-2 hover:shadow-md hover:bg-white text-slate-800 text-left">Edit Inputs</button>
                                            </>
                                        ) : (
                                            <div className="flex flex-col items-end gap-1">
                                                <div className="flex gap-2">
                                                    <button onClick={() => step > 1 ? setStep(step-1) : setView('cover')} className="w-10 h-10 bg-white/80 border border-white/60 text-slate-700 rounded-lg flex items-center justify-center hover:bg-white active:scale-95 transition-all shadow-sm text-left"><Icon name="arrow-left" size={16}/></button>
                                                    <button 
                                                        disabled={(step === 1 && (safeNumber(profile.retireAge) <= safeNumber(profile.age))) || (step === 4 && (!profile.horizonAge || safeNumber(profile.horizonAge) <= safeNumber(profile.retireAge)))}
                                                        onClick={() => { if(step < 5) setStep(step+1); }} 
                                                        className="px-6 h-10 bg-slate-900 text-white rounded-lg font-bold uppercase text-[10px] tracking-widest shadow-md active:scale-95 transition-all flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed hover:shadow-lg hover:bg-slate-950 text-left"
                                                    > {step === 4 ? 'Generate Blueprint' : 'Next Step'} <Icon name="arrow-right" size={14}/> </button>
                                                </div>
                                                {step === 4 && (!profile.horizonAge || safeNumber(profile.horizonAge) <= safeNumber(profile.retireAge)) && (
                                                    <span className="text-[8px] text-rose-600 font-bold animate-pulse text-right px-1">Horizon Age must be > Retirement</span>
                                                )}
                                                {step === 1 && (safeNumber(profile.retireAge) <= safeNumber(profile.age)) && (
                                                    <span className="text-[8px] text-rose-600 font-bold animate-pulse text-right px-1">Retirement Age must be > Current Age</span>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                    <TaskSwitcher isOpen={isTaskSwitcherOpen} onToggle={() => setIsTaskSwitcherOpen(!isTaskSwitcherOpen)} currentStep={step} onJump={handleNav} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
