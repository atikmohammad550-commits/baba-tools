  <style>

      --accent: #0d9488;

    /* True macOS Liquid Glass Card */
    .premium-card { 
      background: rgba(255, 255, 255, 0.55);

    .floating-pill-element {

    .pdf-export-mode body, .pdf-export-mode .page-transition-container { background: white !important; overflow: visible !important; height: auto !important; }
    .pdf-export-mode .premium-card, .pdf-export-mode .print-block { background: white !important; border: 1px solid #e2e8f0 !important; box-shadow: none !important; margin-bottom: 24px !important; border-radius: 8px !important; page-break-inside: avoid !important; break-inside: avoid !important; }

    @media print {

      body { background: white !important; color: black !important; overflow: visible !important; height: auto !important; width: 100% !important; margin: 0 !important; }
      #root, .page-transition-container { height: auto !important; overflow: visible !important; display: block !important; }
      .break-inside-avoid, .premium-card, .print-block { break-inside: avoid !important; page-break-inside: avoid !important; display: block !important; border: 1px solid #e2e8f0 !important; box-shadow: none !important; background: white !important; margin-bottom: 20px !important; border-radius: 8px !important; padding: 20px !important; }

      th { background-color: #f1f5f9 !important; text-align: left !important; }
      td:first-child { text-align: left !important; }

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // --- 1. UTILITIES & CONSTANTS ---
    const safeNumber = (val) => {
      if (val === undefined || val === null || val === '') return 0;
      const parsed = parseFloat(String(val).replace(/,/g, ''));
      return isNaN(parsed) ? 0 : parsed;
    };

    const formatCurrency = (val) => "₹" + Math.round(safeNumber(val)).toLocaleString('en-IN');
    
    const formatMask = (val, isCurrency = false) => {
      if (val === "" || val === undefined || val === null) return "";
      let x = val.toString().replace(/,/g, '');
      if (!isCurrency && !/^\d+$/.test(x)) return x; 
      let lastThree = x.substring(x.length - 3);
      let otherNumbers = x.substring(0, x.length - 3);
      if (otherNumbers !== '') lastThree = ',' + lastThree;
      return otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + lastThree;
    };

    const calculateStepUpSip = (targetValue, years, returns, stepUp, lumpsum = 0) => {
      if (years <= 0 || targetValue <= 0) return 0;
      const r = (returns / 100) / 12, g = (stepUp || 0) / 100, n = years * 12;
      const fvLumpsum = lumpsum * Math.pow(1 + r, n);
      const needed = Math.max(0, targetValue - fvLumpsum);
      if (needed <= 0) return 0;
      let low = 0, high = needed * 2;
      for (let i = 0; i < 40; i++) {
        let mid = (low + high) / 2, total = 0, curSip = mid;
        for (let m = 1; m <= n; m++) {
          total = (total + curSip) * (1 + r);
          if (m % 12 === 0) curSip *= (1 + g);
        }
        if (total < needed) low = mid; else high = mid;
      }
      return high;
    };

    const AGE_DATA = {
      19: {c: "Foundation phase.", f: "Risk capacity is near 100%."},
      20: {c: "Direction matters more than degrees.", f: "Focus on compounding skills."},
      21: {c: "Responsibility starts.", f: "Steve Jobs co-founded Apple at age 21."},

      23: {c: "Consistency begins to separate people.", f: "Evan Spiegel launched Snapchat at age 23."},
      24: {c: "Progress may feel slow.", f: "Jeff Bezos was working a regular job at 24."},
      25: {c: "Habits start compounding.", f: "Elon Musk sold Zip2 and reinvested everything at 25."},
      26: {c: "Clarity often follows confusion.", f: "Sachin Tendulkar hit 10,000 ODI runs at age 26."},
      27: {c: "Focus starts outperforming raw effort.", f: "Larry Page was scaling Google globally at 27."},
      28: {c: "Long-term thinking begins here.", f: "Mukesh Ambani joined Reliance Industries at age 28."},
      29: {c: "Comparison becomes dangerous.", f: "Jack Ma was facing repeated rejections at age 29."},
      30: {c: "Discipline matters more than motivation.", f: "Vera Wang entered the fashion industry at 30."},
      31: {c: "Clarity starts replacing confusion.", f: "Sundar Pichai joined Google at age 31."},
      32: {c: "Patience starts paying off.", f: "Chris Gardner was homeless before rebuilding his life."},
      33: {c: "Pressure increases — so does capability.", f: "Alexander Fleming was an unknown researcher at 33."},
      34: {c: "Experience turns into leverage.", f: "Dhirubhai Ambani started Reliance Commercial Corp."},
      35: {c: "Long-term strategy becomes natural.", f: "Henry Ford founded Ford Motor Company at age 35."},
      36: {c: "Simplifying life improves results.", f: "Oprah Winfrey launched Harpo Productions at 36."},
      37: {c: "Energy must be managed, not wasted.", f: "Vinod Khosla exited Sun Microsystems at age 37."},
      38: {c: "Consistency beats intensity now.", f: "Reed Hastings founded Netflix at age 38."},
      39: {c: "Confidence becomes quiet.", f: "Arianna Huffington was recovering from failures at 39."},
      40: {c: "Experience becomes your absolute advantage.", f: "Reid Hoffman co-founded LinkedIn at age 40."},
      41: {c: "Quality starts replacing quantity.", f: "Howard Schultz was expanding Starbucks at 41."},
      42: {c: "Reflection sharpens direction.", f: "Sam Walton opened his first Walmart store at 42."},
      43: {c: "Stability enables creativity.", f: "Jeff Bezos launched AWS at age 43."},
      44: {c: "Legacy thinking begins.", f: "Indra Nooyi was leading strategy at PepsiCo at 44."},
      45: {c: "Reinvention is still very real.", f: "Colonel Sanders was still struggling at age 45."},
      46: {c: "Wisdom improves decision-making.", f: "Narayan Murthy was scaling Infosys at 46."},
      47: {c: "Health becomes an asset.", f: "Satya Nadella led cloud initiatives at age 47."},
      48: {c: "Calm thinking wins more than speed.", f: "Ray Dalio was building Bridgewater at 48."},
      49: {c: "Preparation beats urgency.", f: "Jeff Weiner led LinkedIn at age 49."},
      50: {c: "Patience compounds faster than effort.", f: "Ray Kroc turned McDonald’s global at age 50."},
      51: {c: "Experience protects from bad decisions.", f: "Satya Nadella became CEO of Microsoft at 51."},
      52: {c: "Perspective is valuable.", f: "Jeff Bezos expanded Amazon globally at age 52."},
      53: {c: "Less effort, better outcomes.", f: "Narendra Modi became CM of Gujarat at age 53."},
      54: {c: "Clarity beats ambition.", f: "Indra Nooyi became CEO of PepsiCo at age 54."},
      55: {c: "Consistency protects what you’ve built.", f: "Jack Ma stepped back to focus on education at 55."},
      60: {c: "Wisdom outweighs ambition.", f: "Harland Sanders began franchising KFC at age 60."},
      65: {c: "Freedom increases with acceptance.", f: "Vera Wang was still expanding globally at 65."},
      70: {c: "Perspective becomes your greatest asset.", f: "J.K. Rowling was still writing at age 70."},
      75: {c: "Legacy becomes intentional.", f: "Nelson Mandela became President at age 75."},
      80: {c: "Time turns experience into wisdom.", f: "Galileo continued writing at age 80."},
      90: {c: "Presence outweighs ambition.", f: "Picasso was still painting at age 90."}
    };

    const getAgeInfo = (age) => {
      const numAge = parseInt(age);
      if (!numAge || isNaN(numAge) || numAge <= 0) return null; 
      if (numAge <= 18) return { c: "Foundation years.", f: "Most successful leaders did not build empires before adulthood." };
      let closest = 30;
      const keys = Object.keys(AGE_DATA).map(Number);
      closest = keys.reduce((prev, curr) => Math.abs(curr - numAge) < Math.abs(prev - numAge) ? curr : prev);
      return AGE_DATA[closest];
    };

    const getIncomeComment = (type, val) => {
      const v = safeNumber(val);
      if (v <= 0) return null; 
      if (type === 'salary') {
        if (v < 65000) return { c: "Discipline starts here.", f: "Focus on maximizing your savings rate." };
        if (v < 125000) return { c: "Growth zone.", f: "Capital allocation begins to matter more than mere saving." };
        return { c: "High leverage income.", f: "Tax optimization and asset allocation become critical." };
      }
      if (type === 'business') {
         if (v < 150000) return { c: "Traction achieved.", f: "Focus on reinvesting capital back into the business." };
         return { c: "Scaling phase.", f: "Begin diversifying wealth away from your single-point business risk." };
      }
    };

    const ASSET_CLASSES_LIST = [
      { id: "mfPool", label: "Mutual Funds", yield: 12, color: "#0f766e", isLiquid: true },
      { id: "stockPool", label: "Equity Stocks", yield: 15, color: "#4338ca", isLiquid: true },
      { id: "debtPool", label: "Debt Portfolio", yield: 8, color: "#be123c", isLiquid: true },
      { id: "cashPool", label: "Cash/Bank", yield: 4, color: "#d97706", isLiquid: true },
      { id: "fdPool", label: "Fixed Deposits", yield: 6, color: "#475569", isLiquid: true },
      { id: "realAssets", label: "Real Estate (Illiquid)", yield: 8, color: "#0369a1", isLiquid: false }
    ];

    const SUGGESTED_GOALS = [
      { name: "Luxury Home", cost: 10000000, horizon: 10, icon: "home" },
      { name: "World Tour", cost: 1500000, horizon: 3, icon: "palmtree" },
      { name: "Luxury Car", cost: 4000000, horizon: 5, icon: "car" },
      { name: "Business Seed Fund", cost: 5000000, horizon: 7, icon: "briefcase" }
    ];

    const CHILD_MILESTONES = [
      { id: "m10", label: "10th Std", age: 15, defaultCost: 200000, defaultInflation: 10 },
      { id: "m12", label: "12th Std", age: 17, defaultCost: 300000, defaultInflation: 10 },
      { id: "mCol", label: "College", age: 18, defaultCost: 1500000, defaultInflation: 10 },
      { id: "mMar", label: "Marriage", age: 25, defaultCost: 2500000, defaultInflation: 8 }
    ];

    const KEYWORDS = [
      "QUANTUM", "LEGACY", "COMPOUND", "HORIZON", "STRATEGY", "DESTINY", "EQUITY", "RESERVOIR", 
      "CAPITAL", "NAVIGATOR", "BLUEPRINT", "FIDUCIARY", "LIQUID", "FISCAL", "ZENITH", "CORE", 
      "MANIFEST", "MATRIX", "VITALITY", "INFLOW", "ASSET", "WEALTH", "SIP", "AUDIT", "GROWTH", "FUTURE"
    ];

    // --- 2. SHARED COMPONENTS ---
    const useScrollIndicator = (containerRef, dependencies) => {
      const [showIndicator, setShowIndicator] = useState(false);
      useEffect(() => {
        const el = containerRef.current; if (!el) return;
        const handleScroll = () => {
          // 30px tolerance buffer to prevent false positive scroll indicators
          const isScrollable = el.scrollHeight > el.clientHeight + 30;
          const isAtBottom = el.scrollHeight - Math.ceil(el.scrollTop) - el.clientHeight < 30;
          setShowIndicator(isScrollable && !isAtBottom);
        };
        handleScroll(); 
        el.addEventListener('scroll', handleScroll);
        window.addEventListener('resize', handleScroll);
        const timeoutId = setTimeout(handleScroll, 500); // Check after animation loads
        return () => { el.removeEventListener('scroll', handleScroll); window.removeEventListener('resize', handleScroll); clearTimeout(timeoutId); };
      }, [containerRef, ...dependencies]);
      return showIndicator;
    };

    const FloatingPillCloud = ({ active }) => {
      const containerRef = useRef(null);
      const activeRef = useRef(active);
      useEffect(() => { activeRef.current = active; }, [active]);
      
      const pills = useMemo(() => {
        const hdWords = [...KEYWORDS].slice(0, 45); 
        return Array.from({ length: 45 }).map((_, i) => ({
          id: i, word: hdWords[i % hdWords.length], x: Math.random() * 100, y: Math.random() * 100,
          vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25, driftX: 0, driftY: 0, interactX: 0, interactY: 0,
        }));
      }, []);

      useEffect(() => {
        const container = containerRef.current; if (!container) return; 
        const domEls = pills.map(p => {
          const el = document.createElement('div');
          el.className = 'floating-pill-element px-4 py-2 text-sm font-bold uppercase tracking-widest';
          el.innerText = p.word; el.style.left = `${p.x}%`; el.style.top = `${p.y}%`;
          container.appendChild(el); return { el, ...p }; 
        });

        let animationFrameId; let mouseX = -1000; let mouseY = -1000;

        const update = () => {
          if (activeRef.current) {
            const rect = container.getBoundingClientRect();
            domEls.forEach(p => {
              p.driftX += p.vx; p.driftY += p.vy;
              if (p.driftX > 150 || p.driftX < -150) p.vx *= -1;
              if (p.driftY > 150 || p.driftY < -150) p.vy *= -1;
              const pillPxX = (p.x / 100) * rect.width + p.driftX;
              const pillPxY = (p.y / 100) * rect.height + p.driftY;
              const dx = mouseX - pillPxX; const dy = mouseY - pillPxY;
              const dist = Math.sqrt(dx*dx + dy*dy); 
              let targetTx = 0, targetTy = 0;
              if (dist < 200) {
                const force = (200 - dist) / 200;
                const angle = Math.atan2(dy, dx);
                targetTx = Math.cos(angle) * force * -50;
                targetTy = Math.sin(angle) * force * -50;
              }
              p.interactX += (targetTx - p.interactX) * 0.08; p.interactY += (targetTy - p.interactY) * 0.08;
              p.el.style.transform = `translate3d(${p.driftX + p.interactX}px, ${p.driftY + p.interactY}px, 0)`;
            });
          }
          animationFrameId = requestAnimationFrame(update);
        };
        const onMouseMove = (e) => { if (!activeRef.current) return; const rect = container.getBoundingClientRect(); mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top; };
        window.addEventListener('mousemove', onMouseMove); update();
        return () => { window.removeEventListener('mousemove', onMouseMove); cancelAnimationFrame(animationFrameId); if (container) container.innerHTML = ''; };
      }, [pills]);
      return <div ref={containerRef} className={`absolute inset-0 overflow-hidden z-0 pill-container transition-opacity duration-500 ${active ? 'opacity-100' : 'opacity-0 hidden'}`}></div>;
    };
    
    const LiquidBackground = ({ view, isBlueprintMode }) => (
      <div className={`fixed inset-0 z-[-20] transition-all duration-1000 ${isBlueprintMode ? 'bg-blueprint-static' : 'bg-[#e2e8f0]'}`}>
        {!isBlueprintMode && (
          <div className="mesh-container opacity-100">
            <div className="liquid-blob blob-1"></div>
            <div className="liquid-blob blob-2"></div>
            <div className="liquid-blob blob-3"></div>
            <div className="liquid-blob blob-4"></div>
          </div>
        )}
      </div>
    );

    const Icon = ({ name, size = 18, className = "" }) => {
      const containerRef = useRef(null);
      useEffect(() => {
        if (window.lucide && containerRef.current) {
          containerRef.current.innerHTML = `<i data-lucide="${name}" width="${size}" height="${size}"></i>`;
          window.lucide.createIcons({ root: containerRef.current });
        }
      }, [name, size, className]);
      return <span ref={containerRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }} />;
    };

    const AnimatedCurrency = ({ value, prefix = "₹" }) => {
      const [display, setDisplay] = useState(0);
      useEffect(() => {
        let start = display; const end = safeNumber(value); const duration = 600; const startTime = performance.now();
        const animate = (now) => {
          const progress = Math.min((now - startTime) / duration, 1);
          setDisplay(start + (end - start) * (1 - Math.pow(1 - progress, 3)));
          if (progress < 1) requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }, [value]);
      return <span>{prefix}{Math.round(display).toLocaleString('en-IN')}</span>;
    };

    const handleKeyDownNext = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const inputs = Array.from(document.querySelectorAll('input, button:not(.mission-card), select'));
        const index = inputs.indexOf(e.currentTarget);
        if (index > -1 && index < inputs.length - 1) {
          const nextEl = inputs[index + 1];
          if (nextEl) nextEl.focus();
        }
      }
    };

    const Toggle = ({ label, value, onChange, fact }) => (

          <span className="text-base font-bold text-slate-800 tracking-tight">{label}</span>
          <div className="flex bg-slate-200/60 p-1.5 rounded-xl shrink-0 border border-slate-300/50 shadow-inner">
            <button onClick={() => onChange(true)} className={`px-6 py-2.5 rounded-lg text-xs font-black transition-all ${value ? 'bg-white text-slate-900 shadow-md scale-100' : 'text-slate-500 scale-95 hover:scale-100'}`}>YES</button>
            <button onClick={() => onChange(false)} className={`px-6 py-2.5 rounded-lg text-xs font-black transition-all ${!value ? 'bg-white text-slate-900 shadow-md scale-100' : 'text-slate-500 scale-95 hover:scale-100'}`}>NO</button>
          </div>
        </div>
        {fact && (
           <div className="mt-2 p-4 bg-indigo-50/80 backdrop-blur-md border border-indigo-200/60 rounded-2xl shadow-sm animate-in zoom-in-95 duration-500">
            <p className="text-sm font-bold text-indigo-900 flex gap-2 items-start"><Icon name="lightbulb" size={18} className="text-indigo-600 shrink-0 mt-0.5"/> <span>{fact.c}</span></p>
          </div>
        )}
      </div>
    );

    const InputField = ({ label, value, onChange, prefix, suffix, type="text", isError, maxLength, yieldBadge, fact, isAge, noNumbers }) => {
      const [localVal, setLocalVal] = useState(value ? formatMask(value, prefix === "₹") : "");
      useEffect(() => { setLocalVal(formatMask(value, prefix === "₹")); }, [value, prefix]);
      const handleText = (v) => {
        let raw = v.replace(/,/g, '');
        if (suffix === '%' || suffix === 'Yrs') { raw = raw.replace(/[^0-9.]/g, ""); const parts = raw.split('.'); if(parts.length > 2) raw = parts[0] + '.' + parts.slice(1).join(''); } 
        else if (type === "number" || isAge) { raw = raw.replace(/[^0-9]/g, ""); }
        if (noNumbers) raw = raw.replace(/[0-9]/g, "");
        if (isAge && raw !== "") { if (parseInt(raw) > 99) raw = "99"; }
        if (maxLength) raw = raw.slice(0, maxLength);
        setLocalVal(formatMask(raw, prefix === "₹")); onChange(raw);
      };

      return (
        <div className="input-wrapper space-y-2 group relative text-left">
          <div className="flex justify-between items-end px-1">
            <label className="text-[11px] font-black text-slate-700 uppercase tracking-widest">{label}</label>
            {yieldBadge && <span className="text-[10px] font-bold text-emerald-800 bg-emerald-100/80 px-2.5 py-0.5 rounded shadow-sm border border-emerald-200/50">Yield: {yieldBadge}%</span>}
          </div>
          <div className="relative flex items-center">
            {prefix && <span className="absolute left-4 text-slate-400 font-bold z-20 text-lg">{prefix}</span>}
            <input type="text" value={localVal} onChange={(e) => handleText(e.target.value)} onKeyDown={handleKeyDownNext} className={`premium-input relative z-10 ${prefix ? 'pl-10' : ''} ${suffix ? 'pr-14' : ''} ${isError ? 'border-rose-400 bg-rose-50 focus:border-rose-500' : ''}`} placeholder={label.includes('Name') ? 'Enter...' : '0'} />
            {suffix && <span className="absolute right-4 text-slate-400 text-sm font-bold z-20">{suffix}</span>}
          </div>
          {fact && (
            <div className="mt-3 p-4 bg-white/60 backdrop-blur-md border border-white/60 rounded-2xl shadow-sm animate-in zoom-in-95 duration-500">
              <p className="text-sm font-bold text-slate-800 flex gap-2 items-start"><Icon name="sparkles" size={16} className="text-amber-600 shrink-0 mt-0.5"/> <span>{fact.c}</span></p>
              {fact.f && <p className="text-xs font-medium text-slate-600 pt-3 border-t border-slate-200/60 mt-3 flex gap-2"><Icon name="book-open" size={14}/> <span><strong>Fact:</strong> {fact.f}</span></p>}
            </div>

    };

    const TaskSwitcher = ({ isOpen, onToggle, currentStep, onJump }) => {
      const steps = [
        { n: 1, label: "Profile", icon: "user", desc: "Identity & Flow" }, 
        { n: 2, label: "Burn", icon: "flame", desc: "Cash Flow Audit" }, 
        { n: 3, label: "Assets", icon: "landmark", desc: "Wealth Reservoirs" }, 
        { n: 4, label: "Horizon", icon: "target", desc: "Strategy Horizon" }, 
        { n: 5, label: "Blueprint", icon: "brain", desc: "Master Projection" }

      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-[5000] flex flex-col items-center justify-center p-6 sm:p-12 no-print text-left mission-control-overlay animate-in fade-in duration-300">

        </div>

    const AssetAllocationPie = ({ profile }) => {
      const data = useMemo(() => {
        const d = ASSET_CLASSES_LIST.map(a => ({ label: a.label, value: safeNumber(profile[a.id]), color: a.color })).filter(d => d.value > 0);
        const customTotal = (profile.customReservoirs || []).reduce((a,c)=>a+safeNumber(c.value), 0);
        if(customTotal > 0) d.push({ label: "Custom Assets", value: customTotal, color: "#6366f1" });
        return d;
      }, [profile]);
      const total = data.reduce((a,b)=>a+b.value, 0);

          <div className="flex flex-col items-center justify-center p-8 bg-white/40 backdrop-blur-md rounded-2xl border-2 border-white/60 border-dashed text-center shadow-sm opacity-80 h-full min-h-[200px]">

          <div className="relative w-40 h-40 shrink-0">

                const percentage = (item.value / total) * 100;
                const strokeDasharray = `${percentage * circumference} ${circumference}`;
                const strokeDashoffset = -currentAngle;
                currentAngle += percentage * circumference;
                return ( <circle key={i} cx="16" cy="16" r={radius/2} fill="transparent" stroke={item.color} strokeWidth="16" strokeDasharray={strokeDasharray} strokeDashoffset={strokeDashoffset} className="transition-all duration-1000 ease-out hover:opacity-80" /> );

              <circle r="10" cx="16" cy="16" fill="#ffffff" />
            </svg>
            <div className="absolute inset-0 flex items-center justify-center flex-col">
              <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Total</span>
              <span className="text-sm font-extrabold text-slate-900 tracking-tight">{formatCurrency(total)}</span>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-x-6 gap-y-4 w-full text-left">
            {data.map((item, i) => (
              <div key={i} className="flex flex-col text-sm">
                <span className="flex items-center gap-2 font-bold text-slate-600 truncate mb-1.5" title={item.label}><span className="w-3 h-3 rounded-full shrink-0 shadow-sm" style={{backgroundColor: item.color}}></span> {item.label}</span>
                <span className="font-black text-slate-900 text-lg ml-5">{Math.round((item.value/total)*100)}%</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    const InflationChart = ({ currentBurn, futureBurn, years, rate }) => {
      const ratio = futureBurn / (currentBurn || 1);
      return (
        <div className="flex items-end justify-center gap-6 h-40 p-8 bg-white/60 backdrop-blur-2xl rounded-2xl border border-white/80 shadow-sm break-inside-avoid w-full">
          <div className="flex flex-col items-center gap-2">
            <div className="w-16 bg-teal-300/80 rounded-t-xl shadow-sm border border-white/80" style={{height: '40px'}}></div>
            <span className="text-xs font-bold text-slate-500 tracking-widest uppercase">Today</span>
            <span className="text-base font-black text-slate-800">{formatCurrency(currentBurn)}</span>
          </div>
          <div className="flex-1 flex flex-col items-center justify-center pb-8 border-b-2 border-dashed border-rose-300 relative px-4">
            <span className="text-xs font-bold text-rose-700 bg-rose-50 px-4 py-1.5 rounded-lg absolute top-0 shadow-sm whitespace-nowrap border border-rose-200">+{ratio.toFixed(1)}x (Inflation {rate}%)</span>
            <div className="w-full h-0 relative"><div className="absolute right-0 top-[-6px] w-3 h-3 border-r-2 border-t-2 border-rose-400 transform rotate-45"></div></div>
          </div>
          <div className="flex flex-col items-center gap-2">
            <div className="w-16 bg-rose-400 rounded-t-xl shadow-md relative border border-rose-300" style={{height: '100px'}}><div className="absolute inset-0 bg-gradient-to-t from-rose-500 to-transparent rounded-t-xl opacity-50"></div></div>
            <span className="text-xs font-bold text-rose-600 tracking-widest uppercase">Year {years}</span>
            <span className="text-lg font-black text-slate-900">{formatCurrency(futureBurn)}</span>
          </div>
        </div>

    };

    const PhaseWrapper = ({ num, title, layout, children, gridClasses, delayClass }) => {
      const isList = layout === 'list';
      return (
        <div className={`relative ${isList ? 'pl-10 md:pl-16 w-full' : gridClasses} break-inside-avoid print-block animate-in fade-in duration-500 ${delayClass}`}>
          {isList && ( <div className="absolute left-0 top-6 w-10 h-10 bg-slate-800 text-white rounded-full flex items-center justify-center font-black text-base shadow-lg z-10 no-print ring-4 ring-[#f8fafc]">{num}</div> )}
          <div className={`premium-card break-inside-avoid ${isList ? 'p-8 md:p-10' : 'p-8 flex flex-col h-full'} text-left group`}>
            {!isList && title && ( <div className="flex items-center gap-3 border-b border-slate-200/80 pb-4 mb-6 text-left relative z-10"><div className="w-8 h-8 bg-slate-800 text-white rounded-lg flex items-center justify-center font-black text-xs shadow-sm shrink-0">{num}</div><h3 className="text-xs font-black uppercase tracking-widest text-slate-800">{title}</h3></div> )}
            {isList && title && ( <div className="flex items-center justify-between border-b border-slate-200/80 pb-5 mb-8 text-left relative z-10"><h3 className="text-3xl font-black heading-font text-slate-900 tracking-tight">{title}</h3></div> )}

          </div>

    const Slide = ({ title, subtitle, children }) => (
      <div className="flex flex-col items-center justify-center h-full space-y-12 animate-in slide-in-from-right fade-in duration-500 w-full max-w-7xl mx-auto px-8">
        <div className="text-center"><h2 className="text-5xl font-black heading-font text-slate-900 uppercase tracking-widest mb-4">{title}</h2>{subtitle && <p className="text-teal-700 font-bold text-2xl">{subtitle}</p>}</div>
        {children}
      </div>
    );
    
    const SlideCard = ({ icon, title, value, color, valueSize="text-5xl" }) => (
      <div className="p-12 bg-white/80 border border-white shadow-2xl text-center rounded-[40px] backdrop-blur-2xl">
        <Icon name={icon} size={56} className={`mx-auto text-${color}-500 mb-6`}/>
        <p className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-3">{title}</p>
        <p className={`${valueSize} font-black text-slate-900`}>{value}</p>
      </div>
    );

    // --- 3. MAIN APP COMPONENTS ---
    const CalibrationFlow = ({ profile, setProfile, step }) => {
      const ageFact = useMemo(() => getAgeInfo(profile.age), [profile.age]);
      const incomeComment = useMemo(() => { return profile.businessIncome ? getIncomeComment('business', profile.businessIncome) : getIncomeComment('salary', profile.salary); }, [profile.salary, profile.businessIncome]);
      const marriedComment = useMemo(() => { if(!profile.married) return {c: "Single? Maximum flexibility.", f: "Marriage shifts life from individual decisions to shared capital planning."}; return {c: "Marriage shifts life to shared responsibility.", f:"Ensure your term life cover is updated to protect dependents."}; }, [profile.married]);
      const childComment = useMemo(() => {
        if(!profile.hasChildren) return {c: "Consolidation phase.", f:"Invest surplus heavily before education costs arise."};
        const cnt = safeNumber(profile.childCount);
        if(cnt === 1) return {c: "Raising one child allows focused attention, but structured education planning is critical."};
        return {c: "Balancing resources and dual education planning horizons becomes paramount."};
      }, [profile.hasChildren, profile.childCount]);

      const monthlyBurnBase = safeNumber(profile.rent) + safeNumber(profile.household) + safeNumber(profile.lifestyle) + safeNumber(profile.emi);
      const monthlyInsVac = (safeNumber(profile.healthPremium) + safeNumber(profile.lifePremium)) / 12 + (safeNumber(profile.vacation)/12);
      
      const totals = useMemo(() => {
        let income = safeNumber(profile.salary) + safeNumber(profile.businessIncome);
        if (profile.married && profile.addCoCFO) income += safeNumber(profile.spouseIncome);
        const assets = ASSET_CLASSES_LIST.reduce((a, c) => a + safeNumber(profile[c.id]), 0) + (profile.customReservoirs || []).reduce((a, c) => a + safeNumber(c.value), 0);
        return { income, burn: monthlyBurnBase + monthlyInsVac, assets };
      }, [profile, monthlyBurnBase, monthlyInsVac]);

      return (
        <div key={step} className="max-w-[1600px] w-full mx-auto px-6 lg:px-10 grid grid-cols-1 lg:grid-cols-12 gap-8 pb-24 cinematic-enter text-left">
          <div className="lg:col-span-8 xl:col-span-9">
            <div className="premium-card p-8 md:p-10 text-left print-block break-inside-avoid">
              <h2 className="text-2xl font-black heading-font text-slate-900 uppercase tracking-widest border-b border-slate-200/80 pb-5 mb-8">

              </h2>

              {step === 1 && (
                <div className="space-y-8 text-left animate-in fade-in duration-300">
                  <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                    <InputField label="Full Name" value={profile.name} noNumbers onChange={v => setProfile({...profile, name: v})} placeholder="Enter Full Name" />
                    <div className="hidden xl:flex items-center px-4">{profile.name && <p className="text-sm font-bold text-teal-700 tracking-tight animate-in fade-in">Hello {profile.name}, configuring parameters...</p>}</div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                    <InputField label="Current Age" value={profile.age} isAge suffix="Yrs" onChange={v => setProfile({...profile, age: v})} fact={safeNumber(profile.age) > 0 ? ageFact : null} />
                    <InputField label="Retirement Age" value={profile.retireAge} isAge suffix="Yrs" onChange={v => setProfile({...profile, retireAge: v})} isError={profile.retireAge && Number(profile.retireAge) <= Number(profile.age)} />
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 text-left">
                    <InputField label="Monthly Salary (Net)" prefix="₹" value={profile.salary} type="number" onChange={v => setProfile({...profile, salary: v})} fact={safeNumber(profile.salary) > 0 ? getIncomeComment('salary', profile.salary) : null} />
                    <InputField label="Monthly Business Income" prefix="₹" value={profile.businessIncome} type="number" onChange={v => setProfile({...profile, businessIncome: v})} fact={safeNumber(profile.businessIncome) > 0 ? getIncomeComment('business', profile.businessIncome) : null} />
                  </div>
                  
                  <div className="pt-8 mt-8 border-t border-slate-200/80 space-y-6 text-left max-w-3xl">
                    <h3 className="text-xs font-black uppercase text-slate-500 tracking-widest mb-4">Family & Dependents Matrix</h3>
                    <Toggle label="Are you married?" value={profile.married} onChange={v => setProfile({...profile, married: v, hasChildren: v ? profile.hasChildren : false, addCoCFO: v ? profile.addCoCFO : false})} fact={marriedComment} />
                    
                    {profile.married && (
                      <div className="space-y-6 animate-in slide-in-from-top-4 text-left bg-slate-50/50 p-6 rounded-2xl border border-slate-200/80 shadow-sm mt-5">
                        <Toggle label="Add Co-CFO (Household Plan)?" value={profile.addCoCFO} onChange={v => setProfile({...profile, addCoCFO: v})} />
                        {profile.addCoCFO && (
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 pt-5 border-t border-slate-200/80 animate-in fade-in">
                            <InputField label="Spouse Name" value={profile.spouseName} noNumbers onChange={v => setProfile({...profile, spouseName: v})} placeholder="Enter Name" />
                            <InputField label="Spouse Age" value={profile.spouseAge} isAge suffix="Yrs" onChange={v => setProfile({...profile, spouseAge: v})} />
                            <InputField label="Spouse Monthly Income" prefix="₹" value={profile.spouseIncome} type="number" onChange={v => setProfile({...profile, spouseIncome: v})} />
                            <InputField label="Spouse Retire Age" value={profile.spouseRetireAge} isAge suffix="Yrs" onChange={v => setProfile({...profile, spouseRetireAge: v})} />
                          </div>
                        )}
                        <div className="pt-5 border-t border-slate-200/80 mt-5">
                          <Toggle label="Do you have children?" value={profile.hasChildren} onChange={v => setProfile({...profile, hasChildren: v})} fact={childComment} />
                          {profile.hasChildren && (
                            <div className="grid grid-cols-1 sm:grid-cols-2 mt-5 animate-in fade-in">
                              <InputField label="Number of children" value={profile.childCount} onChange={v => { let num = parseInt(v) || 0; if(num > 10) num = 10; setProfile({...profile, childCount: num}); }} type="number" maxLength={2} />
                            </div>
                          )}
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {step === 2 && (
                <div className="space-y-8 text-left animate-in fade-in duration-300">
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 text-left">
                    <InputField label="Monthly Rent" prefix="₹" value={profile.rent} type="number" onChange={v => setProfile({...profile, rent: v})} />
                    <InputField label="Monthly EMI" prefix="₹" value={profile.emi} type="number" onChange={v => setProfile({...profile, emi: v})} />
                  </div>
                  {safeNumber(profile.emi) > 0 && (
                    <div className="animate-in slide-in-from-top-4 bg-slate-50/50 p-6 rounded-2xl border border-slate-200/80 text-left shadow-sm space-y-6 max-w-3xl">

              {step === 3 && (
                <div className="space-y-8 text-left animate-in fade-in duration-300">

                    <span className="text-xs font-bold uppercase text-teal-900 tracking-widest">Asset Return Framework</span>

                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 text-left">

                  <div className="space-y-6 pt-8 border-t border-slate-200/80 text-left max-w-3xl">
                    <h4 className="text-xs font-black text-slate-800 uppercase tracking-widest mb-4">Custom Asset Reservoirs</h4>
                    {(profile.customReservoirs || []).map((res, i) => (
                      <div key={res.id} className="relative text-left bg-white/70 backdrop-blur-md p-6 rounded-2xl border border-slate-200/80 shadow-sm grid grid-cols-1 gap-5">
                        <button onClick={() => { let r = [...(profile.customReservoirs||[])]; r.splice(i, 1); setProfile({...profile, customReservoirs: r}); }} className="absolute -top-3 -right-3 w-8 h-8 bg-rose-100 text-rose-600 hover:bg-rose-700 hover:text-white rounded-full text-sm font-black z-20 shadow-sm transition-all flex items-center justify-center border border-rose-200">✕</button>

                          <InputField label="Current Value" prefix="₹" value={res.value} type="text" onChange={v => { let r = [...(profile.customReservoirs||[])]; r[i].value = v; setProfile({...profile, customReservoirs: r}); }} />

                        <div className="mt-2 p-4 bg-slate-50/80 rounded-xl border border-slate-200/80 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">

                            <button onClick={() => { let r = [...(profile.customReservoirs||[])]; r[i].isLiquid = false; setProfile({...profile, customReservoirs: r}); }} className={`px-4 py-2 rounded-md text-xs font-bold transition-all ${!res.isLiquid ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:text-slate-800 hover:bg-slate-50'}`}>Illiquid</button>

                        </div>
                      </div>
                    ))}
                    <button onClick={() => setProfile({...profile, customReservoirs: [...(profile.customReservoirs||[]), {id: Date.now(), name: "Custom Reservoir", value: "", isLiquid: true}]})} className="w-full py-5 border-2 border-dashed border-slate-300 rounded-2xl text-xs font-bold uppercase text-slate-500 tracking-widest hover:border-teal-500 hover:text-teal-700 hover:bg-teal-50/50 transition-all shadow-sm">+ Add custom reservoir</button>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 pt-8 border-t border-slate-200/80 text-left">
                    <InputField label="Current Monthly SIP" prefix="₹" value={profile.currentSip} type="number" onChange={v => setProfile({...profile, currentSip: v})} />
                    <InputField label="SIP Step-up %" suffix="%" value={profile.sipStepUp} type="number" onChange={v => setProfile({...profile, sipStepUp: v})} fact={{c: "Increasing SIP annually by 5-10% dramatically accelerates compounding."}} />
                  </div>
                </div>
              )}

              {step === 4 && (
                <div className="space-y-8 text-left animate-in fade-in duration-300">
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 text-left">
                    <InputField label="Absolute Planning Horizon (Life Expectancy)" value={profile.horizonAge} isAge suffix="Yrs" onChange={v => setProfile({...profile, horizonAge: v})} isError={profile.horizonAge && Number(profile.horizonAge) <= Number(profile.retireAge)} fact={{c: "We project wealth until this age to ensure you never run out of capital."}} />
                  </div>
                  
                  {profile.hasChildren && (
                    <div className="p-8 bg-white/70 backdrop-blur-xl rounded-3xl border border-white/90 space-y-6 shadow-sm text-left max-w-4xl mt-6">
                      <Toggle label="Do you want to model your child's education milestones?" value={profile.childNodeActive} onChange={v => setProfile({...profile, childNodeActive: v})} />
                      {profile.childNodeActive && (
                        <div className="mt-6">
                          <p className="text-xs font-bold text-teal-800 uppercase tracking-widest mb-5">Select Milestones to Activate:</p>
                          {Array.from({length: Math.min(10, Math.max(1, Number(profile.childCount)||1))}).map((_, ci) => (
                          <div key={ci} className="space-y-5 pt-5 border-t border-slate-200/80 text-left">
                            <div className="flex justify-between items-center text-left bg-slate-50/80 p-3 rounded-xl border border-slate-200/80 shadow-sm">
                              <span className="text-xs font-bold uppercase text-slate-800 tracking-wider">Child {ci+1} Current Age</span>
                              <input type="text" maxLength="2" className="w-16 premium-input py-2 text-center text-sm font-bold shadow-inner" value={profile.childAges[ci]||""} onChange={e => setProfile({...profile, childAges: {...profile.childAges, [ci]: e.target.value.replace(/[^0-9]/g, "")}})} placeholder="Yrs" />
                            </div>
                            {profile.childAges[ci] && (
                              <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 text-left mt-4">
                                {CHILD_MILESTONES.map(m => {
                                  const yrsLeft = m.age - Number(profile.childAges[ci]);
                                  if(yrsLeft <= 0) return null;
                                  const mId = `c${ci}-${m.id}`;
                                  const active = profile.activeChildMilestones[mId];
                                  const mData = profile.childMilestoneData[mId] || { cost: m.defaultCost, inflation: m.defaultInflation || 10 };
                                  const fCost = mData.cost * Math.pow(1 + (mData.inflation / 100), yrsLeft);
                                  return (
                                    <div key={mId} className={`p-5 rounded-2xl border transition-all duration-300 ${active ? 'border-teal-400 bg-white shadow-lg ring-2 ring-teal-500/10' : 'border-slate-200 bg-white/50 hover:bg-white/90 cursor-pointer shadow-sm'} text-left relative overflow-hidden`} onClick={() => !active && setProfile({...profile, activeChildMilestones: {...profile.activeChildMilestones, [mId]: true}})}>
                                      {!active && <div className="absolute top-4 right-4 w-6 h-6 rounded-full bg-slate-100 text-slate-400 flex items-center justify-center text-lg font-bold transition-colors group-hover:bg-slate-200">+</div>}
                                      <div className="flex justify-between items-start mb-4 text-left">
                                        <div className="space-y-1.5 text-left"><p className="text-sm font-bold uppercase tracking-wider text-slate-900">{m.label}</p><p className="text-[10px] font-bold text-teal-800 bg-teal-50 px-2.5 py-0.5 rounded border border-teal-100 uppercase tracking-widest inline-block shadow-sm">{yrsLeft} Yrs Left</p></div>
                                        {active && <div className="w-7 h-7 rounded-full flex items-center justify-center bg-slate-800 text-white cursor-pointer shadow-md hover:bg-rose-600 transition-colors" onClick={(e) => { e.stopPropagation(); setProfile({...profile, activeChildMilestones: {...profile.activeChildMilestones, [mId]: false}}); }}><Icon name="x" size={14}/></div>}
                                      </div>
                                      {active && (
                                        <div className="space-y-4 pt-4 border-t border-slate-100 animate-in fade-in text-left">
                                          <InputField label="Cost Today" prefix="₹" value={mData.cost} type="number" onChange={v => setProfile({...profile, childMilestoneData: {...profile.childMilestoneData, [mId]: {...mData, cost: v}}})} />
                                          <InputField label="Inflation" suffix="%" value={mData.inflation} type="number" onChange={v => setProfile({...profile, childMilestoneData: {...profile.childMilestoneData, [mId]: {...mData, inflation: v}}})} />
                                          <div className="text-right pt-3 mt-2 border-t border-slate-100 text-left bg-teal-50/50 p-3 rounded-xl"><span className="text-[9px] font-bold uppercase text-slate-600 block mb-0.5 tracking-widest">Future Target</span><span className="text-lg font-black text-teal-800 tracking-tight">{formatCurrency(fCost)}</span></div>
                                        </div>
                                      )}
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        ))}
                        </div>
                      )}
                    </div>
                  )}

                  <div className="pt-8 border-t border-slate-200/80 space-y-6 text-left">
                    <p className="text-sm font-black text-slate-900 uppercase tracking-widest mb-3">Quick Add Goals</p>
                    <div className="flex flex-wrap gap-3 mb-6 text-left">
                      {SUGGESTED_GOALS.map(g => {
                        const isSelected = profile.customGoals.some(cg => cg.name === g.name);
                        return (
                          <button key={g.name} onClick={() => { if (!isSelected) setProfile({...profile, customGoals: [...profile.customGoals, {id: Date.now()+Math.random(), ...g, inflation: 6}]}); }} disabled={isSelected} className={`px-5 py-3 bg-white/80 backdrop-blur-md border rounded-xl text-xs font-bold shadow-sm transition-all flex items-center gap-2 ${isSelected ? 'ring-2 ring-teal-600 bg-teal-50/80 text-teal-900 opacity-60' : 'border-slate-300 text-slate-700 hover:bg-white hover:shadow-md hover:border-teal-400'}`}>
                            {isSelected ? <Icon name="check" size={16} className="text-teal-700"/> : <Icon name="plus" size={16} className="text-slate-500"/>} {g.name}
                          </button>
                        )
                      })}
                    </div>
                    <button onClick={() => setProfile({...profile, customGoals: [...profile.customGoals, {id: Date.now(), name: "Custom Goal", cost: "1000000", horizon: "10", inflation: 6}]})} className="w-full max-w-md py-4 border-2 border-dashed border-slate-300 rounded-2xl text-xs font-bold uppercase text-slate-600 hover:border-teal-500 hover:text-teal-800 transition-all shadow-sm bg-white/60 backdrop-blur-md">+ Add Custom Target</button>
                    
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
                      {profile.customGoals.map((g, i) => (
                        <div key={g.id} className="p-6 bg-white/90 backdrop-blur-2xl border border-white/80 rounded-3xl relative shadow-lg text-left transition-all duration-300 group">
                          <button onClick={() => { let gc = [...profile.customGoals]; gc.splice(i, 1); setProfile({...profile, customGoals: gc}); }} className="absolute top-5 right-5 text-rose-500 bg-rose-50 hover:bg-rose-600 hover:text-white p-2 rounded-xl transition-all text-left shadow-sm border border-rose-200 opacity-0 group-hover:opacity-100"><Icon name="trash-2" size={16}/></button>
                          <div className="pr-12">
                            <InputField label="Goal Name" value={g.name} onChange={v => { let gc = [...profile.customGoals]; gc[i].name = v; setProfile({...profile, customGoals: gc}); }} />
                          </div>
                          <div className="mt-5 pt-5 border-t border-slate-100 grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div className="sm:col-span-3"><InputField label="Target Cost Today" prefix="₹" value={g.cost} type="number" onChange={v => { let gc = [...profile.customGoals]; gc[i].cost = v; setProfile({...profile, customGoals: gc}); }} /></div>
                            <div className="sm:col-span-1.5"><InputField label="Horizon" value={g.horizon} type="number" onChange={v => { let gc = [...profile.customGoals]; gc[i].horizon = v; setProfile({...profile, customGoals: gc}); }} suffix="Yrs" /></div>
                            <div className="sm:col-span-1.5"><InputField label="Inflation" value={g.inflation} type="number" onChange={v => { let gc = [...profile.customGoals]; gc[i].inflation = v; setProfile({...profile, customGoals: gc}); }} suffix="%" /></div>
                          </div>
                        </div>
                      ))}

                  </div>

              )}
            </div>
          </div>

          {/* Intelligence FinBar */}
          {step < 5 && (
            <div className="lg:col-span-4 xl:col-span-3 h-fit sticky top-6 no-print text-left">
              <div className="premium-card p-6 md:p-8 space-y-6 text-left print-block break-inside-avoid">
                <div className="flex items-center gap-3 border-b border-slate-200/80 pb-5">
                  <div className="p-2 bg-slate-900 text-white rounded-xl shadow-md flex items-center justify-center"><Icon name="brain" size={20} /></div>
                  <h3 className="text-sm font-bold uppercase tracking-widest text-slate-900">FinBar</h3>
                </div>
                <div className="space-y-6">
                  <div className="space-y-3">
                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Income Streams</p>
                    <div className="grid grid-cols-2 gap-4">
                      <div className="p-4 bg-white/80 backdrop-blur-md rounded-2xl border border-white/80 shadow-sm"><p className="text-[10px] font-bold text-slate-500 uppercase mb-1.5">Monthly</p><p className="text-lg font-black text-slate-900 leading-none tracking-tight"><AnimatedCurrency value={totals.income}/></p></div>
                      <div className="p-4 bg-white/80 backdrop-blur-md rounded-2xl border border-white/80 shadow-sm"><p className="text-[10px] font-bold text-slate-500 uppercase mb-1.5">Yearly</p><p className="text-lg font-black text-slate-900 leading-none tracking-tight"><AnimatedCurrency value={totals.income * 12}/></p></div>
                    </div>
                  </div>
                  <div className="space-y-3">
                    <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Lifestyle Burn</p>
                    <div className="grid grid-cols-2 gap-4">
                      <div className="p-4 bg-rose-50/80 backdrop-blur-md rounded-2xl border border-rose-200/80 shadow-sm"><p className="text-[10px] font-bold text-rose-700 uppercase mb-1.5">Monthly</p><p className="text-lg font-black text-rose-950 leading-none tracking-tight"><AnimatedCurrency value={totals.burn}/></p></div>
                      <div className="p-4 bg-rose-50/80 backdrop-blur-md rounded-2xl border border-rose-200/80 shadow-sm"><p className="text-[10px] font-bold text-rose-700 uppercase mb-1.5">Yearly</p><p className="text-lg font-black text-rose-950 leading-none tracking-tight"><AnimatedCurrency value={totals.burn * 12}/></p></div>
                    </div>
                  </div>
                  <div className="p-6 bg-gradient-to-br from-slate-900 to-slate-800 rounded-3xl border border-slate-700 shadow-2xl relative overflow-hidden mt-5 hover:scale-[1.02] transition-transform cursor-default">
                    <div className="absolute top-0 right-0 w-24 h-24 bg-teal-500/20 blur-3xl rounded-full"></div>
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2.5 relative z-10">Total Net Worth</p>
                    <p className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-300 tracking-tighter relative z-10"><AnimatedCurrency value={totals.assets}/></p>
                  </div>
                  <div className="pt-5 border-t border-slate-200/80 text-center">
                    <p className="text-[10px] font-bold text-teal-800 uppercase tracking-widest bg-teal-50/80 py-2 rounded-xl border border-teal-200/50 shadow-sm">Current SIP Flow: {formatCurrency(profile.currentSip)}/mo</p>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const SynthesisView = ({ profile, setProfile }) => {
      const ageFact = useMemo(() => getAgeInfo(profile.age), [profile.age]);
      const [isWealthAllocated, setIsWealthAllocated] = useState(false);
      const [allocMap, setAllocMap] = useState({}); 
      const [localParams, setLocalParams] = useState({});
      const [expandedGoal, setExpandedGoal] = useState(null);
      const [expandedSimYear, setExpandedSimYear] = useState(null);
      const [showFullPreview, setShowFullPreview] = useState(false);
      const [isPresenting, setIsPresenting] = useState(false);
      const [currentSlide, setCurrentSlide] = useState(0);
      const [projectionTab, setProjectionTab] = useState('strategy'); 
      const [globalSimParams, setGlobalSimParams] = useState({ returns: 12, stepUp: 0, lumpsum: 0 });
      const [blueprintLayout, setBlueprintLayout] = useState('list'); 
      const [scenario, setScenario] = useState('base');
      const [showRealValue, setShowRealValue] = useState(false);
      const [showPostTax, setShowPostTax] = useState(false);
      const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
      const [inlineEdit, setInlineEdit] = useState({ id: null, cost: '' });
      const [showModal, setShowModal] = useState(false);
      const [isConsoleOpen, setIsConsoleOpen] = useState(false);
      const [burnTrim, setBurnTrim] = useState(0); 
      const [isTunerExpanded, setIsTunerExpanded] = useState(false);
      const [isInflationShock, setIsInflationShock] = useState(false);
      const [swr, setSwr] = useState(4); 
      const [masterLumpsum, setMasterLumpsum] = useState("");
      const [masterStepUp, setMasterStepUp] = useState("");

      const currentInflation = isInflationShock ? 8 : 6;
      const infMultiplier = 1 + (currentInflation / 100);

      const [assetMix, setAssetMix] = useState([
        { id: 'lc', label: 'Large Cap', pct: 40, ret: 12 }, { id: 'lmc', label: 'Large & Mid Cap', pct: 0, ret: 13 },
        { id: 'mc', label: 'Mid Cap', pct: 20, ret: 14 }, { id: 'sc', label: 'Small Cap', pct: 10, ret: 15 },
        { id: 'fc', label: 'Flexi Cap', pct: 10, ret: 13 }, { id: 'mlc', label: 'Multi Cap', pct: 0, ret: 13 },
        { id: 'ff', label: 'Focused Fund', pct: 0, ret: 12 }, { id: 'vf', label: 'Value Fund', pct: 0, ret: 14 },
        { id: 'cf', label: 'Contra Fund', pct: 0, ret: 14 }, { id: 'dy', label: 'Dividend Yield', pct: 0, ret: 10 },
        { id: 'st', label: 'Sectoral/Thematic', pct: 0, ret: 16 }, { id: 'elss', label: 'ELSS', pct: 0, ret: 12 },
        { id: 'debt', label: 'Debt / BAF', pct: 20, ret: 7 }
      ]);

      const liquidAssetsList = useMemo(() => {
        let liq = [];
        ASSET_CLASSES_LIST.filter(a => a.isLiquid).forEach(a => {
          const val = safeNumber(profile[a.id]);
          if (val > 0) liq.push({ id: a.id, label: a.label, val });
        });
        (profile.customReservoirs || []).filter(r => r.isLiquid).forEach(r => {
          const val = safeNumber(r.value);
          if (val > 0) liq.push({ id: r.id, label: r.name || 'Custom Liquid', val });
        });
        return liq;
      }, [profile]);

      const totalLiquidAssets = liquidAssetsList.reduce((acc, curr) => acc + curr.val, 0);

      const totalAssets = useMemo(() => {
        const base = ASSET_CLASSES_LIST.reduce((a,c)=>a+safeNumber(profile[c.id]), 0);
        const custom = (profile.customReservoirs || []).reduce((a,c)=>a+safeNumber(c.value), 0);
        return base + custom;
      }, [profile]);
      
      const totalIlliquidAssets = totalAssets - totalLiquidAssets;

      const monthlyBurnBase = safeNumber(profile.rent) + (safeNumber(profile.household) + safeNumber(profile.lifestyle)) * (1 - (burnTrim/100)) + safeNumber(profile.emi);
      const monthlyInsVac = (safeNumber(profile.healthPremium) + safeNumber(profile.lifePremium)) / 12 + (safeNumber(profile.vacation)/12 * (1 - (burnTrim/100)));
      const monthlyBurn = monthlyBurnBase + monthlyInsVac;

      const totals = useMemo(() => {
        let income = safeNumber(profile.salary) + safeNumber(profile.businessIncome);
        if (profile.married && profile.addCoCFO) income += safeNumber(profile.spouseIncome);
        return { income, burn: monthlyBurn, assets: totalAssets };
      }, [profile.salary, profile.businessIncome, profile.spouseIncome, profile.married, profile.addCoCFO, monthlyBurn, totalAssets]);
