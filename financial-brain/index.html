        const safeNumber = (val) => {
            if (val === undefined || val === null || val === '') return 0;
            const parsed = parseFloat(String(val).replace(/,/g, ''));
            return isNaN(parsed) ? 0 : parsed;
        };

        const formatCurrency = (val) => "₹" + Math.round(safeNumber(val)).toLocaleString('en-IN');
        
        const formatMask = (val, isCurrency = false) => {
            if (val === "" || val === undefined || val === null) return "";
            let x = val.toString().replace(/,/g, '');
            if (!isCurrency && !/^\d+$/.test(x)) return x; 
            let lastThree = x.substring(x.length - 3);
            let otherNumbers = x.substring(0, x.length - 3);
            if (otherNumbers !== '') lastThree = ',' + lastThree;
            return otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + lastThree;
        };

        const calculateStepUpSip = (targetValue, years, returns, stepUp, lumpsum = 0) => {
            if (years <= 0 || targetValue <= 0) return 0;
            const r = (returns / 100) / 12, g = (stepUp || 0) / 100, n = years * 12;
            const fvLumpsum = lumpsum * Math.pow(1 + r, n);
            const needed = Math.max(0, targetValue - fvLumpsum);
            if (needed <= 0) return 0;
            let low = 0, high = needed * 2;
            for (let i = 0; i < 40; i++) {
                let mid = (low + high) / 2;
                let total = 0, curSip = mid;
                for (let m = 1; m <= n; m++) {
                    total = (total + curSip) * (1 + r);
                    if (m % 12 === 0) curSip *= (1 + g);
                }
                if (total < needed) low = mid; else high = mid;
            }
            return high;
        };

        };

        const getAgeInfo = (age) => {
            const numAge = parseInt(age);
            if (!numAge || isNaN(numAge) || numAge <= 0) return null; 
            if (numAge <= 18) return { c: "You are in your foundation years. Learning, curiosity, and habits matter.", f: "Most globally successful leaders did not build anything major before adulthood." };
            let closest = 30;
            const keys = Object.keys(AGE_DATA).map(Number);
            closest = keys.reduce((prev, curr) => Math.abs(curr - numAge) < Math.abs(prev - numAge) ? curr : prev);
            return AGE_DATA[closest] || { c: "A year of potential.", f: "History is full of late bloomers and early risers." };
        };

        const getIncomeComment = (type, val) => {
            const v = safeNumber(val);
            if (v <= 0) return null; 
            if (type === 'salary') {
                if (v < 65000) return { c: "Financial discipline starts here.", f: "Focus on maximizing your savings rate to build an initial safety net." };
                if (v < 125000) return { c: "Growth zone. Smart investing now changes trajectories.", f: "This is where capital allocation begins to matter more than mere saving." };
                return { c: "High leverage income. Focus on wealth preservation.", f: "Tax optimization and sophisticated asset allocation become critical." };
            }
            if (type === 'business') {
                 if (v < 150000) return { c: "Traction achieved. Systems define the next step.", f: "Focus on reinvesting capital back into the business engine for growth." };
                 return { c: "Scaling phase. Risk management is critical.", f: "Begin diversifying wealth away from your single-point business risk." };
            }
        };

        const ASSET_CLASSES_LIST = [
            { id: "mfPool", label: "Mutual Funds", yield: 12, color: "#0f766e" },

            { name: "World Tour", cost: 1500000, horizon: 3, icon: "palmtree" },
            { name: "Home renovation", cost: 3000000, horizon: 4, icon: "home" },

        ];

        const CHILD_MILESTONES = [
            { id: "m10", label: "10th Std", age: 15, defaultCost: 200000, defaultInflation: 10 },
            { id: "m12", label: "12th Std", age: 17, defaultCost: 300000, defaultInflation: 10 },
            { id: "mCol", label: "College", age: 18, defaultCost: 1500000, defaultInflation: 10 },
            { id: "mMar", label: "Marriage", age: 25, defaultCost: 2500000, defaultInflation: 8 }
        ];

        const KEYWORDS = ["QUANTUM", "LEGACY", "COMPOUND", "HORIZON", "STRATEGY", "DESTINY", "EQUITY", "RESERVOIR", "CAPITAL", "NAVIGATOR", "BLUEPRINT", "FIDUCIARY", "LIQUID", "FISCAL", "ZENITH", "CORE", "MANIFEST", "MATRIX", "VITALITY", "INFLOW", "ASSET", "WEALTH", "SIP", "AUDIT", "GROWTH", "FUTURE", "VISION", "TRUST", "ALPHA", "BETA", "YIELD", "CORPUS", "LIQUIDITY", "INDEX", "BENCHMARK", "HEDGE", "INFLATION", "PORTFOLIO", "DIVERSIFY", "SECURE", "DIVIDEND", "VALUE", "PRINCIPAL", "RETURN", "BABA", "FINANCE", "LOGIC", "MATH", "FREEDOM", "TIME", "RISK", "REWARD", "ESTATE", "TAX", "PLAN", "GOAL", "RETIRE", "EARN", "SAVE", "INVEST", "LIFE", "DREAM", "BUILD", "SCALE"];

        const FloatingPillCloud = ({ active }) => {
            const containerRef = useRef(null);
            const activeRef = useRef(active);
            useEffect(() => { activeRef.current = active; }, [active]);
            const pills = useMemo(() => {
                const hdWords = [...KEYWORDS].slice(0, 50); 
                return Array.from({ length: 50 }).map((_, i) => ({
                    id: i, word: hdWords[i % hdWords.length], x: Math.random() * 100, y: Math.random() * 100,
                    vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
                    driftX: 0, driftY: 0, interactX: 0, interactY: 0,
                }));
            }, []);

            useEffect(() => {
                const container = containerRef.current;
                if (!container) return; 
                const domEls = pills.map(p => {
                    const el = document.createElement('div');
                    el.className = 'floating-pill-element px-3 py-1.5 text-xs font-black uppercase tracking-widest';
                    el.innerText = p.word; el.style.left = `${p.x}%`; el.style.top = `${p.y}%`;
                    container.appendChild(el); return { el, ...p }; 
                });

                let animationFrameId; let mouseX = -1000; let mouseY = -1000;

                const update = () => {
                    if (activeRef.current) {
                        const rect = container.getBoundingClientRect();
                        domEls.forEach(p => {
                            p.driftX += p.vx; p.driftY += p.vy;
                            if (p.driftX > 150 || p.driftX < -150) p.vx *= -1;
                            if (p.driftY > 150 || p.driftY < -150) p.vy *= -1;
                            const pillPxX = (p.x / 100) * rect.width + p.driftX;
                            const pillPxY = (p.y / 100) * rect.height + p.driftY;
                            const dx = mouseX - pillPxX; const dy = mouseY - pillPxY;
                            const dist = Math.sqrt(dx*dx + dy*dy); const maxDist = 200; 
                            let targetTx = 0, targetTy = 0;
                            if (dist < maxDist) {
                                const force = (maxDist - dist) / maxDist;
                                const angle = Math.atan2(dy, dx);
                                targetTx = Math.cos(angle) * force * -60;
                                targetTy = Math.sin(angle) * force * -60;
                            }
                            p.interactX += (targetTx - p.interactX) * 0.08; p.interactY += (targetTy - p.interactY) * 0.08;
                            p.el.style.transform = `translate3d(${p.driftX + p.interactX}px, ${p.driftY + p.interactY}px, 0)`;
                        });
                    }
                    animationFrameId = requestAnimationFrame(update);
                };

                const onMouseMove = (e) => {
                    if (!activeRef.current) return;
                    const rect = container.getBoundingClientRect();
                    mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
                };

                window.addEventListener('mousemove', onMouseMove);
                update();
                return () => { window.removeEventListener('mousemove', onMouseMove); cancelAnimationFrame(animationFrameId); if (container) container.innerHTML = ''; };
            }, [pills]);
            return <div ref={containerRef} className={`absolute inset-0 overflow-hidden z-0 pill-container transition-opacity duration-500 ${active ? 'opacity-100' : 'opacity-0 hidden'}`}></div>;
        };

                <div className={`liquid-blob blob-1 ${isBlueprintMode ? 'blob-paused' : ''}`}></div>
                <div className={`liquid-blob blob-2 ${isBlueprintMode ? 'blob-paused' : ''}`}></div>
                <div className={`liquid-blob blob-3 ${isBlueprintMode ? 'blob-paused' : ''}`}></div>
            </div>
        );

        const Icon = ({ name, size = 18, className = "" }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    containerRef.current.innerHTML = `<i data-lucide="${name}" width="${size}" height="${size}"></i>`;
                    window.lucide.createIcons({ root: containerRef.current });
                }
            }, [name, size, className]);
            return <span ref={containerRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }} />;
        };

        const AnimatedCurrency = ({ value, prefix = "₹" }) => {
            const [display, setDisplay] = useState(0);
            useEffect(() => {
                let start = display; const end = safeNumber(value); const duration = 600; const startTime = performance.now();
                const animate = (now) => {
                    const progress = Math.min((now - startTime) / duration, 1);
                    setDisplay(start + (end - start) * (1 - Math.pow(1 - progress, 3)));
                    if (progress < 1) requestAnimationFrame(animate);
                };
                requestAnimationFrame(animate);
            }, [value]);
            return <span>{prefix}{Math.round(display).toLocaleString('en-IN')}</span>;
        };

        const Toggle = ({ label, value, onChange, fact }) => (
            <div className="space-y-2 text-left">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-white/60 backdrop-blur-2xl border border-white/80 rounded-xl shadow-sm no-print gap-3 transition-all">
                    <span className="text-sm font-semibold text-slate-800 tracking-tight">{label}</span>
                    <div className="flex bg-slate-200/50 p-1 rounded-lg shrink-0 shadow-inner border border-white/40">
                        <button onClick={() => onChange(true)} className={`px-6 py-2 rounded-md text-xs font-bold transition-all ${value ? 'bg-white text-slate-900 shadow-sm scale-100' : 'text-slate-500 scale-95 hover:scale-100'}`}>YES</button>
                        <button onClick={() => onChange(false)} className={`px-6 py-2 rounded-md text-xs font-bold transition-all ${!value ? 'bg-white text-slate-900 shadow-sm scale-100' : 'text-slate-500 scale-95 hover:scale-100'}`}>NO</button>
                    </div>
                </div>
                {fact && (
                     <div className="mt-2 p-4 bg-white/60 backdrop-blur-2xl border border-white/90 rounded-xl shadow-sm animate-in zoom-in-95 duration-500">
                        <p className="text-sm font-medium text-slate-700 italic flex gap-2 items-start"><Icon name="info" size={16} className="text-blue-500 shrink-0"/> <span>"{fact.c}"</span></p>
                    </div>
                )}
            </div>
        );

        const InputField = ({ label, value, onChange, prefix, suffix, type="text", isError, maxLength, yieldBadge, fact, isAge, noNumbers }) => {
            const [localVal, setLocalVal] = useState(value ? formatMask(value, prefix === "₹") : "");
            useEffect(() => { setLocalVal(formatMask(value, prefix === "₹")); }, [value, prefix]);
            const handleText = (v) => {
                let raw = v.replace(/,/g, '');
                if (suffix === '%' || suffix === 'Yrs') { raw = raw.replace(/[^0-9.]/g, ""); const parts = raw.split('.'); if(parts.length > 2) raw = parts[0] + '.' + parts.slice(1).join(''); } 
                else if (type === "number" || isAge) { raw = raw.replace(/[^0-9]/g, ""); }
                if (noNumbers) raw = raw.replace(/[0-9]/g, "");
                if (isAge && raw !== "") { if (parseInt(raw) > 99) raw = "99"; }
                if (maxLength) raw = raw.slice(0, maxLength);
                setLocalVal(formatMask(raw, prefix === "₹")); onChange(raw);
            };

            return (
                <div className="space-y-1.5 group relative text-left">
                    <div className="flex justify-between items-end px-1">
                        <label className="text-xs font-bold text-slate-500 uppercase tracking-widest">{label}</label>
                        {yieldBadge && <span className="text-[10px] font-bold text-emerald-700 bg-emerald-50/80 px-2 py-0.5 rounded shadow-sm border border-emerald-100">Yield: {yieldBadge}%</span>}
                    </div>
                    <div className="relative flex items-center">
                        {prefix && <span className="absolute left-3 text-slate-400 font-semibold z-20 text-base">{prefix}</span>}
                        <input type="text" value={localVal} onChange={(e) => handleText(e.target.value)} className={`premium-input relative z-10 ${prefix ? 'pl-8' : ''} ${suffix ? 'pr-10' : ''} ${isError ? 'border-red-400 bg-red-50' : ''}`} placeholder={label.includes('Name') ? 'Enter...' : '0'} />
                        {suffix && <span className="absolute right-3 text-slate-400 text-sm font-bold z-20">{suffix}</span>}
                    </div>
                    {fact && (
                        <div className="mt-2 p-4 bg-white/60 backdrop-blur-2xl border border-white/90 rounded-xl shadow-sm animate-in zoom-in-95 duration-500">
                            <p className="text-sm font-medium text-slate-700 italic flex gap-2 items-start"><Icon name="sparkles" size={16} className="text-amber-500 shrink-0"/> <span>"{fact.c}"</span></p>
                            {fact.f && <p className="text-xs font-medium text-slate-500 pt-2 border-t border-slate-200/60 mt-2 flex gap-1.5"><Icon name="book-open" size={14}/> <span><strong>Fact:</strong> {fact.f}</span></p>}
                        </div>
                    )}
                </div>
            );
        };

        const TaskSwitcher = ({ isOpen, onToggle, currentStep, onJump }) => {
            const steps = [
                { n: 1, label: "Profile", icon: "user", desc: "Identity & Flow" }, 
                { n: 2, label: "Burn", icon: "flame", desc: "Cash Flow Audit" }, 
                { n: 3, label: "Assets", icon: "landmark", desc: "Wealth Reservoirs" }, 
                { n: 4, label: "Horizon", icon: "target", desc: "Strategy Horizon" }, 
                { n: 5, label: "Blueprint", icon: "brain", desc: "Master Projection" }
            ];
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[5000] flex flex-col items-center justify-center p-6 sm:p-12 no-print text-left mission-control-overlay animate-in fade-in duration-300">
                    <div className="absolute inset-0" onClick={onToggle} />
                    <h2 className="relative z-10 text-2xl font-extrabold text-slate-800 uppercase tracking-[0.4em] mb-12">Mission Control</h2>
                    <div className="relative w-full max-w-5xl flex flex-wrap justify-center gap-6 sm:gap-8">
                        {steps.map((s, index) => (
                            <div key={s.n} onClick={() => { onJump(s.n); onToggle(); }} className={`mission-card group w-40 sm:w-48 p-6 text-center cursor-pointer animate-in zoom-in-75 slide-in-from-bottom-8 duration-500 ${currentStep === s.n ? 'mission-active' : ''}`} style={{ animationDelay: `${index * 50}ms` }}>
                                <div className={`mission-icon-bg w-14 h-14 mx-auto flex items-center justify-center mb-5`}><Icon name={s.icon} size={28}/></div>
                                <p className="text-sm font-bold uppercase tracking-widest mb-1.5 text-slate-800 transition-colors">{s.label}</p>
                                <p className="text-xs font-semibold text-slate-500 desc transition-colors">{s.desc}</p>
                            </div>
                        ))}
                    </div>
                    <p className="relative z-10 text-xs font-bold text-slate-500 uppercase tracking-widest mt-12 cursor-pointer hover:text-slate-800 bg-white/80 px-5 py-2.5 rounded-full shadow-sm" onClick={onToggle}>Click anywhere to dismiss</p>
                </div>
            );
        };

        const AssetAllocationPie = ({ profile }) => {
            const data = useMemo(() => {
                const d = ASSET_CLASSES_LIST.map(a => ({ label: a.label, value: safeNumber(profile[a.id]), color: a.color })).filter(d => d.value > 0);
                const customTotal = (profile.customReservoirs || []).reduce((a,c)=>a+safeNumber(c.value), 0);
                if(customTotal > 0) d.push({ label: "Custom Assets", value: customTotal, color: "#6366f1" });
                return d;
            }, [profile]);
            const total = data.reduce((a,b)=>a+b.value, 0);
            if (total === 0) {
                return (
                    <div className="flex flex-col items-center justify-center p-6 bg-white/30 backdrop-blur-md rounded-xl border-2 border-white/50 border-dashed text-center shadow-sm opacity-80 h-full min-h-[160px]">
                        <div className="relative w-16 h-16 mb-2 opacity-60"><svg viewBox="0 0 32 32"><circle r="15" cx="16" cy="16" fill="transparent" stroke="#cbd5e1" strokeWidth="2" strokeDasharray="4 4" /></svg><div className="absolute inset-0 flex items-center justify-center"><Icon name="inbox" size={24} className="text-slate-400" /></div></div>
                        <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Awaiting Asset Data</span>
                    </div>
                );
            }
            let currentAngle = 0; const radius = 16; const circumference = 2 * Math.PI * radius;
            return (
                <div className="flex flex-col xl:flex-row items-center gap-6 p-5 bg-white/40 backdrop-blur-md rounded-xl border border-white/50 text-left shadow-sm h-full justify-center break-inside-avoid">
                    <div className="relative w-32 h-32 shrink-0">
                        <svg viewBox="0 0 32 32" className="rotate-[-90deg]">
                            {data.map((item, i) => {
                                const percentage = (item.value / total) * 100;
                                const strokeDasharray = `${percentage * circumference} ${circumference}`;
                                const strokeDashoffset = -currentAngle;
                                currentAngle += percentage * circumference;
                                return ( <circle key={i} cx="20" cy="20" r={radius} fill="transparent" stroke={item.color} strokeWidth="4" strokeDasharray={strokeDasharray} strokeDashoffset={strokeDashoffset} className="transition-all duration-1000 ease-out hover:opacity-80" /> );
                            })}
                            <circle r="12" cx="16" cy="16" fill="rgba(255,255,255,0.7)" />
                        </svg>
                        <div className="absolute inset-0 flex items-center justify-center flex-col">
                            <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Total</span>
                            <span className="text-xs font-extrabold text-slate-900">{formatCurrency(total)}</span>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-x-4 gap-y-3 w-full text-left">
                        {data.map((item, i) => (
                            <div key={i} className="flex justify-between items-center text-xs">
                                <span className="flex items-center gap-2 font-medium text-slate-700 truncate max-w-[100px]" title={item.label}><span className="w-2.5 h-2.5 rounded-full shrink-0" style={{backgroundColor: item.color}}></span> {item.label}</span>
                                <span className="font-extrabold text-slate-900">{Math.round((item.value/total)*100)}%</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const InflationChart = ({ currentBurn, futureBurn, years, rate }) => {
            const ratio = futureBurn / (currentBurn || 1);
            return (
                <div className="flex items-end justify-center gap-6 h-32 p-5 bg-white/40 backdrop-blur-md rounded-xl border border-white/60 shadow-sm break-inside-avoid w-full">
                    <div className="flex flex-col items-center gap-1.5">
                        <div className="w-12 bg-teal-200/80 rounded-t shadow-sm border border-white/50" style={{height: '30px'}}></div>
                        <span className="text-xs font-bold text-slate-500 tracking-widest uppercase">Today</span>
                        <span className="text-sm font-black text-slate-800">{formatCurrency(currentBurn)}</span>
                    </div>
                    <div className="flex-1 flex flex-col items-center justify-center pb-5 border-b-2 border-dashed border-rose-300 relative px-3">
                        <span className="text-[10px] font-bold text-rose-600 bg-rose-50/80 px-2 py-0.5 rounded absolute top-0 shadow-sm whitespace-nowrap">+{ratio.toFixed(1)}x (Inflation {rate}%)</span>
                        <div className="w-full h-0 relative"><div className="absolute right-0 top-[-6px] w-3 h-3 border-r-2 border-t-2 border-rose-400 transform rotate-45"></div></div>
                    </div>
                    <div className="flex flex-col items-center gap-1.5">
                        <div className="w-12 bg-rose-400 rounded-t shadow-md relative border border-rose-300" style={{height: '75px'}}><div className="absolute inset-0 bg-gradient-to-t from-rose-500 to-transparent rounded-t opacity-50"></div></div>
                        <span className="text-xs font-bold text-rose-600 tracking-widest uppercase">Year {years}</span>
                        <span className="text-base font-black text-slate-900">{formatCurrency(futureBurn)}</span>
                    </div>
                </div>
            );
        };

        const PhaseWrapper = ({ num, title, layout, children, gridClasses, delayClass }) => {
            const isList = layout === 'list';
            return (
                <div className={`relative ${isList ? 'pl-8 md:pl-12 w-full' : gridClasses} break-inside-avoid animate-in fade-in duration-300`}>
                    {isList && ( <div className="absolute left-0 top-4 w-7 h-7 bg-gradient-to-br from-slate-800 to-slate-950 text-white rounded-full flex items-center justify-center font-black text-xs shadow-md z-10 no-print ring-4 ring-[#F2F2F7]">{num}</div> )}
                    <div className={`premium-card ${isList ? 'p-6 md:p-8' : 'p-6 flex flex-col h-full'} text-left group`}>
                        {!isList && title && ( <div className="flex items-center gap-2 border-b border-white/60 pb-3 mb-4 text-left relative z-10"><div className="w-6 h-6 bg-slate-900 text-white rounded flex items-center justify-center font-bold text-xs shadow-sm shrink-0">{num}</div><h3 className="text-xs font-black uppercase tracking-widest text-slate-900">{title}</h3></div> )}
                        {isList && title && ( <div className="flex items-center justify-between border-b border-white/50 pb-3 mb-5 text-left relative z-10"><h3 className="text-xl font-black heading-font text-slate-900 tracking-tight">{title}</h3></div> )}
                        <div className="relative z-10 flex-1 flex flex-col">{children}</div>
                    </div>
                </div>
            )
        };

        const CalibrationFlow = ({ profile, setProfile, step }) => {
            const ageFact = useMemo(() => getAgeInfo(profile.age), [profile.age]);
            const incomeComment = useMemo(() => { return profile.businessIncome ? getIncomeComment('business', profile.businessIncome) : getIncomeComment('salary', profile.salary); }, [profile.salary, profile.businessIncome]);
            const marriedComment = useMemo(() => { if(!profile.married) return {c: "Being single gives you maximum flexibility — time, risk-taking, and self-focus."}; return {c: "Marriage shifts life from individual decisions to shared responsibility and planning."}; }, [profile.married]);
            const childComment = useMemo(() => {
                if(!profile.hasChildren) return {c: "This phase allows financial consolidation and relationship strengthening."};
                const cnt = safeNumber(profile.childCount);
                if(cnt === 1) return {c: "Raising one child allows focused attention, but long-term planning is still crucial."};
                if(cnt === 2) return {c: "Balancing resources, time, and education planning becomes more important now."};
                if(cnt >= 3) return {c: "Financial discipline and structured planning are no longer optional."};
            }, [profile.hasChildren, profile.childCount]);

            const monthlyBurnBase = safeNumber(profile.rent) + safeNumber(profile.household) + safeNumber(profile.lifestyle) + safeNumber(profile.emi);
            const monthlyInsVac = (safeNumber(profile.healthPremium) + safeNumber(profile.lifePremium)) / 12 + (safeNumber(profile.vacation)/12);
            
            const totals = useMemo(() => {
                let income = safeNumber(profile.salary) + safeNumber(profile.businessIncome);
                if (profile.married && profile.addCoCFO) income += safeNumber(profile.spouseIncome);
                
                const assets = ASSET_CLASSES_LIST.reduce((a, c) => a + safeNumber(profile[c.id]), 0) + (profile.customReservoirs || []).reduce((a, c) => a + safeNumber(c.value), 0);
                return { income, burn: monthlyBurnBase + monthlyInsVac, assets };
            }, [profile, monthlyBurnBase, monthlyInsVac]);

            return (
                <div key={step} className="max-w-[1600px] w-full mx-auto px-6 lg:px-10 grid grid-cols-1 lg:grid-cols-12 gap-6 pb-20 cinematic-enter text-left">
                    <div className="lg:col-span-8 xl:col-span-9">
                        <div className="premium-card p-6 md:p-8 text-left">
                            <h2 className="text-xl font-black heading-font text-slate-900 uppercase tracking-widest border-b border-white/60 pb-4 mb-6">
                                {step === 1 ? 'Personal Profile' : step === 2 ? 'Burn Rate Audit' : step === 3 ? 'Asset Reservoirs' : 'Strategy Definition'}
                            </h2>

                            {step === 1 && (
                                <div className="space-y-6 text-left animate-in fade-in">
                                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                                        <InputField label="Name" value={profile.name} noNumbers onChange={v => setProfile({...profile, name: v})} placeholder="Enter Full Name" />
                                        <div className="hidden xl:flex items-center px-4">{profile.name && <p className="text-sm font-bold text-teal-700 tracking-tight animate-in fade-in">Hello {profile.name}, preparing strategy parameters...</p>}</div>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                                        <InputField label="Current Age" value={profile.age} isAge suffix="Yrs" onChange={v => setProfile({...profile, age: v})} fact={safeNumber(profile.age) > 0 ? ageFact : null} />
                                        <InputField label="Retirement Age" value={profile.retireAge} isAge suffix="Yrs" onChange={v => setProfile({...profile, retireAge: v})} isError={profile.retireAge && Number(profile.retireAge) <= Number(profile.age)} />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 text-left">
                                        <InputField label="Monthly Net Salary" prefix="₹" value={profile.salary} type="number" onChange={v => setProfile({...profile, salary: v})} fact={safeNumber(profile.salary) > 0 ? getIncomeComment('salary', profile.salary) : null} />
                                        <InputField label="Monthly Business Income" prefix="₹" value={profile.businessIncome} type="number" onChange={v => setProfile({...profile, businessIncome: v})} fact={safeNumber(profile.businessIncome) > 0 ? getIncomeComment('business', profile.businessIncome) : null} />
                                    </div>
                                    
                                    <div className="pt-6 mt-6 border-t border-white/60 space-y-6 text-left max-w-3xl">
                                        <h3 className="text-xs font-black uppercase text-slate-500 tracking-widest mb-4">Family & Dependents</h3>
                                        <Toggle label="Are you married?" value={profile.married} onChange={v => setProfile({...profile, married: v, hasChildren: v ? profile.hasChildren : false, addCoCFO: v ? profile.addCoCFO : false})} fact={marriedComment} />
                                        
                                        {profile.married && (
                                            <div className="space-y-5 animate-in slide-in-from-top-2 text-left bg-white/30 backdrop-blur-md p-5 rounded-xl border border-white/60 shadow-sm mt-4">
                                                <Toggle label="Add Co-CFO (Household Plan)?" value={profile.addCoCFO} onChange={v => setProfile({...profile, addCoCFO: v})} />
                                                
                                                {profile.addCoCFO && (
                                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5 pt-4 border-t border-white/50 animate-in fade-in">
                                                        <InputField label="Spouse Name" value={profile.spouseName} noNumbers onChange={v => setProfile({...profile, spouseName: v})} placeholder="Enter Name" />
                                                        <InputField label="Spouse Age" value={profile.spouseAge} isAge suffix="Yrs" onChange={v => setProfile({...profile, spouseAge: v})} />
                                                        <InputField label="Spouse Monthly Income" prefix="₹" value={profile.spouseIncome} type="number" onChange={v => setProfile({...profile, spouseIncome: v})} />
                                                        <InputField label="Spouse Retire Age" value={profile.spouseRetireAge} isAge suffix="Yrs" onChange={v => setProfile({...profile, spouseRetireAge: v})} />
                                                    </div>
                                                )}
                                                
                                                <div className="pt-4 border-t border-white/50 mt-4">
                                                    <Toggle label="Do you have children?" value={profile.hasChildren} onChange={v => setProfile({...profile, hasChildren: v})} fact={childComment} />
                                                    {profile.hasChildren && (
                                                        <div className="grid grid-cols-1 sm:grid-cols-2 mt-4 animate-in fade-in">
                                                            <InputField label="Number of children" value={profile.childCount} onChange={v => { let num = parseInt(v) || 0; if(num > 10) num = 10; setProfile({...profile, childCount: num}); }} type="number" maxLength={2} />
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-6 text-left animate-in fade-in">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 text-left">
                                        <InputField label="Monthly Rent" prefix="₹" value={profile.rent} type="number" onChange={v => setProfile({...profile, rent: v})} />
                                        <InputField label="Monthly EMI" prefix="₹" value={profile.emi} type="number" onChange={v => setProfile({...profile, emi: v})} />
                                    </div>
                                    {safeNumber(profile.emi) > 0 && (
                                        <div className="animate-in slide-in-from-top-2 bg-white/30 backdrop-blur-md p-5 rounded-xl border border-white/60 text-left shadow-sm space-y-5 max-w-3xl">
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                                <div>
                                                    <label className="text-xs font-bold text-slate-800 uppercase tracking-wider block mb-1.5 text-left">EMI End Year</label>
                                                    <select className="w-full premium-input outline-none py-2 px-4 text-sm" value={profile.emiEndYear} onChange={e => setProfile({...profile, emiEndYear: e.target.value})}>
                                                        <option value="">Select Target Year</option>
                                                        {Array.from({length: 30}, (_, i) => new Date().getFullYear() + i).map(y => <option key={y} value={y}>{y}</option>)}
                                                    </select>
                                                </div>
                                                <InputField label="Total Loan Outstanding" prefix="₹" value={profile.loanOutstanding} type="number" onChange={v => setProfile({...profile, loanOutstanding: v})} fact={{c: "Required for Debt Snowball optimization in the Blueprint."}} />
                                            </div>
                                        </div>
                                    )}
                                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6">
                                        <InputField label="Monthly Household" prefix="₹" value={profile.household} type="number" onChange={v => setProfile({...profile, household: v})} />
                                        <InputField label="Monthly Lifestyle" prefix="₹" value={profile.lifestyle} type="number" onChange={v => setProfile({...profile, lifestyle: v})} />
                                        <InputField label="Annual Vacation" prefix="₹" value={profile.vacation} type="number" onChange={v => setProfile({...profile, vacation: v})} />
                                    </div>
                                    <div className="pt-6 border-t border-white/60 space-y-6 max-w-3xl">
                                        <h3 className="text-xs font-black uppercase text-slate-500 tracking-widest mb-4">Risk & Protection</h3>
                                        <Toggle label="Do you have an active health insurance policy?" value={profile.insuranceActive} onChange={v => setProfile({...profile, insuranceActive: v})} />
                                        {profile.insuranceActive && (
                                            <div className="space-y-6 animate-in zoom-in-95 text-left bg-white/30 backdrop-blur-md p-6 rounded-xl border border-white/60 shadow-sm">
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                                    <InputField label="Existing Cover (Sum Assured)" prefix="₹" value={profile.existingHealthCover} type="number" onChange={v => setProfile({...profile, existingHealthCover: v})} />
                                                    <InputField label="Annual Premium Paid" prefix="₹" value={profile.healthPremium} type="number" onChange={v => setProfile({...profile, healthPremium: v})} />
                                                </div>
                                                <div className="grid grid-cols-1 sm:grid-cols-2">
                                                    <InputField label="Annual Life Premium (if any)" prefix="₹" value={profile.lifePremium} type="number" onChange={v => setProfile({...profile, lifePremium: v})} />
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-6 text-left animate-in fade-in">
                                    <div className="p-4 bg-white/40 backdrop-blur-md border border-white/60 rounded-xl mb-4 flex justify-between items-center shadow-sm max-w-3xl">
                                        <span className="text-xs font-bold uppercase text-slate-500 tracking-widest">Asset Return Framework</span>
                                        <span className="text-sm font-bold text-teal-700 tracking-wide">Strategic Mapping</span>
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 text-left">
                                        {ASSET_CLASSES_LIST.map(a => (
                                            <InputField key={a.id} label={a.label} prefix="₹" value={profile[a.id]} type="number" onChange={v => setProfile({...profile, [a.id]: v})} yieldBadge={a.yield} />
                                        ))}
                                    </div>

                                        <button onClick={() => setProfile({...profile, customReservoirs: [...(profile.customReservoirs||[]), {id: Date.now(), name: "Custom Reservoir", value: ""}]})} className="w-full py-4 border-2 border-dashed border-white/60 rounded-xl text-xs font-bold uppercase text-slate-500 tracking-widest hover:border-teal-500 hover:text-teal-700 hover:bg-white/40 transition-all shadow-sm">+ Add custom reservoir</button>

                            {step === 4 && (
                                <div className="space-y-6 text-left animate-in fade-in">
                                    <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6 text-left">
                                        <InputField label="Till what age you want to plan (Life Expectancy)" value={profile.horizonAge} isAge suffix="Yrs" onChange={v => setProfile({...profile, horizonAge: v})} isError={profile.horizonAge && Number(profile.horizonAge) <= Number(profile.retireAge)} />
                                    </div>
                                    
                                    {profile.hasChildren && (
                                        <div className="p-6 bg-white/30 backdrop-blur-md rounded-2xl border border-white/60 space-y-5 shadow-sm text-left max-w-4xl">
                                            <Toggle label="Do you want to add your child in this planning?" value={profile.childNodeActive} onChange={v => setProfile({...profile, childNodeActive: v})} />
                                            {profile.childNodeActive && (
                                                <div className="mt-5">
                                                    <p className="text-xs font-bold text-teal-700 uppercase tracking-widest mb-4">SELECT SPECIFIC MILESTONES TO ACTIVATE:</p>
                                                    {Array.from({length: Math.min(10, Math.max(1, Number(profile.childCount)||1))}).map((_, ci) => (
                                                    <div key={ci} className="space-y-4 pt-4 border-t border-white/60 text-left">
                                                        <div className="flex justify-between items-center text-left">
                                                            <span className="text-xs font-bold uppercase text-slate-800 tracking-wider">Child {ci+1} Age</span>
                                                            <input type="text" maxLength="2" className="w-16 premium-input py-2 text-center text-sm" value={profile.childAges[ci]||""} onChange={e => setProfile({...profile, childAges: {...profile.childAges, [ci]: e.target.value.replace(/[^0-9]/g, "")}})} />
                                                        </div>
                                                        {profile.childAges[ci] && (
                                                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4 text-left mt-3">
                                                                {CHILD_MILESTONES.map(m => {
                                                                    const yrsLeft = m.age - Number(profile.childAges[ci]);
                                                                    if(yrsLeft <= 0) return null;
                                                                    const mId = `c${ci}-${m.id}`;
                                                                    const active = profile.activeChildMilestones[mId];
                                                                    const mData = profile.childMilestoneData[mId] || { cost: m.defaultCost, inflation: m.defaultInflation || 10 };
                                                                    const fCost = mData.cost * Math.pow(1 + (mData.inflation / 100), yrsLeft);
                                                                    return (
                                                                        <div key={mId} className={`p-4 rounded-xl border transition-all ${active ? 'border-teal-500 bg-white/80 shadow-md scale-[1.02] ring-2 ring-teal-500/20' : 'border-white/60 bg-white/40 hover:bg-white/60 cursor-pointer shadow-sm'} text-left relative overflow-hidden`} onClick={() => !active && setProfile({...profile, activeChildMilestones: {...profile.activeChildMilestones, [mId]: true}})}>
                                                                            {!active && <div className="absolute top-3 right-3 w-5 h-5 rounded-full bg-white/60 text-slate-600 flex items-center justify-center text-xs font-bold transition-colors group-hover:bg-slate-200">+</div>}
                                                                            <div className="flex justify-between items-start mb-3 text-left">
                                                                                <div className="space-y-1 text-left"><p className="text-sm font-bold uppercase tracking-wider text-slate-900">{m.label}</p><p className="text-[10px] font-bold text-teal-800 bg-teal-50/80 px-2 py-0.5 rounded border border-teal-200 uppercase tracking-widest inline-block">{yrsLeft} Yrs Left</p></div>
                                                                                {active && <div className="w-6 h-6 rounded-full flex items-center justify-center bg-teal-600 text-white cursor-pointer" onClick={(e) => { e.stopPropagation(); setProfile({...profile, activeChildMilestones: {...profile.activeChildMilestones, [mId]: false}}); }}><Icon name="x" size={14}/></div>}
                                                                            </div>
                                                                            {active && (
                                                                                <div className="space-y-4 pt-3 border-t border-white/50 animate-in fade-in text-left">
                                                                                    <InputField label="Cost Today" prefix="₹" value={mData.cost} type="number" onChange={v => setProfile({...profile, childMilestoneData: {...profile.childMilestoneData, [mId]: {...mData, cost: v}}})} />
                                                                                    <InputField label="Inflation" suffix="%" value={mData.inflation} type="number" onChange={v => setProfile({...profile, childMilestoneData: {...profile.childMilestoneData, [mId]: {...mData, inflation: v}}})} fact={{c: `Segmented Intelligence: Education inflates closer to ${m.defaultInflation || 10}%.`}} />
                                                                                    <div className="text-right pt-2 text-left"><span className="text-[10px] font-bold uppercase text-slate-500 block mb-0.5 tracking-widest">Target Corpus</span><span className="text-base font-black text-teal-700">{formatCurrency(fCost)}</span></div>
                                                                                </div>

                                                        )}
                                                    </div>
                                                ))}

                                            )}

                                    )}

                                    <div className="pt-6 border-t border-white/60 space-y-5 text-left">
                                        <p className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">Target Strategy Suggestions</p>
                                        <div className="flex flex-wrap gap-3 mb-4 text-left">
                                            {SUGGESTED_GOALS.map(g => {
                                                const isSelected = profile.customGoals.some(cg => cg.name === g.name);
                                                return (
                                                    <button key={g.name} onClick={() => { if (!isSelected) setProfile({...profile, customGoals: [...profile.customGoals, {id: Date.now()+Math.random(), ...g, inflation: 6}]}); }} disabled={isSelected} className={`px-4 py-2 bg-white/40 backdrop-blur-md border border-white/60 rounded-xl text-xs font-bold shadow-sm hover:bg-white/80 transition-all flex items-center gap-2 ${isSelected ? 'ring-2 ring-teal-600 bg-teal-50/80 text-teal-900 border-transparent' : 'text-slate-600'}`}>
                                                        {isSelected && <Icon name="check" size={14} className="text-teal-700"/>} {!isSelected && "+"} {g.name}
                                                    </button>
                                                )
                                            })}
                                        </div>
                                        <button onClick={() => setProfile({...profile, customGoals: [...profile.customGoals, {id: Date.now(), name: "Custom Goal Asset", cost: "1000000", horizon: "10", inflation: 6}]})} className="w-full max-w-md py-4 border-2 border-dashed border-white/60 rounded-xl text-xs font-bold uppercase text-slate-500 hover:border-teal-500 hover:text-teal-700 transition-all shadow-sm bg-white/30 backdrop-blur-md">+ Create custom target reservoir</button>
                                        <div className="grid grid-cols-1 xl:grid-cols-2 gap-5 mt-4">
                                            {profile.customGoals.map((g, i) => (
                                                <div key={g.id} className="p-5 bg-white/60 backdrop-blur-2xl border border-white/80 rounded-2xl relative shadow-sm text-left transition-all duration-300">
                                                    <button onClick={() => { let gc = [...profile.customGoals]; gc.splice(i, 1); setProfile({...profile, customGoals: gc}); }} className="absolute top-4 right-4 text-rose-500 bg-rose-50 hover:bg-rose-500 hover:text-white p-2 rounded transition-all text-left shadow-sm border border-rose-100/50"><Icon name="trash-2" size={16}/></button>
                                                    <InputField label="Goal Designation" value={g.name} onChange={v => { let gc = [...profile.customGoals]; gc[i].name = v; setProfile({...profile, customGoals: gc}); }} />
                                                    <div className="mt-5 space-y-5 text-left pt-5 border-t border-slate-200/50">
                                                        <InputField label="Target Cost Today" prefix="₹" value={g.cost} type="number" onChange={v => { let gc = [...profile.customGoals]; gc[i].cost = v; setProfile({...profile, customGoals: gc}); }} />
                                                        <div className="grid grid-cols-2 gap-5">
                                                            <InputField label="Horizon" value={g.horizon} type="number" onChange={v => { let gc = [...profile.customGoals]; gc[i].horizon = v; setProfile({...profile, customGoals: gc}); }} suffix="Yrs" />
                                                            <InputField label="Inflation" value={g.inflation} type="number" onChange={v => { let gc = [...profile.customGoals]; gc[i].inflation = v; setProfile({...profile, customGoals: gc}); }} suffix="%" />
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Intelligence FinBar */}
                    {step < 5 && (
                        <div className="lg:col-span-4 xl:col-span-3 h-fit sticky top-6 no-print text-left">
                            <div className="premium-card p-6 space-y-5 text-left">
                                <div className="flex items-center gap-3 border-b border-white/60 pb-4">
                                    <div className="p-2 bg-slate-900 text-white rounded-lg shadow-md flex items-center justify-center"><Icon name="brain" size={16} /></div>
                                    <h3 className="text-xs font-black uppercase tracking-widest text-slate-900">Intelligence FinBar</h3>
                                </div>
                                <div className="space-y-5">
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Income</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="p-3 bg-white/40 backdrop-blur-md rounded-xl border border-white/60 shadow-sm"><p className="text-[9px] font-bold text-slate-500 uppercase mb-1">Monthly</p><p className="text-sm font-black text-slate-900 leading-none"><AnimatedCurrency value={totals.income}/></p></div>
                                            <div className="p-3 bg-white/40 backdrop-blur-md rounded-xl border border-white/60 shadow-sm"><p className="text-[9px] font-bold text-slate-500 uppercase mb-1">Yearly</p><p className="text-sm font-black text-slate-900 leading-none"><AnimatedCurrency value={totals.income * 12}/></p></div>
                                        </div>
                                    </div>
                                    <div className="space-y-2">
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-1">Expenses</p>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="p-3 bg-rose-50/60 backdrop-blur-md rounded-xl border border-rose-200/60 shadow-sm"><p className="text-[9px] font-bold text-rose-600 uppercase mb-1">Monthly</p><p className="text-sm font-black text-rose-900 leading-none"><AnimatedCurrency value={totals.burn}/></p></div>
                                            <div className="p-3 bg-rose-50/60 backdrop-blur-md rounded-xl border border-rose-200/60 shadow-sm"><p className="text-[9px] font-bold text-rose-600 uppercase mb-1">Yearly</p><p className="text-sm font-black text-rose-900 leading-none"><AnimatedCurrency value={totals.burn * 12}/></p></div>
                                        </div>
                                    </div>
                                    <div className="p-5 bg-gradient-to-br from-slate-900 to-slate-800 rounded-[20px] border border-slate-700 shadow-xl relative overflow-hidden">
                                        <div className="absolute top-0 right-0 w-20 h-20 bg-teal-500/20 blur-3xl rounded-full"></div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 relative z-10">Net Worth</p>
                                        <p className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-300 tracking-tight relative z-10"><AnimatedCurrency value={totals.assets}/></p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const SynthesisView = ({ profile, setProfile }) => {
            const ageFact = useMemo(() => getAgeInfo(profile.age), [profile.age]);
            const [isWealthAllocated, setIsWealthAllocated] = useState(false);
            const [allocMap, setAllocMap] = useState({});
            const [localParams, setLocalParams] = useState({});
            const [expandedGoal, setExpandedGoal] = useState(null);
            const [expandedSimYear, setExpandedSimYear] = useState(null);
            const [showFullPreview, setShowFullPreview] = useState(false);
            const [isPresenting, setIsPresenting] = useState(false);
            const [currentSlide, setCurrentSlide] = useState(0);
            const [projectionTab, setProjectionTab] = useState('strategy'); 
            const [globalSimParams, setGlobalSimParams] = useState({ returns: 12, stepUp: 0, lumpsum: 0 });
            const [blueprintLayout, setBlueprintLayout] = useState('list'); 
            const [scenario, setScenario] = useState('base');
            const [showRealValue, setShowRealValue] = useState(false);
            const [showPostTax, setShowPostTax] = useState(false);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            const [inlineEdit, setInlineEdit] = useState({ id: null, cost: '' });
            const [showModal, setShowModal] = useState(false);
            const [isConsoleOpen, setIsConsoleOpen] = useState(false);
            const [burnTrim, setBurnTrim] = useState(0); 
            const [isTunerExpanded, setIsTunerExpanded] = useState(false);
            const [isInflationShock, setIsInflationShock] = useState(false);
            const [swr, setSwr] = useState(4); 
            const [masterLumpsum, setMasterLumpsum] = useState("");
            const [masterStepUp, setMasterStepUp] = useState("");

            const currentInflation = isInflationShock ? 8 : 6;
            const infMultiplier = 1 + (currentInflation / 100);

            const [assetMix, setAssetMix] = useState([
                { id: 'lc', label: 'Large Cap', pct: 40, ret: 12 }, { id: 'lmc', label: 'Large & Mid Cap', pct: 0, ret: 13 },
                { id: 'mc', label: 'Mid Cap', pct: 20, ret: 14 }, { id: 'sc', label: 'Small Cap', pct: 10, ret: 15 },
                { id: 'fc', label: 'Flexi Cap', pct: 10, ret: 13 }, { id: 'mlc', label: 'Multi Cap', pct: 0, ret: 13 },
                { id: 'ff', label: 'Focused Fund', pct: 0, ret: 12 }, { id: 'vf', label: 'Value Fund', pct: 0, ret: 14 },
                { id: 'cf', label: 'Contra Fund', pct: 0, ret: 14 }, { id: 'dy', label: 'Dividend Yield', pct: 0, ret: 10 },
                { id: 'st', label: 'Sectoral/Thematic', pct: 0, ret: 16 }, { id: 'elss', label: 'ELSS', pct: 0, ret: 12 },
                { id: 'debt', label: 'Debt / BAF', pct: 20, ret: 7 }
            ]);

            const totalAssets = useMemo(() => {
                const base = ASSET_CLASSES_LIST.reduce((a,c)=>a+safeNumber(profile[c.id]), 0);
                const custom = (profile.customReservoirs || []).reduce((a,c)=>a+safeNumber(c.value), 0);
                return base + custom;
            }, [profile]);

            const monthlyBurnBase = safeNumber(profile.rent) + (safeNumber(profile.household) + safeNumber(profile.lifestyle)) * (1 - (burnTrim/100)) + safeNumber(profile.emi);
            const monthlyInsVac = (safeNumber(profile.healthPremium) + safeNumber(profile.lifePremium)) / 12 + (safeNumber(profile.vacation)/12 * (1 - (burnTrim/100)));
            const monthlyBurn = monthlyBurnBase + monthlyInsVac;

            const totals = useMemo(() => {
                let income = safeNumber(profile.salary) + safeNumber(profile.businessIncome);
                if (profile.married && profile.addCoCFO) income += safeNumber(profile.spouseIncome);
                return { income, burn: monthlyBurn, assets: totalAssets };
            }, [profile.salary, profile.businessIncome, profile.spouseIncome, profile.married, profile.addCoCFO, monthlyBurn, totalAssets]);

            const strategyTiers = useMemo(() => {
                const a = Number(profile.age) || 30;
                if (a <= 30) { return { title: "🧒 Aggressive Growth Phase (Age 20-30)", desc: "Goal: Wealth creation, long time horizon", mix: [ { label: 'Large Cap', val: 30, color: 'bg-teal-500' }, { label: 'Flexi/Multi', val: 30, color: 'bg-indigo-500' }, { label: 'Mid Cap', val: 20, color: 'bg-amber-500' }, { label: 'Small Cap', val: 10, color: 'bg-rose-500' }, { label: 'Debt/Liquid', val: 10, color: 'bg-slate-500' } ], targetEq: 90, bullets: ["✅ High risk capacity", "✅ Focus on SIPs", "✅ Ignore short-term volatility"] }; } 
                else if (a <= 40) { return { title: "👨 Growth + Stability Phase (Age 31-40)", desc: "Goal: Continue growth but start balancing risk", mix: [ { label: 'Large Cap', val: 35, color: 'bg-teal-500' }, { label: 'Flexi/Multi', val: 25, color: 'bg-indigo-500' }, { label: 'Mid Cap', val: 15, color: 'bg-amber-500' }, { label: 'Small Cap', val: 5, color: 'bg-rose-500' }, { label: 'Debt', val: 20, color: 'bg-slate-500' } ], targetEq: 80, bullets: ["✅ Start goal-based investing", "✅ Reduce small-cap exposure slowly", "✅ Increase debt gradually"] }; } 
                else if (a <= 50) { return { title: "👨‍💼 Balanced Phase (Age 41-50)", desc: "Goal: Protect wealth + moderate growth", mix: [ { label: 'Large Cap', val: 40, color: 'bg-teal-500' }, { label: 'Flexi/Multi', val: 15, color: 'bg-indigo-500' }, { label: 'Mid Cap', val: 5, color: 'bg-amber-500' }, { label: 'Debt/Bonds', val: 35, color: 'bg-slate-500' }, { label: 'Gold', val: 5, color: 'bg-yellow-500' } ], targetEq: 60, bullets: ["✅ Capital protection becomes important", "✅ Avoid heavy small-cap bets", "✅ Start retirement-focused funds"] }; } 
                else if (a <= 60) { return { title: "👴 Pre-Retirement Phase (Age 51-60)", desc: "Goal: Capital safety + income planning", mix: [ { label: 'Large Cap/Flexi', val: 40, color: 'bg-teal-500' }, { label: 'Debt', val: 50, color: 'bg-slate-500' }, { label: 'Gold', val: 10, color: 'bg-yellow-500' } ], targetEq: 40, bullets: ["✅ Reduce volatility", "✅ Focus on income funds", "✅ Review portfolio yearly"] }; } 
                else { return { title: "👴 Retirement Phase (Age 60+)", desc: "Goal: Income + capital preservation", mix: [ { label: 'Large Cap / BAF', val: 20, color: 'bg-teal-500' }, { label: 'Debt', val: 65, color: 'bg-slate-500' }, { label: 'Gold', val: 15, color: 'bg-yellow-500' } ], targetEq: 20, bullets: ["✅ Avoid high-risk categories", "✅ Prefer SWP strategy", "✅ Keep liquidity high"] }; }
            }, [profile.age]);

            const currentAllocStats = useMemo(() => {
                const eq = safeNumber(profile.mfPool) + safeNumber(profile.stockPool);
                const debt = safeNumber(profile.debtPool) + safeNumber(profile.fdPool) + safeNumber(profile.cashPool);
                const other = safeNumber(profile.realAssets) + (profile.customReservoirs || []).reduce((a,c)=>a+safeNumber(c.value), 0);
                const total = eq + debt + other;
                if(total === 0) return { eqPct: 0, debtPct: 0, otherPct: 0, total: 0 };
                return { eqPct: Math.round((eq/total)*100), debtPct: Math.round((debt/total)*100), otherPct: Math.round((other/total)*100), total };
            }, [profile]);
            
            const debtInsight = useMemo(() => {
                const out = safeNumber(profile.loanOutstanding);
                const emi = safeNumber(profile.emi);
                if(out <= 0 || emi <= 0) return null;
                const r = 0.09 / 12; 
                if(out * r >= emi) return null; 
                const monthsBase = -Math.log(1 - out*r/emi) / Math.log(1+r);
                const emiBump = emi * 1.2; 
                const monthsBump = -Math.log(1 - out*r/emiBump) / Math.log(1+r);
                const totalPaidBase = monthsBase * emi;
                const totalPaidBump = monthsBump * emiBump;
                const interestSaved = totalPaidBase - totalPaidBump;
                const yearsSaved = (monthsBase - monthsBump) / 12;
                if(yearsSaved <= 0 || interestSaved <= 0) return null;
                return { bumpAmount: emi * 0.2, yearsSaved: yearsSaved.toFixed(1), interestSaved: interestSaved };
            }, [profile.loanOutstanding, profile.emi]);

            const currentYear = new Date().getFullYear();
            const emiYearsLeft = Math.max(0, safeNumber(profile.emiEndYear) - currentYear);
            const retireYrs = Math.max(1, Math.min(100, safeNumber(profile.retireAge) - safeNumber(profile.age)));
            const planningHorizon = Math.max(1, Math.min(120, safeNumber(profile.horizonAge) - safeNumber(profile.age)));
            const retirementDuration = Math.max(1, Math.min(100, safeNumber(profile.horizonAge) - safeNumber(profile.retireAge)));
            
            const inflatedBaseBurn = (monthlyBurnBase + monthlyInsVac) * Math.pow(infMultiplier, retireYrs);
            const activeEmiAtRetirement = retireYrs < emiYearsLeft ? safeNumber(profile.emi) : 0;
            const futureLife = inflatedBaseBurn + activeEmiAtRetirement; 
            const retireCorpus = (futureLife * 12) / (swr / 100); 
            const retirementSIP = useMemo(() => calculateStepUpSip(retireCorpus, retireYrs, 12, 0, 0), [retireCorpus, retireYrs]);

            const getScenarioReturn = (baseYield, yearIdx) => {
                const val = safeNumber(baseYield);
                if(scenario === 'bull') return val + 3;
                if(scenario === 'bear') {
                    if (yearIdx === 3) return Math.min(-15, val - 20); 
                    if (yearIdx === 4) return Math.min(-5, val - 15);
                    return Math.max(0, val - 3); 
                }
                return val;
            };

            const totalMixPct = useMemo(() => assetMix.reduce((sum, a) => sum + safeNumber(a.pct), 0), [assetMix]);

            const engineBlendedReturn = useMemo(() => {
                let totalPct = 0; let weightedRet = 0;
                assetMix.forEach(a => { totalPct += safeNumber(a.pct); weightedRet += safeNumber(a.pct) * safeNumber(a.ret); });
                return totalPct > 0 ? weightedRet / totalPct : 10;
            }, [assetMix]);

            const plan = useMemo(() => {
                const goals = [{ id: "retire", name: "Retirement Strategy", target: retireCorpus, horizon: retireYrs, icon: "umbrella", inflation: currentInflation, baseCost: (futureLife * 12 * retirementDuration) / Math.pow(infMultiplier, retireYrs) }];
                if (profile.childNodeActive && profile.hasChildren) {
                    Object.keys(profile.activeChildMilestones).forEach(k => {
                        if(profile.activeChildMilestones[k]) {
                            const [cIdx, mId] = k.split("-");
                            const mData = profile.childMilestoneData[k] || { cost: CHILD_MILESTONES.find(x=>x.id===mId).defaultCost, inflation: CHILD_MILESTONES.find(x=>x.id===mId).defaultInflation || 10 };
                            const yrs = CHILD_MILESTONES.find(x=>x.id===mId).age - Number(profile.childAges[cIdx.replace('c','')]);
