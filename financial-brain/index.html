        if (currentSlide === 0) return (<Slide title="Financial Baseline" subtitle={`The starting coordinates for ${profile.name || 'your'} master plan.`}><div className="grid grid-cols-1 md:grid-cols-3 gap-8 w-full"><SlideCard icon="trending-up" color="emerald" title="Monthly Income" value={<AnimatedCurrency value={totals.income} />} /><SlideCard icon="flame" color="rose" title="Monthly Burn" value={<AnimatedCurrency value={monthlyBurn} />} /><SlideCard icon="landmark" color="indigo" title="Liquid Assets" value={<AnimatedCurrency value={totalLiquidAssets} />} /></div></Slide>);
        if (currentSlide === 1) return (<Slide title="The Retirement Reality"><div className="flex flex-col md:flex-row items-center gap-12 w-full bg-white/80 shadow-2xl p-12 rounded-[32px] border border-white backdrop-blur-2xl"><div className="flex-1 space-y-8 pl-8"><div><p className="text-sm font-bold text-slate-500 uppercase tracking-widest">Current Lifestyle Cost</p><p className="text-4xl font-bold text-slate-800 mt-2"><AnimatedCurrency value={monthlyBurnBase + monthlyInsVac} /> <span className="text-xl text-slate-500">/ mo</span></p></div><div className="border-l-4 border-rose-400 pl-6 py-2"><p className="text-sm font-bold text-rose-600 uppercase tracking-widest">Cost in {retireYrs} Years (@ {currentInflation}% Inflation)</p><p className="text-5xl font-black text-rose-700 mt-2"><AnimatedCurrency value={futureLife} /> <span className="text-xl text-rose-900/50">/ mo</span></p></div></div><div className="flex-1 bg-gradient-to-br from-slate-900 to-slate-800 p-12 rounded-[24px] border border-teal-500/30 text-center shadow-2xl relative overflow-hidden"><div className="absolute top-0 right-0 w-40 h-40 bg-teal-500/20 blur-3xl rounded-full"></div><Icon name="database" size={48} className="mx-auto text-teal-400 mb-6 relative z-10"/><p className="text-sm font-bold text-teal-100 uppercase tracking-widest mb-4 relative z-10">Freedom Number</p><p className="text-5xl font-black text-teal-400 relative z-10"><AnimatedCurrency value={retireCorpus} /></p></div></div></Slide>);
        if (currentSlide === 2) return (<Slide title="Risk & Shield"><div className="grid grid-cols-1 md:grid-cols-3 gap-8 w-full"><SlideCard icon="briefcase" color="amber" title="Emergency Reserve" value={<AnimatedCurrency value={monthlyBurn * 6} />} valueSize="text-4xl" /><div className="p-10 bg-white/80 border border-white shadow-xl rounded-[40px] text-center backdrop-blur-2xl"><Icon name="activity" size={48} className="mx-auto text-rose-500 mb-6"/><p className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">Health Shield Status</p>{healthAnalysis.isAdequate ? <p className="text-emerald-700 font-bold bg-emerald-50 p-4 mt-6 rounded-2xl text-base border border-emerald-100">✅ Adequate</p> : <p className="text-rose-700 font-bold bg-rose-50 p-4 mt-6 rounded-2xl text-base border border-rose-100">⚠️ Shortfall: {formatCurrency(healthAnalysis.shortfall)}</p>}</div><SlideCard icon="shield" color="emerald" title="Income Replacement" value={<AnimatedCurrency value={totals.income * 12 * 20} />} valueSize="text-4xl" /></div></Slide>);
        if (currentSlide === 3) return (<Slide title="Wealth Allocation"><div className="flex flex-col md:flex-row gap-8 w-full"><SlideCard icon="layers" color="amber" title="Goal Linked Assets" value={<AnimatedCurrency value={totalLiquidAssets - unallocatedData.remaining} />} /><div className="flex-1 p-12 bg-indigo-50 border border-indigo-200 rounded-[32px] text-center shadow-2xl backdrop-blur-2xl"><Icon name="rocket" size={56} className="mx-auto text-indigo-600 mb-6"/><p className="text-sm font-bold text-indigo-800 uppercase tracking-widest mb-2">Legacy Pot (Unallocated Liquid)</p><p className="text-5xl font-black text-indigo-700"><AnimatedCurrency value={unallocatedData.remaining} /></p></div></div></Slide>);
        if (currentSlide === 4) return (<Slide title="Execution Strategy"><div className="flex w-full gap-10"><div className="w-1/3 flex flex-col gap-6"><div className="p-10 bg-white/80 border border-white shadow-xl rounded-[32px] backdrop-blur-2xl"><p className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">Total Monthly SIP Needed</p><p className="text-5xl font-black text-teal-700"><AnimatedCurrency value={totalSIPRequired} /></p></div><div className={`p-10 rounded-[32px] border backdrop-blur-2xl shadow-xl ${totalSIPRequired > safeNumber(profile.currentSip) ? 'bg-rose-50 border-rose-200' : 'bg-emerald-50 border-emerald-200'}`}><p className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-2">Execution Gap</p><p className={`text-3xl font-black flex items-center gap-2 ${totalSIPRequired > safeNumber(profile.currentSip) ? 'text-rose-600' : 'text-emerald-600'}`}>{totalSIPRequired > safeNumber(profile.currentSip) ? <React.Fragment><AnimatedCurrency value={totalSIPRequired - safeNumber(profile.currentSip)} /> Short</React.Fragment> : 'Fully Funded!'}</p></div></div><div className="w-2/3 max-h-[500px] overflow-y-auto pr-4 custom-scrollbar space-y-4">{plan.map(g => (<div key={g.id} className="flex justify-between items-center p-8 bg-white/80 shadow-md border border-white rounded-[24px]"><div><p className="text-xl font-bold text-slate-900">{g.name}</p><p className="text-sm text-slate-500 mt-1 font-semibold">Target: {formatCurrency(g.target)} in {g.horizon} Yrs</p></div><div className="text-right"><p className="text-xs font-bold uppercase text-teal-700 tracking-widest mb-1">Req. SIP</p><p className="text-3xl font-black text-slate-900"><AnimatedCurrency value={g.sip} /></p></div></div>))}</div></div></Slide>);
        if (currentSlide === 5) { const finalSim = masterSimulationData[masterSimulationData.length - 1]; const totalSipInvested = masterSimulationData.reduce((acc, row) => acc + row.sip, 0); const totalCapitalDeployed = totalAssets + totalSipInvested; return (<Slide title="The Quantum Trajectory"><div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-5xl"><SlideCard icon="piggy-bank" color="purple" title="Lifetime Capital Deployed" value={<AnimatedCurrency value={totalCapitalDeployed} />} /><div className="p-12 bg-purple-50 border border-purple-200 rounded-[32px] text-center shadow-2xl backdrop-blur-2xl"><Icon name="globe" size={56} className="mx-auto text-purple-600 mb-6"/><p className="text-sm font-bold text-purple-800 uppercase tracking-widest mb-2">Terminal Wealth (Closing Corpus)</p><p className="text-5xl font-black text-purple-700 tracking-tighter"><AnimatedCurrency value={finalSim?.closing || 0} /></p></div></div></Slide>); }
      };

      return (
        <div id="blueprint-root" className={`w-full mx-auto transition-all duration-500 ${blueprintLayout === 'list' ? 'max-w-[1200px] flex flex-col gap-6' : 'max-w-[1200px] grid grid-cols-12 gap-6'} text-left blueprint-container relative z-10 px-4 lg:px-8 pb-32`}>
          {isPresenting && ReactDOM.createPortal(
            <div className="fixed inset-0 z-[10000] bg-[#F5F5F7] flex flex-col no-print text-slate-900">
              <div className="absolute top-8 left-8 z-[10001] group no-print"><button onClick={() => setIsConsoleOpen(!isConsoleOpen)} className={`w-12 h-12 rounded-full flex items-center justify-center transition-all duration-500 backdrop-blur-md ${isConsoleOpen ? 'bg-slate-200 text-slate-800 rotate-90' : 'bg-transparent text-slate-400 group-hover:bg-slate-200 group-hover:text-slate-800'}`}><Icon name="settings" size={24} /></button><div className={`absolute top-16 left-0 w-80 bg-white/90 backdrop-blur-xl border border-slate-200 rounded-3xl p-6 shadow-2xl transition-all duration-500 origin-top-left ${isConsoleOpen ? 'scale-100 opacity-100 visible' : 'scale-95 opacity-0 invisible'}`}><h4 className="text-slate-900 text-sm font-bold uppercase tracking-widest border-b border-slate-100 pb-4 mb-6 flex items-center gap-2"><Icon name="sliders" size={16} className="text-teal-600" /> Stealth Console</h4><div className="space-y-6"><div><div className="flex justify-between items-end mb-3"><label className="text-xs font-bold text-slate-500 uppercase tracking-widest block">Retirement Age</label><span className="text-base font-bold text-slate-900">{profile.retireAge} Yrs</span></div><input type="range" min={safeNumber(profile.age) + 1} max={safeNumber(profile.horizonAge) - 1} value={profile.retireAge} onChange={(e) => setProfile({...profile, retireAge: e.target.value})} className="w-full accent-teal-500" /></div><div><div className="flex justify-between items-end mb-3"><label className="text-xs font-bold text-slate-500 uppercase tracking-widest block">Burn Trim (Optimize)</label><span className="text-base font-bold text-slate-900">-{burnTrim}%</span></div><input type="range" min="0" max="30" step="5" value={burnTrim} onChange={(e) => setBurnTrim(Number(e.target.value))} className="w-full accent-amber-500" /></div></div></div></div>
              <div className="absolute top-8 right-8 flex gap-4 z-50"><button onClick={() => { setIsPresenting(false); setBurnTrim(0); setScenario('base'); }} className="px-6 py-3.5 bg-slate-200 hover:bg-slate-300 text-slate-800 rounded-full font-bold text-sm uppercase tracking-widest transition-all backdrop-blur-md flex items-center gap-2 shadow-sm"><Icon name="x" size={18}/> Exit</button></div>
              <div className="flex-1 relative overflow-hidden">{renderPresentationSlide()}</div>
              <div className="absolute bottom-12 left-0 right-0 flex justify-center items-center gap-8 z-50"><button disabled={currentSlide === 0} onClick={() => setCurrentSlide(c => c - 1)} className="w-16 h-16 rounded-full bg-white shadow-lg border border-slate-100 flex items-center justify-center text-slate-800 disabled:opacity-30 hover:bg-slate-50 transition-colors"><Icon name="chevron-left" size={28}/></button><div className="flex gap-4">{[0,1,2,3,4,5].map(i => (<div key={i} className={`w-3 h-3 rounded-full transition-all ${currentSlide === i ? 'bg-teal-500 scale-125' : 'bg-slate-300'}`} />))}</div><button disabled={currentSlide === 5} onClick={() => setCurrentSlide(c => c + 1)} className="w-16 h-16 rounded-full bg-white shadow-lg border border-slate-100 flex items-center justify-center text-slate-800 disabled:opacity-30 hover:bg-slate-50 transition-colors"><Icon name="chevron-right" size={28}/></button></div>
            </div>,
            document.body
          )}

          <div className={blueprintLayout === 'list' ? 'col-span-full' : 'col-span-12'}>
            <div className="no-print pt-6 pb-2 cinematic-enter">
              <header className="premium-card p-6 flex flex-col lg:flex-row gap-5 items-center justify-between w-full">
                <div className="text-left w-full lg:w-auto relative z-10"><h2 className="text-3xl font-black heading-font text-slate-900 uppercase tracking-tighter">Baba Blueprint</h2><p className="text-teal-700 font-bold uppercase tracking-[0.3em] text-xs mt-1">Platinum Strategy Synthesis</p></div>
                <div className="flex flex-wrap gap-4 items-center justify-start lg:justify-end w-full lg:w-auto relative z-10">
                  <div className="flex bg-white/60 backdrop-blur-md border border-slate-200/80 p-1.5 rounded-xl shadow-sm"><button onClick={() => setBlueprintLayout('list')} className={`px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all ${blueprintLayout === 'list' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600 hover:text-slate-900 hover:bg-white/80'}`}><Icon name="list" size={16}/></button><button onClick={() => setBlueprintLayout('bento')} className={`px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all ${blueprintLayout === 'bento' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600 hover:text-slate-900 hover:bg-white/80'}`}><Icon name="layout-grid" size={16}/></button><button onClick={() => setBlueprintLayout('compact')} className={`px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest transition-all ${blueprintLayout === 'compact' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-600 hover:text-slate-900 hover:bg-white/80'}`}><Icon name="columns" size={16}/></button></div>
                  <div className="flex flex-col gap-1.5 relative z-50"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest px-1">Advisor Name</label><input type="text" placeholder="Enter Advisor Name" className={`border border-slate-300 outline-none text-xs font-bold text-slate-800 bg-white/80 backdrop-blur-md px-4 py-2.5 rounded-xl shadow-sm w-48 placeholder:font-medium transition-all focus:ring-2 focus:ring-teal-500/20 ${!profile.advisorName ? 'advisor-pulse' : ''}`} value={profile.advisorName || ''} onChange={(e) => setProfile({...profile, advisorName: e.target.value})} /></div>
                  {profile.advisorName && ( <div className="flex gap-2 animate-in slide-in-from-right-4 fade-in duration-500"><button onClick={handlePrint} disabled={isGeneratingPDF} className={`px-6 py-2.5 bg-slate-900 text-white rounded-xl font-bold text-xs uppercase tracking-widest shadow-md active:scale-95 transition-all flex items-center gap-2 hover:bg-slate-800 ${isGeneratingPDF ? 'opacity-70' : ''}`}><Icon name={isGeneratingPDF ? "loader" : "printer"} size={16} className={isGeneratingPDF ? "animate-spin" : ""}/> PDF</button><button onClick={() => handleShare('whatsapp')} className="p-3 bg-emerald-600 text-white rounded-xl hover:bg-emerald-700 shadow-md active:scale-95 transition-transform"><Icon name="message-circle" size={18}/></button><button onClick={() => handleShare('mail')} className="p-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 shadow-md active:scale-95 transition-transform" title="Share via Email"><Icon name="mail" size={18}/></button></div> )}
                  <button onClick={() => { setCurrentSlide(0); setIsPresenting(true); }} className="px-6 py-2.5 bg-indigo-50 text-indigo-700 rounded-xl font-black text-xs uppercase tracking-widest shadow-sm active:scale-95 transition-all flex items-center gap-2 hover:bg-indigo-100 hover:shadow-md border border-indigo-200"><Icon name="monitor-play" size={16}/> Present</button>
                </div>
              </header>
              <div className="w-full p-5 premium-card flex flex-col xl:flex-row items-center justify-between text-left mt-6 gap-6 break-inside-avoid print-block">
                <div className="flex gap-5 items-center text-left relative z-10 w-full xl:w-auto px-2"><div className={`w-16 h-16 rounded-full border-[5px] flex items-center justify-center font-black text-2xl shadow-md shrink-0 ${strategyHealthScore > 75 ? 'border-emerald-500 text-emerald-700 bg-emerald-50' : strategyHealthScore > 50 ? 'border-amber-500 text-amber-700 bg-amber-50' : 'border-rose-500 text-rose-700 bg-rose-50'}`}>{strategyHealthScore}</div><div className="text-left flex-1"><p className="text-xs font-bold uppercase tracking-widest text-slate-500 mb-0.5">Strategy Health</p><p className="text-xl font-black text-slate-900 leading-tight">{strategyHealthScore > 75 ? 'Excellent' : strategyHealthScore > 50 ? 'On Track' : 'Critical Action Needed'}</p><p className={`text-[10px] font-bold uppercase tracking-widest mt-1.5 ${verdict.color}`}>Verdict: {verdict.title}</p></div></div>
                <div className="flex flex-wrap gap-4 w-full xl:w-auto flex-1 xl:justify-end"><div className="bg-white/60 backdrop-blur-md border border-white/80 rounded-2xl px-5 py-4 flex-1 min-w-[250px] max-w-md shadow-sm flex items-start gap-4"><Icon name="zap" size={20} className="text-amber-500 shrink-0 mt-0.5" /><div><p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Quick Tip</p><p className="text-xs font-semibold text-slate-800 leading-relaxed">{freeCashflow > 0 ? `Invest your ₹${Math.round(freeCashflow).toLocaleString()}/mo surplus systematically to accelerate freedom.` : `A ₹${Math.round(Math.abs(freeCashflow)).toLocaleString()}/mo gap exists. Review your lifestyle burn carefully.`}</p></div></div></div>
              </div>
            </div>
          </div>

          <div className="hidden print-only mb-12 pb-8 border-b-2 border-slate-200 text-left break-inside-avoid print-block">
            <div className="absolute top-0 left-0 w-8 h-full bg-slate-900"></div><div className="p-12 pl-20"><div className="flex justify-between items-start mb-16"><div><p className="text-sm font-bold text-teal-700 tracking-[0.3em] uppercase mb-3">Confidential Strategy Document</p><h1 className="text-5xl font-black heading-font text-slate-900 uppercase tracking-tighter">Strategic Wealth Blueprint</h1></div><div className="text-right"><p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Generated On</p><p className="text-base font-bold text-slate-900">{new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</p></div></div><div className="grid grid-cols-2 gap-12 border-t-2 border-slate-100 pt-10"><div><p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="user" size={14}/> Prepared Exclusively For</p><p className="text-3xl font-black text-slate-900 uppercase tracking-tight">{profile.name || 'Valued Client'}</p></div><div><p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="briefcase" size={14}/> Strategic Partner</p><p className="text-3xl font-black text-slate-900 uppercase tracking-tight">{profile.advisorName || 'BABA Advisor'}</p></div></div></div>
          </div>
          
          <PhaseWrapper num={1} title="Executive Summary" layout={blueprintLayout} gridClasses={blueprintLayout === 'compact' ? 'col-span-12' : 'col-span-12 lg:col-span-8'} delayClass="stagger-1">
            {safeNumber(profile.age) > 0 && ageFact && (<div className="mb-6 p-5 bg-white/80 rounded-2xl border border-indigo-100 shadow-sm break-inside-avoid print-block"><p className="text-[10px] font-black text-indigo-700 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="book-open" size={14}/> Age {profile.age} Intelligence</p><p className="text-base font-semibold text-slate-900">"{ageFact.c}"</p>{ageFact.f && <p className="text-xs text-slate-500 mt-3 font-medium border-t border-slate-200 pt-3">💡 <strong>Context:</strong> {ageFact.f}</p>}</div>)}
            <div className="space-y-4 text-slate-700 text-left mb-6 break-inside-avoid print-block"><p className="text-lg font-bold text-slate-900">Hi {profile.name || "Strategist"} 👋,</p><p className="font-medium text-sm leading-relaxed">We have baselined your financial coordinates for a long-term strategic horizon. To build a robust plan, we first need absolute clarity on your starting position. Here is exactly where your cashflow and assets stand today:</p><ul className="list-disc pl-6 space-y-3 text-sm font-medium text-slate-600 text-left mt-4"><li>Income: <strong className="text-teal-700 text-base">{formatCurrency(totals.income)}</strong> /mo</li><li>Burn: <strong className="text-rose-600 text-base">{formatCurrency(monthlyBurn)}</strong> /mo<div className="flex flex-wrap gap-2 mt-3 mb-2">{safeNumber(profile.rent) > 0 && <span className="text-xs font-bold bg-white/60 backdrop-blur-sm px-3 py-1.5 rounded-lg text-slate-700 border border-white/80 shadow-sm">Rent: {formatCurrency(profile.rent)}</span>}{safeNumber(profile.emi) > 0 && <span className="text-xs font-bold bg-white/60 backdrop-blur-sm px-3 py-1.5 rounded-lg text-slate-700 border border-white/80 shadow-sm">EMI: {formatCurrency(profile.emi)} (Ends {profile.emiEndYear || 'N/A'})</span>}{safeNumber(profile.household) > 0 && <span className="text-xs font-bold bg-white/60 backdrop-blur-sm px-3 py-1.5 rounded-lg text-slate-700 border border-white/80 shadow-sm">Household: {formatCurrency(profile.household)}</span>}{safeNumber(profile.lifestyle) > 0 && <span className="text-xs font-bold bg-white/60 backdrop-blur-sm px-3 py-1.5 rounded-lg text-slate-700 border border-white/80 shadow-sm">Lifestyle: {formatCurrency(profile.lifestyle)}</span>}{safeNumber(profile.vacation) > 0 && <span className="text-xs font-bold bg-white/60 backdrop-blur-sm px-3 py-1.5 rounded-lg text-slate-700 border border-white/80 shadow-sm">Vacation: {formatCurrency(safeNumber(profile.vacation)/12)}/mo</span>}</div></li><li>Total Assets: <strong className="text-indigo-700 text-base">{formatCurrency(totalAssets)}</strong> today<div className="text-xs mt-1 text-slate-500 font-semibold">(Liquid: {formatCurrency(totalLiquidAssets)} | Illiquid: {formatCurrency(totalIlliquidAssets)})</div></li><li>Current SIP Flow: <strong className="text-teal-700 text-base">{formatCurrency(profile.currentSip)}</strong> /mo</li></ul></div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-auto"><div className="bg-white/60 backdrop-blur-md rounded-2xl border border-white/80 p-5 shadow-sm flex flex-col justify-between break-inside-avoid print-block"><div><div className="flex justify-between items-end mb-4"><div><h4 className="text-[10px] font-black text-slate-600 uppercase tracking-widest">💧 Liquidity Reality Check</h4></div></div><div className="space-y-4"><div className="space-y-2.5 text-sm font-bold"><div className="flex justify-between"><span className="text-slate-500">Income</span><span className="text-slate-900">{formatCurrency(totals.income)}</span></div><div className="flex justify-between"><span className="text-slate-500">Invest + Burn</span><span className="text-slate-600">{formatCurrency(totalSIPRequired + monthlyBurn)}</span></div><div className="flex justify-between pt-3 border-t border-slate-200/80"><span className="text-slate-800">Free Cashflow</span><span className={`${freeCashflow >= 0 ? 'text-emerald-600' : 'text-rose-600'}`}>{formatCurrency(freeCashflow)}</span></div></div><div className="h-4 bg-white/80 backdrop-blur-sm rounded-full overflow-hidden flex relative border border-slate-200 shadow-inner mt-2"><div className="h-full bg-slate-400 transition-all" style={{width: `${Math.min(100, (monthlyBurn/totals.income)*100)}%`}} title="Lifestyle Burn"></div><div className="h-full bg-teal-500 transition-all" style={{width: `${Math.min(100, (totalSIPRequired/totals.income)*100)}%`}} title="Goal Investment"></div></div></div></div></div><div className="flex flex-col justify-center break-inside-avoid print-block"><AssetAllocationPie profile={profile} /></div></div>
          </PhaseWrapper>

          <PhaseWrapper num={2} title="Retirement Reality" layout={blueprintLayout} gridClasses={blueprintLayout === 'compact' ? 'col-span-12 md:col-span-6' : 'col-span-12 lg:col-span-4'} delayClass="stagger-2">
            <div className="mb-5 text-left border-b border-slate-200/80 pb-5 break-inside-avoid print-block">
              <div className="mt-4 p-4 bg-slate-50 rounded-xl border border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4 break-inside-avoid shadow-sm mb-4">
                <div><p className="text-sm font-bold text-slate-800">Safe Withdrawal Rate (SWR)</p><p className="text-[10px] font-medium text-slate-500 mt-1">How much of your corpus you withdraw annually.</p></div>
                <div className="flex bg-slate-200/60 p-1 rounded-lg shadow-inner shrink-0">
                  <button onClick={() => setSwr(3)} className={`px-4 py-2 rounded-md text-xs font-bold transition-all ${swr === 3 ? 'bg-white text-slate-900 shadow-sm scale-100' : 'text-slate-500 scale-95 hover:scale-100'}`}>3%</button>
                  <button onClick={() => setSwr(4)} className={`px-4 py-2 rounded-md text-xs font-bold transition-all ${swr === 4 ? 'bg-white text-slate-900 shadow-sm scale-100' : 'text-slate-500 scale-95 hover:scale-100'}`}>4%</button>
                </div>
              </div>
              <p className="text-sm font-medium text-slate-700 leading-relaxed mb-4">Let's decode the exact mathematical cost of your future freedom. We project your current lifestyle into the future to find your ultimate target.</p><div className="flex items-center justify-between bg-white/70 p-3 rounded-xl shadow-sm border border-white/90 gap-3"><div><h4 className="text-xs font-black text-slate-800 uppercase tracking-widest flex items-center gap-2"><Icon name="activity" size={14} className={isInflationShock ? "text-rose-500 animate-pulse" : "text-slate-500"}/> Inflation 6-14%</h4></div><div className="flex bg-slate-200/50 p-1 rounded-lg shadow-inner border border-slate-300/50 shrink-0"><button onClick={() => setIsInflationShock(false)} className={`px-4 py-1.5 rounded-md text-[10px] font-black transition-all ${!isInflationShock ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>6% Base</button><button onClick={() => setIsInflationShock(true)} className={`px-4 py-1.5 rounded-md text-[10px] font-black transition-all ${isInflationShock ? 'bg-rose-500 text-white shadow-sm' : 'text-slate-500 hover:text-rose-500'}`}>8% Shock</button></div></div></div>

Pool"], ["Real Estate (Investment) Value", safeNumber(profile.realAssets), "realAssets"], [], ["--- 5. EXECUTION LEDGER ---", "", ""], ["Current Monthly SIP", safeNumber(profile.currentSip), "currentSip"], ["Annual SIP Step-up %", safeNumber(profile.sipStepUp), "sipStepUp"], [], ["--- LIVE CALCULATION SANDBOX ---", "", "", "Description"], ["Metric", "Formula Output", "", ""], ["Total Monthly Income", { f: "B10+B11" }, "", "= Salary + Business Income"], ["Total Monthly Burn (Baseline)", { f: "B15+B16+B19+B20+(B21/12)+(B25/12)+(B26/12)" }, "", "= Rent + EMI + Household + Lifestyle + (Vacation/12) + (Insurance/12)"], ["Years to Retirement", { f: "B9-B8" }, "", "= Target Retirement Age - Current Age"], ["Assumed Inflation Rate", 0.06, "", "Change this to test (e.g. 0.08 for 8%)"], ["Future Monthly Lifestyle Cost", { f: "B43*POWER(1+B45, B44)" }, "", "Projected cost of living at retirement"], ["Assumed Safe Withdrawal Rate (SWR)", 0.04, "", "Change to 0.03 for a more conservative 3% rule"], ["TARGET FREEDOM CORPUS", { f: "(B46*12)/B47" }, "", "The absolute mountain you need to build."] ]; const ws = XLSX.utils.aoa_to_sheet(wsData); ws['!cols'] = [{wch: 45}, {wch: 25}, {hidden: true}, {wch: 55}]; const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Master_Blueprint"); XLSX.writeFile(wb, `Financial_Brain_Sandbox_${profile.name || "Client"}.xlsx`); };

                  <div><h3 className="text-sm font-black text-slate-900 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="download" size={16} className="text-indigo-600"/> The Excel Sandbox</h3><p className="text-sm font-medium text-slate-600 leading-relaxed">Click <strong>Sandbox</strong> to download an offline Excel template. You can email this to a client to fill out on their own time. Once returned, click <strong>Upload</strong> to instantly map all their data into the Financial Brain UI without manual data entry.</p></div>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="bg-slate-50 p-5 rounded-xl border border-slate-100"><h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">1. Personal Profile</h4><p className="text-xs font-medium text-slate-600 leading-relaxed">Establishes the foundational timeline (Current Age vs Retirement Age) and baseline income streams required to calculate liquidity.</p></div><div className="bg-slate-50 p-5 rounded-xl border border-slate-100"><h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">2. Cashflow & Risk</h4><p className="text-xs font-medium text-slate-600 leading-relaxed">Audits current lifestyle burn (rent, EMI, lifestyle) to project exactly how much it will cost to survive in retirement after factoring in inflation.</p></div><div className="bg-slate-50 p-5 rounded-xl border border-slate-100"><h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">3. Asset Reservoirs</h4><p className="text-xs font-medium text-slate-600 leading-relaxed">Captures existing wealth. In Phase 4, you can "deploy" this wealth strategically to drastically reduce the monthly SIPs required for goals.</p></div><div className="bg-slate-50 p-5 rounded-xl border border-slate-100"><h4 className="text-xs font-bold text-slate-800 uppercase tracking-widest mb-2">4. Target Strategy</h4><p className="text-xs font-medium text-slate-600 leading-relaxed">Creates execution buckets. Define goals like children's education or a luxury house, and the engine calculates exact SIPs needed.</p></div></div>
                  <div><h3 className="text-sm font-black text-slate-900 uppercase tracking-widest mb-2 flex items-center gap-2"><Icon name="monitor-play" size={16} className="text-purple-600"/> Master Projection Engine</h3><p className="text-sm font-medium text-slate-600 leading-relaxed mb-4">Located at the end of the Blueprint. This launches the quantum simulation engine, charting month-by-month cash flows, compounding interest, and automated redemptions (including the retirement freedom paycheck) over the entire planning horizon.</p><div className="space-y-3 bg-white border border-slate-200 p-4 rounded-xl shadow-sm"><p className="text-xs font-medium text-slate-700"><strong>🐻 Bear Market:</strong> Simulates a severe -15% crash in year 3 followed by a sluggish recovery.</p><p className="text-xs font-medium text-slate-700"><strong>⚖️ Base Trajectory:</strong> Uses standard, weighted historical averages based on the Asset Tuner.</p><p className="text-xs font-medium text-slate-700"><strong>🐂 Bull Market:</strong> Adds a +3% baseline boost simulating an extended economic boom.</p><div className="border-t border-slate-100 pt-3 mt-3"><p className="text-xs font-medium text-slate-700"><strong>Net Tax Mode:</strong> Dynamically deducts STCG (20%) / LTCG (12.5% over 1.25L) & Debt Slab (30%) taxes strictly during redemption events.</p><p className="text-xs font-medium text-slate-700"><strong>Real Value Mode:</strong> Discounts future wealth back to today's purchasing power using the assumed inflation rate.</p></div></div></div>
                </div>
                <div className="p-5 border-t border-slate-100 bg-slate-50 shrink-0 text-center"><button onClick={() => setIsFAQOpen(false)} className="px-8 py-3 bg-slate-900 text-white font-bold text-xs uppercase tracking-widest rounded-xl hover:bg-slate-800 transition-colors shadow-md">Acknowledge & Close</button></div>
              </div>
            </div>
          )}

          {showResetConfirm && (
            <div className="fixed inset-0 z-[9999] flex items-center justify-center p-6 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl animate-in zoom-in-95 text-center border border-slate-100">
                <div className="w-16 h-16 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-5 text-rose-500 border border-rose-100"><Icon name="refresh-cw" size={32} /></div>
                <h3 className="text-xl font-black text-slate-900 mb-2 uppercase tracking-tighter">Restart Journey?</h3><p className="text-xs font-semibold text-slate-500 mb-8 leading-relaxed px-2">This will wipe all current inputs and return you to the command center. This action cannot be undone.</p>
                <div className="flex gap-3 w-full"><button onClick={() => setShowResetConfirm(false)} className="flex-1 py-3 rounded-xl text-xs font-bold uppercase tracking-widest text-slate-600 bg-slate-50 border border-slate-200 hover:bg-slate-100 transition-colors shadow-sm">Cancel</button><button onClick={confirmResetJourney} className="flex-1 py-3 rounded-xl text-xs font-bold uppercase tracking-widest text-white bg-rose-600 hover:bg-rose-700 shadow-lg shadow-rose-200 transition-all active:scale-95">Restart</button></div>
              </div>
            </div>
          )}
          
          <div ref={parallaxRef} className={`parallax-wrapper ${isBlueprintMode ? 'opacity-30 blur-[60px]' : ''}`}>
            <LiquidBackground view={view} isBlueprintMode={isBlueprintMode} />
            <FloatingPillCloud active={view === 'cover'} />
          </div>

          <div className="relative h-full w-full overflow-hidden flex flex-col text-left">
            {view !== 'cover' && (
              <header className="px-6 py-4 premium-card border-b border-white/60 flex justify-between items-center no-print animate-in slide-in-from-top duration-700 shrink-0 text-left z-50 rounded-none shadow-[0_4px_20px_rgba(15,23,42,0.03)]">
                <div className="flex items-center gap-3 cursor-pointer group text-left" onClick={() => setView('cover')}>
                  <div className="p-2 bg-slate-900 text-white rounded-lg shadow-lg brain-glow leading-none flex items-center justify-center text-left"><Icon name="brain" size={16}/></div>
                  <div className="text-left"><h1 className="text-sm font-black text-slate-900 uppercase tracking-tighter leading-none text-left">Financial Brain</h1><p className="text-[8px] font-bold text-slate-600 mt-1 uppercase tracking-widest leading-none text-left">Powered by BABA Tools</p></div>
                </div>
                <div className="flex items-center gap-2">
                  <button onClick={() => setIsFAQOpen(true)} className="px-3 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg font-bold text-[10px] uppercase tracking-widest shadow-sm flex items-center gap-2 hover:bg-white active:scale-95 transition-all" title="System Guidebook"><Icon name="book-open" size={14}/> Guide</button>
                  <button onClick={downloadQuestionnaire} className="px-3 py-2 bg-indigo-50 text-indigo-700 border border-indigo-200 rounded-lg font-bold text-[10px] uppercase tracking-widest shadow-sm flex items-center gap-2 hover:bg-white active:scale-95 transition-all" title="Download Live Sandbox Excel Template"><Icon name="download" size={14}/> Sandbox</button>
                  <label className="cursor-pointer px-3 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-lg font-bold text-[10px] uppercase tracking-widest shadow-sm flex items-center gap-2 hover:bg-white active:scale-95 transition-all" title="Upload Edited Excel File"><Icon name="upload" size={14}/> Upload<input type="file" accept=".xlsx, .xls, .csv" onChange={handleUploadQuestionnaire} className="hidden" /></label>
                  <button onClick={() => setShowResetConfirm(true)} className="px-3 py-2 bg-rose-50 text-rose-700 border border-rose-200 rounded-lg font-bold text-[10px] uppercase tracking-widest shadow-sm flex items-center gap-2 hover:bg-white active:scale-95 transition-all"><Icon name="refresh-cw" size={14}/> Restart</button>
                </div>
              </header>
            )}
            
            <div ref={scrollContainerRef} className="page-transition-container flex-1 custom-scrollbar text-left relative">
              <div className={view !== 'cover' ? "pt-6 pb-28 text-left" : "text-left"}>
                {view === 'cover' && (
                  <div className="min-h-screen flex items-center justify-center p-6 relative text-left cinematic-enter">
                    <div className="relative max-w-md w-full">
                      <div className="hero-glow-aura"></div>
                      <div className="hero-card p-12 text-center relative z-10">
                        <div className="w-24 h-24 bg-gradient-to-br from-white to-slate-50 rounded-[28px] flex items-center justify-center mx-auto shadow-[0_20px_40px_-10px_rgba(15,118,110,0.2),_inset_0_2px_4px_rgba(255,255,255,1)] border border-white mb-8 text-teal-700 transition-transform hover:scale-105 hover:-rotate-3 relative group">
                          <div className="absolute inset-0 bg-teal-400/20 rounded-[28px] opacity-0 group-hover:opacity-100 transition-opacity blur-md"></div>
                          <Icon name="brain" size={48} className="relative z-10 drop-shadow-md" />
                        </div>
                        <h1 className="text-[40px] font-black heading-font uppercase mb-3 tracking-tighter leading-none text-center text-transparent bg-clip-text bg-gradient-to-br from-slate-900 via-slate-800 to-slate-500 drop-shadow-sm">Financial Brain</h1>
                        <p className="text-teal-700 text-[10px] font-extrabold uppercase tracking-[0.5em] mb-10 text-center">Powered by BABA Tools</p>
                        <button onClick={() => setView('flow')} className="w-full hero-btn py-5 rounded-2xl font-extrabold uppercase text-xs tracking-widest flex items-center justify-center gap-3 group text-center relative overflow-hidden">
                          <span className="relative z-10 flex items-center gap-2">Start Your Journey <Icon name="chevron-right" size={18} className="group-hover:translate-x-1.5 transition-transform duration-300"/></span>
                          <div className="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]"></div>
                        </button>
                      </div>
                    </div>
                  </div>
                )}
                {view === 'flow' && step < 5 && (
                  <CalibrationFlow profile={profile} setProfile={setProfile} step={step} />
                )}
                {view === 'flow' && step === 5 && (
                  <SynthesisView profile={profile} setProfile={setProfile} />
                )}
              </div>
            </div>

            {view !== 'cover' && (
              <div className="fixed bottom-0 left-0 right-0 z-50 px-4 py-3 bg-white/60 backdrop-blur-xl border-t border-white/80 no-print animate-in slide-in-from-bottom-8 duration-700 shadow-[0_-10px_30px_rgba(15,23,42,0.05)] text-left">
                <div className="max-w-[1800px] w-full mx-auto px-4 md:px-8 flex items-center justify-between gap-6 text-left">
                  <div className="flex-1 flex items-center gap-4 text-left">
                    <button onClick={() => setIsTaskSwitcherOpen(true)} className="w-10 h-10 bg-slate-900 text-white rounded-lg flex items-center justify-center shadow-md hover:scale-110 active:scale-95 transition-all group text-left"><Icon name="grid" size={16}/></button>
                    <div className="flex-1 max-w-xs hidden sm:block text-left">
                      <div className="flex justify-between items-end mb-1 text-left">
                        <span className="text-[8px] font-bold uppercase tracking-[0.4em] text-slate-500 text-left">Sequence Progress</span>
                        <span className="text-[9px] font-bold text-teal-800 bg-teal-50/80 px-2 py-0.5 rounded border border-teal-200/50 text-left">{Math.round((step/5)*100)}%</span>
                      </div>
                      <div className="h-1.5 bg-slate-200/50 rounded-full overflow-hidden shadow-[inset_0_1px_2px_rgba(0,0,0,0.05)] border border-white/50 text-left"><div className="h-full bg-teal-500 transition-all duration-1000 ease-out shadow-[0_0_15px_rgba(20,184,166,0.8)] text-left" style={{width: `${(step/5)*100}%`}} /></div>
                    </div>
                  </div>
                  <div className="flex items-center gap-4 text-left">
                    {step === 5 ? (
                      <>
                        <button onClick={() => setIsTaskSwitcherOpen(true)} className="px-5 h-10 bg-white/80 border border-white rounded-lg font-bold uppercase text-[10px] tracking-widest shadow-sm active:scale-95 transition-all flex items-center gap-2 hover:shadow-md hover:bg-white text-slate-800 text-left">Edit Inputs</button>
                      </>
                    ) : (
                      <div className="flex flex-col items-end gap-1">
                        <div className="flex gap-2">
                          <button onClick={() => step > 1 ? setStep(step-1) : setView('cover')} className="w-10 h-10 bg-white/80 border border-white/60 text-slate-700 rounded-lg flex items-center justify-center hover:bg-white active:scale-95 transition-all shadow-sm text-left"><Icon name="arrow-left" size={16}/></button>
                          <button disabled={(step === 1 && (safeNumber(profile.retireAge) <= safeNumber(profile.age))) || (step === 4 && (!profile.horizonAge || safeNumber(profile.horizonAge) <= safeNumber(profile.retireAge)))} onClick={() => { if(step < 5) setStep(step+1); }} className="px-6 h-10 bg-slate-900 text-white rounded-lg font-bold uppercase text-[10px] tracking-widest shadow-md active:scale-95 transition-all flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed hover:shadow-lg hover:bg-slate-950 text-left"> {step === 4 ? 'Generate Blueprint' : 'Next Step'} <Icon name="arrow-right" size={14}/> </button>
                        </div>
                        {step === 4 && (!profile.horizonAge || safeNumber(profile.horizonAge) <= safeNumber(profile.retireAge)) && (<span className="text-[8px] text-rose-600 font-bold animate-pulse text-right px-1">Horizon Age must be > Retirement</span>)}
                        {step === 1 && (safeNumber(profile.retireAge) <= safeNumber(profile.age)) && (<span className="text-[8px] text-rose-600 font-bold animate-pulse text-right px-1">Retirement Age must be > Current Age</span>)}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
            
            {/* Floating Scroll Indicator */}
            {showScrollIndicator && step < 5 && view === 'flow' && (
               <div className="fixed bottom-24 right-0 left-0 mx-auto w-fit z-[45] animate-bounce-subtle no-print pointer-events-none">
                <div className="bg-slate-900/90 backdrop-blur-md text-white px-5 py-2.5 rounded-full shadow-xl border border-white/20 flex items-center gap-2">
                  <span className="text-xs font-bold uppercase tracking-widest">Scroll Down</span>
                  <Icon name="arrow-down" size={16} />
                </div>
               </div>
            )}
          </div>
          <TaskSwitcher isOpen={isTaskSwitcherOpen} onToggle={() => setIsTaskSwitcherOpen(!isTaskSwitcherOpen)} currentStep={step} onJump={handleNav} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
