  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback } = React;

    // --- 1. UTILITIES & CONSTANTS ---
    
    // Global Stealth Mode Listener (CMD+SHIFT+S)
    window.addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 's') {
        e.preventDefault();
        document.body.classList.toggle('stealth-active');
      }
    });

    const useDebounce = (value, delay) => {
      const [debouncedValue, setDebouncedValue] = useState(value);
      useEffect(() => {
        const handler = setTimeout(() => setDebouncedValue(value), delay);
        return () => clearTimeout(handler);
      }, [value, delay]);
      return debouncedValue;
    };

    const safeNumber = (val) => {
      if (val === undefined || val === null || val === '') return 0;
      const parsed = parseFloat(String(val).replace(/,/g, ''));
      return isNaN(parsed) ? 0 : parsed;
    };

    const formatCurrency = (val) => {
      const num = safeNumber(val);
      if (num === 0) return "₹0";
      if (num >= 10000000) return `₹${(num / 10000000).toFixed(2)} Cr`;
      if (num >= 100000) return `₹${(num / 100000).toFixed(2)} L`;
      return "₹" + Math.round(num).toLocaleString('en-IN');
    };
    
    const formatMask = (val, isCurrency = false) => {
      if (val === "" || val === undefined || val === null) return "";
      let x = val.toString().replace(/,/g, '');
      if (!isCurrency && !/^\d+$/.test(x)) return x; 
      let lastThree = x.substring(x.length - 3);
      let otherNumbers = x.substring(0, x.length - 3);
      if (otherNumbers !== '') lastThree = ',' + lastThree;
      return otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + lastThree;
    };

    const calculateStepUpSip = (targetValue, years, returns, stepUp, lumpsum = 0) => {
      if (years <= 0 || targetValue <= 0) return 0;
      const r = (returns / 100) / 12, g = (stepUp || 0) / 100, n = years * 12;
      const fvLumpsum = r === 0 ? lumpsum : lumpsum * Math.pow(1 + r, n);
      const needed = Math.max(0, targetValue - fvLumpsum);
      if (needed <= 0) return 0;
      let low = 0, high = Math.max(needed, targetValue, needed / (n || 1) * 2); 
      for (let i = 0; i < 50; i++) { 
        let mid = (low + high) / 2, total = 0, curSip = mid;
        for (let m = 1; m <= n; m++) {
          total = r === 0 ? (total + curSip) : (total + curSip) * (1 + r);
          if (m % 12 === 0) curSip *= (1 + g);
        }
        if (total < needed) low = mid; else high = mid;
      }
      return high;
    };

    const AGE_DATA = {

    const getAgeInfo = (age) => {
      const numAge = parseInt(age);
      if (!numAge || isNaN(numAge) || numAge <= 0) return null; 
      if (numAge <= 18) return { c: "Foundation years.", f: "Most successful leaders did not build empires before adulthood." };
      let closest = 30;
      const keys = Object.keys(AGE_DATA).map(Number);
      closest = keys.reduce((prev, curr) => Math.abs(curr - numAge) < Math.abs(prev - numAge) ? curr : prev);
      return AGE_DATA[closest];
    };

    const getIncomeComment = (type, val) => {
      const v = safeNumber(val);
      if (v <= 0) return null; 
      if (type === 'salary') {
        if (v < 65000) return { c: "Discipline starts here.", f: "Focus on maximizing your savings rate." };

         return { c: "Scaling phase.", f: "Begin diversifying wealth away from your single-point business risk." };

    };

    const ASSET_CLASSES_LIST = [
      { id: "mfPool", label: "Mutual Funds", yield: 12, color: "#0f766e", isLiquid: true },

    const KEYWORDS = [
      "QUANTUM", "LEGACY", "COMPOUND", "HORIZON", "STRATEGY", "DESTINY", "EQUITY", "RESERVOIR", 
      "CAPITAL", "NAVIGATOR", "BLUEPRINT", "FIDUCIARY", "LIQUID", "FISCAL", "ZENITH", "CORE",

    // --- 2. SHARED COMPONENTS ---
    const useScrollIndicator = (containerRef, dependencies) => {
      const [showIndicator, setShowIndicator] = useState(false);
      useEffect(() => {
        const el = containerRef.current; if (!el) return;
        const handleScroll = () => {
          const isScrollable = el.scrollHeight > el.clientHeight + 30;
          const isAtBottom = el.scrollHeight - Math.ceil(el.scrollTop) - el.clientHeight < 30;
          setShowIndicator(isScrollable && !isAtBottom);
        };
        handleScroll(); 
        el.addEventListener('scroll', handleScroll);
        window.addEventListener('resize', handleScroll);
        const timeoutId = setTimeout(handleScroll, 500); 
        return () => { el.removeEventListener('scroll', handleScroll); window.removeEventListener('resize', handleScroll); clearTimeout(timeoutId); };
      }, [containerRef, ...dependencies]);
      return showIndicator;
    };

    const FloatingPillCloud = ({ active }) => {
      const containerRef = useRef(null);
      const activeRef = useRef(active);
      useEffect(() => { activeRef.current = active; }, [active]);
      
      const pills = useMemo(() => {
        const hdWords = [...KEYWORDS].slice(0, 45); 
        return Array.from({ length: 45 }).map((_, i) => ({
          id: i, word: hdWords[i % hdWords.length], x: Math.random() * 100, y: Math.random() * 100,
          vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25, driftX: 0, driftY: 0, interactX: 0, interactY: 0,
        }));
      }, []);

      useEffect(() => {
        const container = containerRef.current; if (!container) return; 
        
        // Remove old nodes if they exist
        container.innerHTML = '';
        
        if (!active) return; // Completely disable logic and DOM if inactive to save CPU

        const domEls = pills.map(p => {
          const el = document.createElement('div');
          el.className = 'floating-pill-element px-4 py-2 text-sm font-bold uppercase tracking-widest';
          el.innerText = p.word; el.style.left = `${p.x}%`; el.style.top = `${p.y}%`;
          container.appendChild(el); return { el, ...p }; 
        });

        let animationFrameId; let mouseX = -1000; let mouseY = -1000;

        const update = () => {
          if (!activeRef.current) return;
          const rect = container.getBoundingClientRect();
          domEls.forEach(p => {
            p.driftX += p.vx; p.driftY += p.vy;
            if (p.driftX > 150 || p.driftX < -150) p.vx *= -1;
            if (p.driftY > 150 || p.driftY < -150) p.vy *= -1;
            const pillPxX = (p.x / 100) * rect.width + p.driftX;
            const pillPxY = (p.y / 100) * rect.height + p.driftY;
            const dx = mouseX - pillPxX; const dy = mouseY - pillPxY;
            const dist = Math.sqrt(dx*dx + dy*dy); 
            let targetTx = 0, targetTy = 0;
            if (dist < 200) {
              const force = (200 - dist) / 200;
              const angle = Math.atan2(dy, dx);
              targetTx = Math.cos(angle) * force * -50;
              targetTy = Math.sin(angle) * force * -50;
            }
            p.interactX += (targetTx - p.interactX) * 0.08; p.interactY += (targetTy - p.interactY) * 0.08;
            p.el.style.transform = `translate3d(${p.driftX + p.interactX}px, ${p.driftY + p.interactY}px, 0)`;
          });
          animationFrameId = requestAnimationFrame(update);
        };
        const onMouseMove = (e) => { if (!activeRef.current) return; const rect = container.getBoundingClientRect(); mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top; };
        window.addEventListener('mousemove', onMouseMove); update();
        return () => { window.removeEventListener('mousemove', onMouseMove); cancelAnimationFrame(animationFrameId); if (container) container.innerHTML = ''; };
      }, [pills, active]);
      return <div ref={containerRef} className={`absolute inset-0 overflow-hidden z-0 pill-container transition-opacity duration-500 ${active ? 'opacity-100' : 'opacity-0 hidden'}`}></div>;

            <div className="bg-slate-900 rounded-2xl p-10 text-center text-white mb-10 shadow-xl border border-slate-800">

            <h3 className="text-xl font-black text-slate-800 mb-4 border-b border-slate-100 pb-2">Target Goal Matrix</h3>
            <table className="w-full text-left border-collapse mb-10">
               <thead>

            <div className="bg-amber-50 border border-amber-100 rounded-xl p-6 mb-10">
               <h4 className="text-base font-bold text-amber-900 mb-2">Cost of Delay</h4>
               <p className="text-sm text-amber-800 leading-relaxed text-justify">If execution is delayed by 12 months, your required monthly investment permanently increases due to lost compounding time. Initiating the SIP mandates immediately is critical to maintaining your wealth trajectory.</p>

            <div className="flex justify-between items-end px-12 mt-24">
               <div className="text-center w-64">

               <div className="text-center w-64">

                  <p className="text-sm font-bold text-slate-800">{profile.advisorName || 'Advisor Name'}</p>

          {/* PAGE 4: UHNW Action Plan & 3-Bucket Strategy */}
          <div className="pdf-page-break" style={{ padding: '60px', backgroundColor: '#ffffff' }}>
            <div className="border-b-2 border-slate-100 pb-4 mb-8">
               <h2 className="text-3xl font-black text-slate-900">Master Action Plan & Decumulation</h2>
            </div>
            
            <h3 className="text-xl font-black text-slate-800 mb-4 border-b border-slate-100 pb-2">Immediate Execution Steps</h3>

               <div className="p-5 border border-slate-200 rounded-xl bg-slate-50">

                  <p className="text-sm text-slate-700">{(totals.income * 12) >= 10000000 ? "Restructure via HUF or Family Trust to optimize high-bracket income." : "Maximize 80C & NPS to minimize current income tax drag. Route refunds to equities."}</p>
               </div>
               <div className="p-5 border border-slate-200 rounded-xl bg-slate-50">
                  <div className="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center font-black text-xs mb-3">4</div>
                  <h4 className="font-black text-slate-900 text-sm uppercase tracking-widest mb-2">Estate & Legacy</h4>
                  <p className="text-sm text-slate-700">Draft a registered Will and verify nominees for all <strong>{formatCurrency(totals.assets)}</strong> of current assets to ensure smooth transition.</p>
               </div>
            </div>

            <h3 className="text-xl font-black text-slate-800 mb-4 border-b border-slate-100 pb-2 mt-8">The 3-Bucket Retirement Decumulation Strategy</h3>
            <p className="text-sm text-slate-600 mb-6">At retirement age ({profile.retireAge}), your target corpus of <strong>{formatCurrency(plan.find(g => g.id === 'retire')?.target || 0)}</strong> will be strategically divided to eliminate sequence-of-returns risk:</p>
            
            <div className="flex flex-col gap-4">
               <div className="p-6 border border-blue-200 rounded-xl bg-blue-50 flex items-center gap-6">
                  <div className="w-16 h-16 rounded-full bg-blue-200 text-blue-700 flex items-center justify-center font-black text-xl shrink-0">B1</div>
                  <div>
                     <h4 className="font-black text-blue-900 text-sm uppercase tracking-widest mb-1">Bucket 1: Safety (Years 1-3)</h4>
                     <p className="text-sm text-blue-800">3 Years of inflated living expenses held in ultra-safe liquid funds or FDs. This ensures you never sell equities during a crash.</p>
                  </div>
               </div>
               <div className="p-6 border border-amber-200 rounded-xl bg-amber-50 flex items-center gap-6">
                  <div className="w-16 h-16 rounded-full bg-amber-200 text-amber-700 flex items-center justify-center font-black text-xl shrink-0">B2</div>
                  <div>
                     <h4 className="font-black text-amber-900 text-sm uppercase tracking-widest mb-1">Bucket 2: Stability (Years 4-8)</h4>
                     <p className="text-sm text-amber-800">5 Years of living expenses held in high-quality debt and bonds, yielding stable interest to replenish Bucket 1.</p>
                  </div>
               </div>
               <div className="p-6 border border-emerald-200 rounded-xl bg-emerald-50 flex items-center gap-6">
                  <div className="w-16 h-16 rounded-full bg-emerald-200 text-emerald-700 flex items-center justify-center font-black text-xl shrink-0">B3</div>
                  <div>
                     <h4 className="font-black text-emerald-900 text-sm uppercase tracking-widest mb-1">Bucket 3: Growth (Years 9+)</h4>
                     <p className="text-sm text-emerald-800">The remaining corpus invested in diversified equities to outpace inflation and generate long-term wealth.</p>
                  </div>
               </div>
            </div>
          </div>
        </div>
      );
    };

    const Slide = ({ title, subtitle, children }) => (
      <div className="flex flex-col items-center justify-center h-full space-y-12 animate-in slide-in-from-right fade-in duration-500 w-full max-w-7xl mx-auto px-8">
        <div className="text-center"><h2 className="text-5xl font-black heading-font text-slate-900 uppercase tracking-widest mb-4">{title}</h2>{subtitle && <p className="text-teal-700 font-bold text-2xl">{subtitle}</p>}</div>
        {children}
      </div>
    );
    
    const SlideCard = ({ icon, title, value, color, valueSize="text-5xl" }) => (
      <div className="p-12 bg-white border border-slate-100 shadow-2xl text-center rounded-[40px]">
        <Icon name={icon} size={56} className={`mx-auto text-${color}-500 mb-6`}/>
        <p className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-3">{title}</p>
        <p className={`${valueSize} font-black text-slate-900`}>{value}</p>
      </div>
    );

    const ProjectionChart = ({ data, profile }) => {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (!chartRef.current || !data || data.length === 0) return;
        const ctx = chartRef.current.getContext('2d');
        
        if (chartInstance.current) {
          chartInstance.current.destroy();
        }

        const gradOptimized = ctx.createLinearGradient(0, 0, 0, 400);
        gradOptimized.addColorStop(0, 'rgba(16, 185, 129, 0.5)');
        gradOptimized.addColorStop(1, 'rgba(16, 185, 129, 0)');

        const gradBase = ctx.createLinearGradient(0, 0, 0, 400);
        gradBase.addColorStop(0, 'rgba(99, 102, 241, 0.2)');
        gradBase.addColorStop(1, 'rgba(99, 102, 241, 0)');

        chartInstance.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: data.map(d => `Age ${d.age}`),
            datasets: [
              {
                label: 'Optimized Wealth (Corpus)',
                data: data.map(d => d.closing),
                borderColor: '#10b981',
                backgroundColor: gradOptimized,
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                pointHoverRadius: 6
              },
              {
                label: 'Total Capital Invested',
                data: data.map(d => d.totalPrincipal),
                borderColor: '#6366f1',
                backgroundColor: gradBase,
                borderWidth: 2,
                borderDash: [5, 5],
                fill: true,
                tension: 0.4,
                pointRadius: 0
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              mode: 'index',
              intersect: false,
            },
            plugins: { 
              legend: { 
                position: 'top',
                labels: { font: { family: 'Inter', size: 10, weight: 'bold' }, color: '#64748b', usePointStyle: true }
              },
              tooltip: {
                backgroundColor: 'rgba(15, 23, 42, 0.95)',
                titleFont: { size: 13, family: 'Inter' },
                bodyFont: { size: 12, family: 'Inter', weight: 'bold' },
                padding: 12,
                cornerRadius: 8,
                callbacks: {
                  label: function(context) {
                    let label = context.dataset.label || '';
                    if (label) label += ': ';
                    if (context.parsed.y !== null) {
                      label += new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(context.parsed.y);
                    }
                    return label;
                  }
                }
              }
            },
            scales: {
              x: { grid: { display: false, drawBorder: false }, ticks: { color: '#94a3b8', font: { size: 9, weight: 'bold' } } },
              y: { 
                grid: { color: 'rgba(226, 232, 240, 0.5)', drawBorder: false }, 
                ticks: { 
                  color: '#94a3b8',
                  font: { size: 10, weight: 'bold' },
                  callback: function(value) {
                    if (value >= 10000000) return '₹' + (value / 10000000).toFixed(1) + 'Cr';
                    if (value >= 100000) return '₹' + (value / 100000).toFixed(0) + 'L';
                    return value;
                  }
                } 
              }
            }
          }
        });

        return () => {
          if (chartInstance.current) chartInstance.current.destroy();
        };
      }, [data]);

      return <div className="w-full h-[200px] sm:h-[250px] p-2 sm:p-4 bg-white border border-slate-200 rounded-xl shadow-sm"><canvas ref={chartRef}></canvas></div>;
    };

    const InflationChart = ({ profile, monthlyBurn, effectiveInflation, chartType = 'line' }) => {
      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => {
        if (!chartRef.current || !monthlyBurn) return;
        const ctx = chartRef.current.getContext('2d');
        if (chartInstance.current) chartInstance.current.destroy();

        const currentAge = safeNumber(profile.age) || 30;
        const horizonAge = safeNumber(profile.horizonAge) || 85;
        const years = Math.max(10, horizonAge - currentAge);
        
        if (chartType === 'doughnut') {
            const inflated = monthlyBurn * Math.pow(1 + (effectiveInflation/100), years);
            chartInstance.current = new Chart(ctx, {
               type: 'doughnut',
               data: {
                   labels: ["Today's Baseline", "Inflation Penalty (Cost Added)"],
                   datasets: [{
                       data: [monthlyBurn, inflated - monthlyBurn],
                       backgroundColor: ['#cbd5e1', '#e11d48'],
                       borderWidth: 0,
                       hoverOffset: 4
                   }]
               },
               options: {
                   responsive: true, maintainAspectRatio: false, cutout: '65%',
                   plugins: {
                       legend: { position: 'right', labels: { font: { family: 'Inter', size: 9, weight: 'bold' }, color: '#64748b', usePointStyle: true } },
                       tooltip: {
                          backgroundColor: 'rgba(15, 23, 42, 0.95)', titleFont: { size: 11, family: 'Inter' }, bodyFont: { size: 10, family: 'Inter', weight: 'bold' }, padding: 8, cornerRadius: 6,
                          callbacks: { label: function(context) { return ' ' + context.label + ': ₹' + new Intl.NumberFormat('en-IN', { maximumFractionDigits: 0 }).format(context.parsed); } }
                       }
                   }
               }
            });
            return;
        }

        let labels = [];
        let inflatedData = [];
        let baseData = [];

        for (let i = 0; i <= years; i += (years > 20 ? 2 : 1)) {
           labels.push(`Age ${currentAge + i}`);
           inflatedData.push(monthlyBurn * Math.pow(1 + (effectiveInflation/100), i));
           baseData.push(monthlyBurn);
        }

        const gradRose = ctx.createLinearGradient(0, 0, 0, 220);
        gradRose.addColorStop(0, 'rgba(225, 29, 72, 0.3)');
        gradRose.addColorStop(1, 'rgba(225, 29, 72, 0)');

        chartInstance.current = new Chart(ctx, {
          type: chartType,
          data: {
            labels: labels,
            datasets: [
              {
                label: 'Inflated Lifestyle Cost',
                data: inflatedData,
                borderColor: '#e11d48',
                backgroundColor: chartType === 'line' ? gradRose : '#e11d48',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 0,
                pointHoverRadius: 5
              },
              {
                label: "Today's Baseline",
                data: baseData,
                borderColor: '#cbd5e1',
                backgroundColor: '#cbd5e1',
                borderDash: chartType === 'line' ? [5, 5] : [],
                borderWidth: 2,
                fill: false,
                tension: 0,
                pointRadius: 0
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: {
              legend: { position: 'top', labels: { font: { family: 'Inter', size: 9, weight: 'bold' }, color: '#64748b', boxWidth: 10, usePointStyle: true } },
              tooltip: {
                backgroundColor: 'rgba(15, 23, 42, 0.95)', titleFont: { size: 11, family: 'Inter' }, bodyFont: { size: 10, family: 'Inter', weight: 'bold' }, padding: 8, cornerRadius: 6,
                callbacks: { label: function(context) { return context.dataset.label + ': ₹' + new Intl.NumberFormat('en-IN', { maximumFractionDigits: 0 }).format(context.parsed.y) + '/mo'; } }
              }
            },
            scales: {
              x: { grid: { display: false, drawBorder: false }, ticks: { color: '#94a3b8', font: { size: 8, weight: 'bold' }, maxTicksLimit: 8 } },
              y: { grid: { color: 'rgba(226, 232, 240, 0.4)', drawBorder: false }, ticks: { color: '#94a3b8', font: { size: 8, weight: 'bold' }, callback: function(value) { if (value >= 100000) return '₹' + (value / 100000).toFixed(0) + 'L'; return '₹' + value; } } }
            }
          }
        });
        return () => { if (chartInstance.current) chartInstance.current.destroy(); };
      }, [profile.age, profile.horizonAge, monthlyBurn, effectiveInflation, chartType]);

      return <div className="w-full h-[180px] sm:h-[200px] bg-white border border-rose-100 rounded-xl shadow-sm p-2 sm:p-3 relative z-10"><canvas ref={chartRef}></canvas></div>;
    };

    // --- 3. MAIN APP COMPONENTS ---
    const CalibrationFlow = ({ profile, setProfile, step }) => {
      const ageFact = useMemo(() => getAgeInfo(profile.age), [profile.age]);
      const incomeComment = useMemo(() => { return profile.businessIncome ? getIncomeComment('business', profile.businessIncome) : getIncomeComment('salary', profile.salary); }, [profile.salary, profile.businessIncome]);
      const marriedComment = useMemo(() => { if(!profile.married) return {c: "Single? Maximum flexibility.", f: "Marriage shifts life from individual decisions to shared capital planning."}; return {c: "Marriage shifts life to shared responsibility.", f:"Ensure your term life cover is updated to protect dependents."}; }, [profile.married]);
      const childComment = useMemo(() => {
        if(!profile.hasChildren) return {c: "Consolidation phase.", f:"Invest surplus heavily before education costs arise."};
        const cnt = safeNumber(profile.childCount);
        if(cnt === 1) return {c: "Raising one child allows focused attention, but structured education planning is critical."};
        return {c: "Balancing resources and dual education planning horizons becomes paramount."};
      }, [profile.hasChildren, profile.childCount]);

      const monthlyBurnBase = safeNumber(profile.rent) + safeNumber(profile.household) + safeNumber(profile.lifestyle) + safeNumber(profile.emi);
      const monthlyInsVac = (safeNumber(profile.healthPremium) + safeNumber(profile.lifePremium)) / 12 + (safeNumber(profile.vacation)/12);
      
      const totals = useMemo(() => {
        let income = safeNumber(profile.salary) + safeNumber(profile.businessIncome);
        if (profile.married && profile.addCoCFO) income += safeNumber(profile.spouseIncome);
        const assets = ASSET_CLASSES_LIST.reduce((a, c) => a + safeNumber(profile[c.id]), 0) + (profile.customReservoirs || []).reduce((a, c) => a + safeNumber(c.value), 0);
        return { income, burn: monthlyBurnBase + monthlyInsVac, assets };
      }, [profile, monthlyBurnBase, monthlyInsVac]);

      const { totalLiquidAssets, totalIlliquidAssets } = useMemo(() => {
        let liquid = 0;
        ASSET_CLASSES_LIST.filter(a => a.isLiquid).forEach(a => { liquid += safeNumber(profile[a.id]); });
        (profile.customReservoirs || []).filter(r => r.isLiquid).forEach(r => { liquid += safeNumber(r.value); });
        return { totalLiquidAssets: liquid, totalIlliquidAssets: totals.assets - liquid };
      }, [profile, totals.assets]);

      return (
        <div key={step} className="w-full px-4 sm:px-6 xl:px-12 grid grid-cols-1 lg:grid-cols-12 gap-5 pb-8 cinematic-enter text-left">
          <div className="lg:col-span-8 xl:col-span-9">
            <div className="premium-card p-4 sm:p-5 text-left print-block break-inside-avoid">
              <h2 className="text-[14px] font-black heading-font text-slate-900 uppercase tracking-widest border-b border-slate-200/50 pb-3 mb-4">
                {step === 1 ? '1. Personal Profile' : step === 2 ? '2. Burn Rate Audit' : step === 3 ? '3. Asset Reservoirs' : '4. Target Strategy'}
              </h2>

              {step === 1 && (
                <div className="space-y-3 text-left animate-in fade-in duration-300">
                  <div className="grid grid-cols-1 xl:grid-cols-2 gap-3">
                    <InputField label="Full Name" value={profile.name} noNumbers onChange={v => setProfile({...profile, name: v})} placeholder="Enter Full Name" />
                    <div className="hidden xl:flex items-center px-3">{profile.name && <p className="text-[11px] font-bold text-teal-700 tracking-tight animate-in fade-in">Hello {profile.name}, configuring parameters...</p>}</div>
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
                    <InputField label="Current Age" value={profile.age} isAge suffix="Yrs" onChange={v => setProfile({...profile, age: v})} fact={safeNumber(profile.age) > 0 ? ageFact : null} />
                    <InputField label="Retirement Age" value={profile.retireAge} isAge suffix="Yrs" onChange={v => setProfile({...profile, retireAge: v})} isError={profile.retireAge && Number(profile.retireAge) <= Number(profile.age)} />
                  </div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 text-left">
                    <InputField label="Monthly Salary (Net)" prefix="₹" value={profile.salary} type="number" onChange={v => setProfile({...profile, salary: v})} fact={safeNumber(profile.salary) > 0 ? getIncomeComment('salary', profile.salary) : null} />
                    <InputField label="Monthly Business Income" prefix="₹" value={profile.businessIncome} type="number" onChange={v => setProfile({...profile, businessIncome: v})} fact={safeNumber(profile.businessIncome) > 0 ? getIncomeComment('business', profile.businessIncome) : null} />
                    <div className="input-wrapper space-y-2 group relative text-left">
                      <div className="flex justify-between items-end px-1 mb-1.5">
                        <label className="text-xs font-black text-slate-600 uppercase tracking-widest">Risk Profile</label>
                      </div>

                            <div className="sm:col-span-1.5"><InputField label="Horizon" value={g.horizon} type="number" onChange={v => { let gc = [...profile.customGoals]; gc[i].horizon = v; setProfile({...profile, customGoals: gc}); }} suffix="Yrs" /></div>

    const SynthesisView = ({ profile, setProfile }) => {
      const ageFact = useMemo(() => getAgeInfo(profile.age), [profile.age]);
      
      // --- PERFORMANCE GUARD: MATH DEBOUNCER ---
      const mathProfile = useDebounce(profile, 600);

      const [inflationChartType, setInflationChartType] = useState('line');
      const [isWealthAllocated, setIsWealthAllocated] = useState(false);
      const [allocMap, setAllocMap] = useState({}); 
      const [localParams, setLocalParams] = useState({});
      const [expandedGoal, setExpandedGoal] = useState(null);
      const [expandedSimYear, setExpandedSimYear] = useState(null);
      const [showFullPreview, setShowFullPreview] = useState(false);
      const [isPresenting, setIsPresenting] = useState(false);
      const [currentSlide, setCurrentSlide] = useState(0);
      const [projectionTab, setProjectionTab] = useState('strategy'); 
      const [globalSimParams, setGlobalSimParams] = useState({ returns: 12, stepUp: 0, lumpsum: 0 });
      const [blueprintLayout, setBlueprintLayout] = useState('list'); 
      const [scenario, setScenario] = useState('base');
      const [showRealValue, setShowRealValue] = useState(false);
      const [showPostTax, setShowPostTax] = useState(false);
      const [showRawNumbers, setShowRawNumbers] = useState(false);
      const [taxHarvesting, setTaxHarvesting] = useState(false);
      const [glidePath, setGlidePath] = useState(false);
      const [sequenceRisk, setSequenceRisk] = useState(false);
      const [blackSwan, setBlackSwan] = useState(false);
      const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
      const [inlineEdit, setInlineEdit] = useState({ id: null, cost: '' });
      const [burnTrim, setBurnTrim] = useState(0); 
      const [isTunerExpanded, setIsTunerExpanded] = useState(false);
      const [isGoalTunerExpanded, setIsGoalTunerExpanded] = useState(false);

                                   {masterSimulationData.map((row, i) => {
                                     const formatCell = (val) => showRawNumbers ? '₹' + Math.round(safeNumber(val)).toLocaleString('en-IN') : formatCurrency(val);
                                     let displayBal = row.closing; let displaySip = row.sip; let displayInterest = row.growth; let displayWithdrawal = row.withdrawals; 
                                     let displayLegacy = row.legacyClosing; let displayGoals = row.goalsClosing; let taxAndLoad = 0;
                                     if (showPostTax && displayWithdrawal > 0) {
                                       let totalGainPct = Math.max(0, row.closing + displayWithdrawal - row.totalPrincipal) / (row.closing + displayWithdrawal || 1); let withdrawnGains = displayWithdrawal * totalGainPct;
                                       let totalEqAlloc = 0; let totalDebtAlloc = 0; assetMix.forEach(a => { if (a.id === 'debt') totalDebtAlloc += safeNumber(a.pct); else totalEqAlloc += safeNumber(a.pct); });
                                       let totalAlloc = totalEqAlloc + totalDebtAlloc || 1; let eqRatio = totalEqAlloc / totalAlloc; let debtRatio = totalDebtAlloc / totalAlloc;
                                       let eqGains = withdrawnGains * eqRatio; let debtGains = withdrawnGains * debtRatio; let taxEstimate = 0; let exitLoad = 0;

                        </div>
                        {step === 4 && (!profile.horizonAge || safeNumber(profile.horizonAge) <= safeNumber(profile.retireAge)) && (<span className="text-[9px] text-rose-600 font-bold animate-pulse text-right px-1 pt-0.5">Horizon Age > Retirement</span>)}
                        {step === 1 && (safeNumber(profile.retireAge) <= safeNumber(profile.age)) && (<span className="text-[9px] text-rose-600 font-bold animate-pulse text-right px-1 pt-0.5">Retirement Age > Current Age</span>)}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            )}
            
            {/* Floating Scroll Indicator */}
            {showScrollIndicator && step < 5 && view === 'flow' && (
               <div className="fixed bottom-16 right-0 left-0 mx-auto w-fit z-[45] animate-bounce-subtle no-print pointer-events-none">
                <div className="bg-slate-900/90 backdrop-blur-md text-white px-5 py-2.5 rounded-full shadow-xl border border-white/20 flex items-center gap-2">
                  <span className="text-xs font-bold uppercase tracking-widest">Scroll Down</span>
                  <Icon name="arrow-down" size={16} />
                </div>
               </div>
            )}
          </div>
          <TaskSwitcher isOpen={isTaskSwitcherOpen} onToggle={() => setIsTaskSwitcherOpen(!isTaskSwitcherOpen)} currentStep={step} onJump={handleNav} />

          {/* --- CMD+K SPOTLIGHT SEARCH MODAL --- */}
          {isSearchOpen && (
            <div className="fixed inset-0 z-[11000] flex items-start justify-center pt-[15vh] bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200" onClick={() => setIsSearchOpen(false)}>
              <div className="bg-white w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden animate-in slide-in-from-top-4 border border-slate-200" onClick={e => e.stopPropagation()}>
                <div className="flex items-center px-4 py-3 border-b border-slate-100">
                  <Icon name="search" size={18} className="text-slate-400 mr-3" />
                  <input type="text" autoFocus placeholder="Type a command or search..." className="flex-1 outline-none text-sm font-bold text-slate-800 placeholder:text-slate-400 bg-transparent" />
                  <span className="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded">ESC</span>
                </div>
                <div className="p-2 bg-slate-50/50">
                  <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest px-3 py-2">Quick Navigation</p>
                  <button onClick={() => { setStep(5); setIsSearchOpen(false); }} className="w-full text-left px-3 py-2.5 rounded-lg hover:bg-slate-100 flex items-center gap-3 transition-colors">
                    <div className="w-6 h-6 rounded bg-indigo-100 text-indigo-600 flex items-center justify-center"><Icon name="rocket" size={12}/></div>
                    <span className="text-xs font-bold text-slate-700">Launch Master Projection</span>
                  </button>
                  <button onClick={() => { setIsCloudVaultOpen(true); setIsSearchOpen(false); }} className="w-full text-left px-3 py-2.5 rounded-lg hover:bg-slate-100 flex items-center gap-3 transition-colors mt-1">
                    <div className="w-6 h-6 rounded bg-teal-100 text-teal-600 flex items-center justify-center"><Icon name="cloud" size={12}/></div>
                    <span className="text-xs font-bold text-slate-700">Open Cloud Vault</span>
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* --- NEW CLOUD VAULT MODAL --- */}
          {isCloudVaultOpen && (
            <div className="fixed inset-0 z-[10000] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-in fade-in duration-200">
              <div className="bg-white rounded-3xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col animate-in zoom-in-95 duration-300 border border-slate-100">
                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-indigo-50">
                  <div className="flex items-center gap-3">
                    <div className="p-2 bg-indigo-600 text-white rounded-lg shadow-sm"><Icon name="cloud" size={20} /></div>
                    <div><h2 className="text-lg font-black text-indigo-900 uppercase tracking-tight">Secure Cloud Vault</h2><p className="text-[10px] font-bold text-indigo-600/70 uppercase tracking-widest">Multi-Device Blueprint Sync</p></div>
                  </div>
                  <button onClick={() => { setIsCloudVaultOpen(false); setCloudState('idle'); setVaultError(''); setShareCode(''); }} className="text-indigo-400 hover:text-indigo-800 bg-indigo-200/50 hover:bg-indigo-200 p-2 rounded-full transition-all"><Icon name="x" size={20} /></button>
                </div>
                
                <div className="p-6 md:p-8 space-y-8 bg-[#f8fafc]">
                  
                  {/* Save Section */}
                  <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm text-center">
                     <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest mb-2">Generate Share Code</h3>
                     <p className="text-[10px] font-semibold text-slate-500 mb-4 leading-relaxed px-4">Upload this exact matrix to the cloud. You will receive a secure 6-character pin to load it anywhere.</p>
                     
                     {cloudState === 'success_save' ? (
                       <div className="p-4 bg-emerald-50 border border-emerald-200 rounded-xl text-center animate-in zoom-in">
                         <p className="text-[10px] font-bold text-emerald-600 uppercase tracking-widest mb-1">Your Secure Pin</p>
                         <p className="text-4xl font-black text-emerald-800 tracking-widest">{shareCode}</p>
                         <p className="text-[9px] font-semibold text-emerald-600/70 mt-2">Blueprint synced. Anyone with this code can load it.</p>
                         <button onClick={() => {
                            const link = `${window.location.origin}${window.location.pathname}?pin=${shareCode}`;
                            const el = document.createElement('textarea');
                            el.value = link;
                            document.body.appendChild(el);
                            el.select();
                            document.execCommand('copy');
                            document.body.removeChild(el);
                            setVaultError('✅ Magic Link copied to clipboard! Text it to your client.');
                         }} className="mt-4 w-full py-2.5 bg-emerald-600 text-white rounded-lg text-[10px] font-black uppercase tracking-widest hover:bg-emerald-700 transition-all shadow-md flex items-center justify-center gap-2">
                           <Icon name="link" size={14}/> Copy Magic Link
                         </button>
                       </div>
                     ) : (
                       <button onClick={handleSaveToVault} disabled={cloudState === 'saving'} className="w-full py-3.5 bg-indigo-600 text-white rounded-xl font-black uppercase text-xs tracking-widest hover:bg-indigo-700 transition-all shadow-md flex items-center justify-center gap-2 disabled:opacity-70">
                         {cloudState === 'saving' ? <><Icon name="loader" size={16} className="animate-spin"/> Syncing...</> : <><Icon name="upload-cloud" size={16}/> Save to Vault</>}
                       </button>
                     )}
                  </div>

                  {/* Load Section */}
                  <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm text-center">
                     <h3 className="text-xs font-black text-slate-800 uppercase tracking-widest mb-2">Load Blueprint</h3>
                     <p className="text-[10px] font-semibold text-slate-500 mb-4 leading-relaxed px-4">Enter a 6-character shortcode to instantly download an existing matrix.</p>
                     
                     <div className="flex gap-2">
                       <input type="text" maxLength={6} value={inputCode} onChange={e => setInputCode(e.target.value.toUpperCase())} placeholder="ENTER PIN" className="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-4 text-center font-black tracking-[0.3em] text-slate-800 placeholder:text-slate-300 focus:border-indigo-500 outline-none uppercase" />
                       <button onClick={handleLoadFromVault} disabled={cloudState === 'loading' || inputCode.length !== 6} className="px-6 py-3.5 bg-slate-900 text-white rounded-xl font-black uppercase text-xs tracking-widest hover:bg-slate-800 transition-all shadow-md flex items-center justify-center disabled:opacity-50">
                         {cloudState === 'loading' ? <Icon name="loader" size={16} className="animate-spin"/> : <Icon name="download-cloud" size={16}/>}
                       </button>
                     </div>
                     {vaultError && <p className="text-[10px] font-bold text-rose-600 mt-3 bg-rose-50 p-2 rounded border border-rose-100 animate-in fade-in">{vaultError}</p>}
                  </div>

                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    // PM/Tech Lead Safety Check: Ensure the root container is ready before mounting the App
    const rootElement = document.getElementById('root');
    if (rootElement) {
      const root = ReactDOM.createRoot(rootElement);
      root.render(<App />);
    } else {	
      console.error("Critical Error: The HTML '<div id=\"root\"></div>' element is missing.");
    }
  </script>
</body>
</html>
